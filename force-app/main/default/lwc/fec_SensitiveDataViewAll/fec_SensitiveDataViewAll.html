<template>
    <lightning-card>
        <!-- ================= HEADER ================= -->
        <div class="header">
            <lightning-icon icon-name="utility:lock" size="small" class="header-icon"></lightning-icon>
            <span class="header-title">Sensitive Data</span>
        </div>

        <!-- ================= BODY ================= -->
        <template if:true={hasRecords}>
            <!-- Spinner -->
            <template if:true={isLoading}>
                <lightning-spinner size="small" alternative-text="Loading sensitive data">
                </lightning-spinner>
            </template>

            <!-- Datatable -->
            <lightning-datatable key-field="Id" data={listSensitiveData} columns={columns} hide-checkbox-column>
            </lightning-datatable>

            <!-- ================= PAGINATION ================= -->
            <div
                class="table-pagination slds-m-top_small slds-grid slds-grid_align-spread slds-grid_vertical-align-center">

                <!-- Page size -->
                <div class="page-size slds-grid slds-grid_vertical-align-center">
                    <span class="slds-m-right_x-small">Page size</span>
                    <lightning-combobox value={pageSize} options={pageSizeOptions} onchange={handlePageSizeChange}
                        variant="label-hidden">
                    </lightning-combobox>
                </div>

                <!-- Prev / Current / Next -->
                <div class="pagination-controls slds-grid slds-grid_vertical-align-center">
                    <lightning-button-icon icon-name="utility:chevronleft" alternative-text="Previous"
                        onclick={handlePrevPage} disabled={isFirstPage}>
                    </lightning-button-icon>

                    <span class="slds-m-horizontal_small slds-text-title_bold">
                        {currentPage}
                    </span>

                    <lightning-button-icon icon-name="utility:chevronright" alternative-text="Next"
                        onclick={handleNextPage} disabled={isLastPage}>
                    </lightning-button-icon>
                </div>

                <!-- Go to page -->
                <div class="go-to-page slds-grid slds-grid_vertical-align-center">
                    <span class="slds-m-right_x-small">Go to page</span>

                    <lightning-input type="number" value={currentPage} min="1" max={totalPages} variant="label-hidden"
                        class="page-input" onchange={handleGoToPageInput}>
                    </lightning-input>

                    <span class="slds-m-horizontal_x-small">
                        of {totalPages}
                    </span>

                    <lightning-button label="Go" onclick={handleGoToPage} variant="brand">
                    </lightning-button>
                </div>
            </div>
        </template>

        <!-- ================= EMPTY STATE ================= -->
        <template if:false={hasRecords}>
            <div class="slds-align_absolute-center slds-text-color_weak slds-m-around_medium">
                No sensitive data available
            </div>
        </template>
    </lightning-card>
</template>
