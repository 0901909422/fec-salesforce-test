<template>
    <template if:false={shouldHideComponent}>
    <template if:true={hasData}>
        <lightning-accordion allow-multiple-sections-open active-section-name={activeSections}>

            <template if:true={showOriginalMrcBlock}>
                <c-fec_-common-record-detail-section section-title={customLabel.originalMRCLabel} fields={originalMrcFields}
                    columns="3">
                </c-fec_-common-record-detail-section>
            </template>

            <template if:true={showNotarizedMrcBlock}>
                <c-fec_-common-record-detail-section section-title={customLabel.notarizedMRCLabel}
                    fields={notarizedMrcFields} columns="3">
                </c-fec_-common-record-detail-section>
            </template>

        </lightning-accordion>
    </template>

    <template if:false={hasData}>
        <div class="slds-accordion">
            <template if:true={showOriginalMrcBlock}>
            <section class="slds-accordion__section slds-is-open">
                <div class="slds-accordion__summary">
                    <h3 class="slds-accordion__summary-heading">
                        <span class="slds-accordion__summary-content slds-grid">
                            <lightning-icon icon-name="utility:chevrondown" size="x-small"
                                class="slds-m-right_x-small"></lightning-icon>
                            <span>
                                {customLabel.originalMRCLabel}&nbsp;-&nbsp;
                                <span class="sync-fail-text">{customLabel.msgErrorAPI}</span>
                            </span>
                        </span>
                    </h3>
                </div>
                <div class="slds-accordion__content slds-hide"></div>
            </section>
            </template>

            <template if:true={showNotarizedMrcBlock}>
            <section class="slds-accordion__section slds-is-open">
                <div class="slds-accordion__summary">
                    <h3 class="slds-accordion__summary-heading">
                        <span class="slds-accordion__summary-content slds-grid">
                            <lightning-icon icon-name="utility:chevrondown" size="x-small"
                                class="slds-m-right_x-small"></lightning-icon>
                            <span>
                                {customLabel.notarizedMRCLabel}&nbsp;-&nbsp;
                                <span class="sync-fail-text">{customLabel.msgErrorAPI}</span>
                            </span>
                        </span>
                    </h3>
                </div>
                <div class="slds-accordion__content slds-hide"></div>
            </section>
            </template>
        </div>
    </template>
    </template>
</template>
