<template>
    <lightning-accordion allow-multiple-sections-open active-section-name={activeSections}>

        <!-- General Statement Info -->
        <c-fec_-commom-record-detail-section section-title="General Statement Info" fields={generalStatementInfoFields}
            onbuttonclick={handleButtonClick} columns="3">
        </c-fec_-commom-record-detail-section>

        <!-- Statement Details -->
        <lightning-accordion-section name="Statement Details" label="Statement Details">

            <div class="detail-wrapper">
                <c-fec_-related-list-addresses-paging records={statementDetails} columns={statementDetailsColumns}
                    sorted-by="statementDate" onrowselect={handleStatementSelect}>
                </c-fec_-related-list-addresses-paging>
            </div>

        </lightning-accordion-section>

    </lightning-accordion>
</template>
