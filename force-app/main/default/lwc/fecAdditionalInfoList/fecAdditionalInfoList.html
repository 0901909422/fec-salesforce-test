<template>
    <lightning-card title="Additional Info" icon-name="standard:record">
        <lightning-button label="New Additional Info" icon-name="utility:add" slot="actions"
            onclick={openNewModal} variant="brand" class="slds-m-right_x-small">
        </lightning-button>

        <div class="slds-p-horizontal_medium slds-p-bottom_medium">
            <!-- Search -->
            <div class="slds-p-bottom_x-small">
                <lightning-input type="search" placeholder={labelSearchAll}
                    onchange={handleSearch} variant="label-hidden"></lightning-input>
            </div>

            <template if:true={isLoading}>
                <lightning-layout class="slds-align_absolute-center slds-m-bottom_medium">
                    <lightning-spinner alternative-text="Loading" size="medium"></lightning-spinner>
                </lightning-layout>
            </template>

            <lightning-datatable
                key-field="Id"
                data={pagedData}
                columns={columns}
                hide-checkbox-column
                show-row-number-column
                onsort={handleSort}
                onrowaction={handleRowAction}
                sorted-by={sortedBy}
                sorted-direction={sortDirection}>
            </lightning-datatable>

            <!-- Pagination -->
            <c-fec-pagination
                current-page={currentPage}
                total-records={totalFilteredRecords}
                page-size={pageSize}
                onpagechange={handlePageChange}
                onpagesizechange={handlePageSizeChange}>
            </c-fec-pagination>
        </div>
    </lightning-card>

    <!-- Create/Edit Modal -->
    <template if:true={isModalOpen}>
        <section role="dialog" tabindex="-1" aria-modal="true" aria-labelledby="modal-heading-info"
            class="slds-modal slds-fade-in-open">
            <div class="slds-modal__container">
                <header class="slds-modal__header">
                    <button class="slds-button slds-button_icon slds-modal__close slds-button_icon-inverse"
                        title="Close" onclick={closeModal}>
                        <lightning-icon icon-name="utility:close" alternative-text="Close" variant="inverse"
                            size="small"></lightning-icon>
                        <span class="slds-assistive-text">Close</span>
                    </button>
                    <h2 id="modal-heading-info" class="slds-modal__title slds-hyphenate">{modalTitle}</h2>
                </header>
                <div class="slds-modal__content slds-p-around_medium">
                    <c-fec-additional-info-form record-id={recordIdForEdit} onsuccess={handleSuccess}
                        oncancel={handleCancelEvent}>
                    </c-fec-additional-info-form>
                </div>
            </div>
        </section>
        <div class="slds-backdrop slds-backdrop_open"></div>
    </template>

    <!-- Delete Confirmation Modal -->
    <template if:true={showDeleteConfirm}>
        <section role="dialog" tabindex="-1" aria-modal="true" aria-labelledby="modal-heading-delete-confirm"
            class="slds-modal slds-fade-in-open">
            <div class="slds-modal__container">
                <header class="slds-modal__header">
                    <h2 id="modal-heading-delete-confirm" class="slds-modal__title slds-hyphenate">Confirm Delete</h2>
                </header>
                <div class="slds-modal__content slds-p-around_medium">
                    <p>Are you sure you want to delete this record?</p>
                </div>
                <footer class="slds-modal__footer">
                    <lightning-button variant="neutral" label="Cancel" onclick={cancelDelete}></lightning-button>
                    <lightning-button variant="destructive" label="Delete" onclick={confirmDelete} class="slds-m-left_small"></lightning-button>
                </footer>
            </div>
        </section>
        <div class="slds-backdrop slds-backdrop_open"></div>
    </template>
</template>
