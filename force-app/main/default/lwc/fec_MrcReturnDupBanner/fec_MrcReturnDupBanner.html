<template>
  <div class={wrapperClass}>
    <template if:true={showDupMessage}>
      <p class="mrc-dup-message">
        {mrcDupMessageBeforeLink}
        <a href="#" class="mrc-dup-case-link" onclick={handleOpenMrcDupCase}>{mrcDupCaseNumber}</a>
        {mrcDupMessageAfterLink}
      </p>
    </template>
    <template if:false={isReadOnly}>
      <template if:true={showHandlingRadio}>
        <lightning-radio-group
          class="mrc-handling-radio"
          name={radioName}
          label={handlingOptionLabel}
          options={mrcHandlingRadioOptions}
          value={handlingOptionValue}
          type="radio"
          variant="label-stacked"
          required
          data-obj={objId}
          data-obj-name="Case"
          onchange={handleMrcHandlingOptionChange}>
        </lightning-radio-group>
      </template>
    </template>
  </div>
</template>
