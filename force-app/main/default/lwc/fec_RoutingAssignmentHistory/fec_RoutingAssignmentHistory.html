<template>
    <article class="slds-card">
        <div class="slds-card__header slds-grid">
            <header class="slds-media slds-media_center slds-has-flexi-truncate">
                <div class="slds-media__figure">
                    <lightning-icon icon-name="standard:record" size="small"></lightning-icon>
                </div>
                <div class="slds-media__body">
                    <h2 class="slds-card__header-title">
                        <span>{labels.historyTitle}</span>
                    </h2>
                </div>
            </header>
        </div>
        <div class="slds-card__body slds-card__body_inner">
            <template if:false={showEmpty}>
                <lightning-datatable
                    key-field="Id"
                    data={histories}
                    columns={columns}
                    hide-checkbox-column>
                </lightning-datatable>

                <!-- Pagination bar -->
                <div class="pagination-bar">
                    <div class="pagination-left">
                        <span class="pagination-label">{labels.pageSize}</span>
                        <input type="number" class="pagination-input" value={pageSize} min="1" onchange={handlePageSizeChange} />
                    </div>
                    <div class="pagination-center">
                        <button class="pagination-btn" onclick={handlePrev} disabled={isFirstPage}>&#8249;</button>
                        <span class="pagination-page">{pageNumber}</span>
                        <button class="pagination-btn" onclick={handleNext} disabled={isLastPage}>&#8250;</button>
                    </div>
                    <div class="pagination-right">
                        <span class="pagination-label">{labels.goToPage}</span>
                        <input type="number" class="pagination-input" value={goToPage} min="1" max={totalPages} onchange={handleGoToPage} />
                        <span class="pagination-label">{labels.ofPages} {totalPages}</span>
                        <button class="pagination-go-btn" onclick={handleGo}>{labels.go}</button>
                    </div>
                </div>
            </template>

            <template if:true={showEmpty}>
                <div class="slds-text-align_center slds-p-around_medium slds-text-color_weak">
                    {labels.noHistory}
                </div>
            </template>
        </div>
    </article>
</template>
