<template>
    <div class="slds-accordion">
        <!-- Card Delivery Section -->
        <section class={cardDeliverySectionClass}>
            <div class="slds-accordion__summary" onclick={handleCardDeliveryToggle}>
                <h3 class="slds-accordion__summary-heading">
                    <span class="slds-accordion__summary-content slds-grid">
                        <lightning-icon 
                            icon-name={cardDeliveryIconName} 
                            size="x-small" 
                            class="slds-m-right_x-small">
                        </lightning-icon>
                        <span>
                            Card Delivery
                            <template if:true={hasCardDeliveryError}>
                                <span class="error-text"> - {ERROR_MESSAGE}</span>
                            </template>
                        </span>
                    </span>
                </h3>
            </div>
            <div class={cardDeliveryContentClass}>
                <template if:true={isCardDeliveryLoading}>
                    <div class="slds-is-relative slds-p-vertical_large">
                        <lightning-spinner alternative-text="Loading" size="medium"></lightning-spinner>
                    </div>
                </template>
                
                <template if:false={isCardDeliveryLoading}>
                    <template if:true={hasCardDeliveryData}>
                        <div class="card-info-table-wrapper">
                            <c-fec_-related-list-addresses-paging
                                columns={cardDeliveryColumns}
                                records={cardDeliveryData}
                                updated-time={cardDeliveryUpdatedTime}
                                default-sorted-by="FEC_Issue_Date_Formatted__c"
                                default-sort-direction="desc"
                                hide-row-number={hideCardDeliveryRowNumber}
                                hide-updated-time={hideCardDeliveryRowNumber}>
                            </c-fec_-related-list-addresses-paging>
                        </div>
                    </template>
                </template>
            </div>
        </section>

        <!-- Other Cards Section -->
        <section class={otherCardSectionClass}>
            <div class="slds-accordion__summary" onclick={handleOtherCardToggle}>
                <h3 class="slds-accordion__summary-heading">
                    <span class="slds-accordion__summary-content slds-grid">
                        <lightning-icon 
                            icon-name={otherCardIconName} 
                            size="x-small" 
                            class="slds-m-right_x-small">
                        </lightning-icon>
                        <span>
                            Other Cards
                            <template if:true={hasOtherCardError}>
                                <span class="error-text"> - {ERROR_MESSAGE}</span>
                            </template>
                        </span>
                    </span>
                </h3>
            </div>
            <div class={otherCardContentClass}>
                <template if:true={isOtherCardLoading}>
                    <div class="slds-is-relative slds-p-vertical_large">
                        <lightning-spinner alternative-text="Loading" size="medium"></lightning-spinner>
                    </div>
                </template>
                
                <template if:false={isOtherCardLoading}>
                    <template if:true={hasOtherCardData}>
                        <div class="card-info-table-wrapper">
                            <c-fec_-related-list-addresses-paging
                                columns={otherCardColumns}
                                records={otherCardData}
                                updated-time={otherCardUpdatedTime}
                                default-sorted-by="FEC_Issue_Date_Formatted__c"
                                default-sort-direction="desc"
                                hide-updated-time={hideCardDeliveryRowNumber}>
                            </c-fec_-related-list-addresses-paging>
                        </div>
                    </template>
                </template>
            </div>
        </section>
    </div>
</template>
