<template>
    <div class="ga-actions-header">
        <div class="ga-actions-left">
            <lightning-icon icon-name={objectIconName} size="medium"></lightning-icon>
            <div class="ga-actions-info">
                <div class="ga-actions-label">{objectLabel}</div>
                <div class="ga-actions-name">{recordName}</div>
            </div>
        </div>
        <div class="ga-actions-buttons">
            <lightning-button label={labels.edit} onclick={handleEdit}></lightning-button>
            <lightning-button label={labels.delete} onclick={handleDelete}></lightning-button>
        </div>
    </div>

    <template if:true={showDeleteModal}>
        <section role="dialog" tabindex="-1" aria-modal="true" class="slds-modal slds-fade-in-open">
            <div class="slds-modal__container">
                <header class="slds-modal__header">
                    <h2 class="slds-modal__title slds-hyphenate">{labels.confirmDeleteTitle}</h2>
                </header>
                <div class="slds-modal__content slds-p-around_medium slds-text-align_center">
                    <p>{labels.confirmDeleteMessage}</p>
                </div>
                <footer class="slds-modal__footer">
                    <lightning-button label={labels.cancel} onclick={closeDeleteModal} class="slds-m-right_small"></lightning-button>
                    <lightning-button variant="brand" label={labels.confirm} onclick={confirmDelete}></lightning-button>
                </footer>
            </div>
        </section>
        <div class="slds-backdrop slds-backdrop_open"></div>
    </template>
</template>
