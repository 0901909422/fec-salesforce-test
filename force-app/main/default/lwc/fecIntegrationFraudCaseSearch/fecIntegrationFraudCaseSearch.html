<template>
    <lightning-card title={labels.screenTitle}>

        <!-- Search Filters -->
        <div class="search-grid">
            <lightning-input label={labels.fraudCaseId} value={fraudCaseId} onchange={handleChange} data-field="fraudCaseId"></lightning-input>
            <lightning-input label={labels.nationalId} value={nationalId} onchange={handleChange} data-field="nationalId"></lightning-input>
            <lightning-input label={labels.phoneNumber} value={phoneNumber} onchange={handleChange} data-field="phoneNumber"></lightning-input>

            <lightning-input label={labels.applicationId} value={applicationId} onchange={handleChange} data-field="applicationId"></lightning-input>
            <lightning-input label={labels.contractNumber} value={contractNumber} onchange={handleChange} data-field="contractNumber"></lightning-input>
            <lightning-input label={labels.accountNumber} value={accountNumber} onchange={handleChange} data-field="accountNumber"></lightning-input>
        </div>

        <!-- Buttons -->
        <div class="button-row">
            <lightning-button variant="brand" label={labels.searchBtn} onclick={doSearchFraudCase}></lightning-button>
            <lightning-button class="slds-m-left_x-small" label={labels.clearBtn} onclick={doClear}></lightning-button>
        </div>

        <!-- Help Text -->
        <p class="help-text">{labels.helpSearch}</p>

        <!-- Results Table -->
        <template if:true={records.length}>
            <lightning-datatable
                key-field="Id"
                data={records}
                columns={columns}
                hide-checkbox-column
                sorted-by={sortBy}
                sorted-direction={sortDirection}
                onsort={handleSort}>
            </lightning-datatable>

            <!-- Pagination -->
            <div class="pagination">
                <lightning-button label={labels.prevBtn} onclick={prevPage} disabled={isFirstPage}></lightning-button>
                <span class="page-label">Page {pageNumber} / {totalPages}</span>
                <lightning-button label={labels.nextBtn} onclick={nextPage} disabled={isLastPage}></lightning-button>
            </div>
        </template>

        <!-- No Results -->
        <template if:true={noResult}>
            <p class="no-result">{labels.noRecords}</p>
        </template>

    </lightning-card>
</template>
