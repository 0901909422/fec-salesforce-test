<template>
    <template if:true={hasData}>
        <lightning-accordion allow-multiple-sections-open active-section-name={activeSections}>

                onbuttonclick={handleButtonClick}>
            </c-fec_-common-record-detail-section>
            <c-fec_-common-record-detail-section section-title="Main Card" fields={mainCardFields}
                show-refresh-button="true" onrefresh={handleRefresh}>
            </c-fec_-common-record-detail-section>
            <c-fec_-common-record-detail-section section-title="PIN" fields={pinFields} show-refresh-button="true"
                onrefresh={handleRefresh}>

            <c-fec_-common-record-detail-section section-title="Fee" fields={feeFields}>
            </c-fec_-common-record-detail-section>

                show-refresh-button="true" onrefresh={handleRefresh}>
            </c-fec_-common-record-detail-section>
            <c-fec_-common-record-detail-section section-title="Sales Info" fields={salesInfoFields}
                onbuttonclick={handleButtonClick}>
            </c-fec_-common-record-detail-section>
        </lightning-accordion>
    </template>
