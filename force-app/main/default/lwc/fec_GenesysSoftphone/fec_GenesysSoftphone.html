<template>
    <lightning-card title="Genesys Softphone" icon-name="standard:voice_call">
        <div class="slds-p-around_medium">
            <div class="slds-box slds-theme_shade slds-m-bottom_medium">
                <p><strong>Trạng thái:</strong> {callStatus}</p>
                <p><strong>Từ số:</strong> {callerNumber}</p>
            </div>

            <div class="slds-grid slds-gutters slds-alignment_absolute-center">
                <div class="slds-col">
                    <lightning-button 
                        label="Go Ready" 
                        variant="brand" 
                        icon-name="utility:check"
                        onclick={handleSetReady}>
                    </lightning-button>
                </div>

                <div class="slds-col slds-size_1-of-2">
                    <div class="slds-form-element">
                        <div class="slds-form-element__control slds-input-has-fixed-addon">
                            <lightning-input 
                                type="tel" 
                                label="Số điện thoại" 
                                variant="label-hidden" 
                                placeholder="Nhập số điện thoại..."
                                class="fec-phone-input">
                            </lightning-input>
                            <lightning-button 
                                label="Call" 
                                variant="success" 
                                icon-name="utility:call"
                                onclick={handleCallClick}
                                class="slds-m-left_x-small">
                            </lightning-button>
                        </div>
                    </div>
                </div>
            </div>
            
            <iframe 
                class="iws-iframe"
                src={IframeSrc}
                width="100%" 
                height="0px" 
                frameborder="0" 
                style="visibility:hidden; display:none;">
            </iframe>
        </div>
    </lightning-card>
</template>
