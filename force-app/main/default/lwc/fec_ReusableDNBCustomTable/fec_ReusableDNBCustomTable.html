<template>
    <table class="slds-table slds-table_cell-buffer slds-table_bordered custom-table">

        <!-- HEADER -->
        <thead>
            <tr>
                <template for:each={columns} for:item="col">
                    <th key={col.fieldName}>
                        {col.label}
                    </th>
                </template>
            </tr>
        </thead>

        <!-- BODY -->
        <tbody>
            <template for:each={processedData} for:item="row">
                <tr key={row.id}>

                    <template for:each={row.cells} for:item="cell">
                        <td key={cell.fieldName} class={cell.cellClass}>

                            <!-- TEXT -->
                            <template if:true={cell.isText}>
                                {cell.value}
                            </template>

                            <!-- CHECKBOX -->
                            <template if:true={cell.isCheckbox}>
                                <div class="slds-grid slds-align_absolute-center">
                                    <lightning-input type="checkbox" checked={cell.value} data-id={row.id}
                                        data-field={cell.fieldName} onchange={handleCheckboxChange}
                                        disabled={cell.isActionDisabled}>
                                    </lightning-input>
                                    <span class="slds-m-left_x-small">
                                        {cell.checkboxLabel}
                                    </span>
                                </div>

                            </template>

                            <!-- CONTACT -->
                            <template if:true={cell.isContact}>
                                <div class="slds-grid slds-align_absolute-center">
                                    <span>
                                        {cell.displayValue}
                                    </span>
                                    <template if:true={cell.hasContact}>
                                        <lightning-button-icon icon-name={cell.iconName} alternative-text="Toggle"
                                            size="small" variant="bare" data-id={row.id} onclick={handleToggleContact}>
                                        </lightning-button-icon>
                                    </template>
                                </div>
                            </template>

                            <!-- PICKLIST -->
                            <template if:true={cell.isPicklist}>
                                <!-- READ ONLY -->
                                <template if:true={cell.isDisabled}>
                                    <span>-</span>
                                </template>

                                <!-- EDITABLE -->
                                <template if:false={cell.isDisabled}>
                                    <lightning-combobox value={cell.value} options={cell.options} required={cell.isRequired}
                                        placeholder="Select an Option" data-id={row.id} data-field={cell.fieldName}
                                        onchange={handlePicklistChange}>
                                    </lightning-combobox>
                                </template>
                            </template>

                            <template if:true={cell.isTextarea}>
                                <template if:true={cell.isDisabledText}>
                                    <span>-</span>
                                </template>
                                <template if:false={cell.isDisabledText}>
                                    <lightning-textarea value={cell.value} data-id={row.id} data-field={cell.fieldName}
                                        required={cell.isRequired} onchange={handleTextareaChange}>
                                    </lightning-textarea>
                                </template>
                            </template>

                        </td>
                    </template>

                </tr>
            </template>
        </tbody>

    </table>
</template>
