<template>
    <template if:true={hasData}>
        <lightning-accordion allow-multiple-sections-open active-section-name={activeSections}>
            <c-fec_-commom-record-detail-section section-title="Account" fields={accountFields}
                show-refresh-button="true" onrefresh={handleRefresh} columns="3">
            </c-fec_-commom-record-detail-section>
            <c-fec_-commom-record-detail-section section-title="Account Status" fields={accountStatusFields}
                show-refresh-button="true" onrefresh={handleRefresh} columns="3">
            </c-fec_-commom-record-detail-section>
             <c-fec_-commom-record-detail-section section-title="Card" fields={cardFields}
                buttons={cardButtons} columns="3">
            </c-fec_-commom-record-detail-section>
            <c-fec_-commom-record-detail-section section-title="Card Status" fields={cardStatusFields}
                buttons={cardStatusButtons} show-refresh-button="true" onrefresh={handleRefresh}
                onbuttonclick={handleButtonClick} columns="3">
            </c-fec_-commom-record-detail-section>
            <c-fec_-commom-record-detail-section section-title="Debt Sale" fields={debtSaleFields}
                onbuttonclick={handleButtonClick} columns="3">
            </c-fec_-commom-record-detail-section>
        </lightning-accordion>
    </template>
    <template if:false={hasData}>
        <div class="slds-accordion">
            <section class="slds-accordion__section slds-is-open">
                <div class="slds-accordion__summary">
                    <h3 class="slds-accordion__summary-heading">
                        <span class="slds-accordion__summary-content slds-grid">
                            <lightning-icon icon-name="utility:chevrondown" size="x-small" class="slds-m-right_x-small">
                            </lightning-icon>
                            <span>
                                Account&nbsp;-&nbsp;
                                <span class="sync-fail-text">
                                    Tải Dữ liệu Không Thành Công
                                </span>
                            </span>

                        </span>
                    </h3>
                </div>
                <div class="slds-accordion__content slds-hide">
                </div>
            </section>
            <section class="slds-accordion__section slds-is-open">
                <div class="slds-accordion__summary">
                    <h3 class="slds-accordion__summary-heading">
                        <span class="slds-accordion__summary-content slds-grid">
                            <lightning-icon icon-name="utility:chevrondown" size="x-small" class="slds-m-right_x-small">
                            </lightning-icon>
                            <span>
                                Account Status&nbsp;-&nbsp;
                                <span class="sync-fail-text">
                                    Tải Dữ liệu Không Thành Công
                                </span>
                            </span>

                        </span>
                    </h3>
                </div>
                <div class="slds-accordion__content slds-hide">
                </div>
            </section>
            <section class="slds-accordion__section slds-is-open">
                <div class="slds-accordion__summary">
                    <h3 class="slds-accordion__summary-heading">
                        <span class="slds-accordion__summary-content slds-grid">
                            <lightning-icon icon-name="utility:chevrondown" size="x-small" class="slds-m-right_x-small">
                            </lightning-icon>
                            <span>
                                Card Status&nbsp;-&nbsp;
                                <span class="sync-fail-text">
                                    Tải Dữ liệu Không Thành Công
                                </span>
                            </span>

                        </span>
                    </h3>
                </div>
                <div class="slds-accordion__content slds-hide">
                </div>
            </section>
            <section class="slds-accordion__section slds-is-open">
                <div class="slds-accordion__summary">
                    <h3 class="slds-accordion__summary-heading">
                        <span class="slds-accordion__summary-content slds-grid">
                            <lightning-icon icon-name="utility:chevrondown" size="x-small" class="slds-m-right_x-small">
                            </lightning-icon>
                            <span>
                                Debt Sale&nbsp;-&nbsp;
                                <span class="sync-fail-text">
                                    Tải Dữ liệu Không Thành Công
                                </span>
                            </span>

                        </span>
                    </h3>
                </div>
                <div class="slds-accordion__content slds-hide">
                </div>
            </section>
        </div>
    </template>
</template>
