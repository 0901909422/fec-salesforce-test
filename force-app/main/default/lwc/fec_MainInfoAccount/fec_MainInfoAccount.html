<template>
    <template if:true={hasData}>
        <lightning-accordion allow-multiple-sections-open active-section-name={activeSections}>
            <c-fec_-common-record-detail-section section-title={customLabel.accountLabel} fields={accountFields}
                show-refresh-button="true" onrefresh={handleRefresh}>
            </c-fec_-common-record-detail-section>
            <c-fec_-common-record-detail-section section-title={customLabel.accountStatusLabel} fields={accountStatusFields}
                show-refresh-button="true" onrefresh={handleRefresh}>
            </c-fec_-common-record-detail-section>
             <c-fec_-common-record-detail-section section-title={customLabel.cardLabel} fields={cardFields}
                buttons={cardButtons}>
            </c-fec_-common-record-detail-section>
            <c-fec_-common-record-detail-section section-title={customLabel.cardStatusLabel} fields={cardStatusFields}
                buttons={cardStatusButtons} show-refresh-button="true" onrefresh={handleRefresh}
                onbuttonclick={handleButtonClick}>
            </c-fec_-common-record-detail-section>
            <c-fec_-common-record-detail-section section-title={customLabel.debtSaleLabel} fields={debtSaleFields}
                onbuttonclick={handleButtonClick}>
            </c-fec_-common-record-detail-section>
        </lightning-accordion>
    </template>
    <template if:false={hasData}>
        <div class="slds-accordion">
            <section class="slds-accordion__section slds-is-open">
                <div class="slds-accordion__summary">
                    <h3 class="slds-accordion__summary-heading">
                        <span class="slds-accordion__summary-content slds-grid">
                            <lightning-icon icon-name="utility:chevrondown" size="x-small" class="slds-m-right_x-small">
                            </lightning-icon>
                            <span>
                                {customLabel.accountLabel}&nbsp;-&nbsp;
                                <span class="sync-fail-text">
                                    {customLabel.msgErrorAPI}
                                </span>
                            </span>

                        </span>
                    </h3>
                </div>
                <div class="slds-accordion__content slds-hide">
                </div>
            </section>
            <section class="slds-accordion__section slds-is-open">
                <div class="slds-accordion__summary">
                    <h3 class="slds-accordion__summary-heading">
                        <span class="slds-accordion__summary-content slds-grid">
                            <lightning-icon icon-name="utility:chevrondown" size="x-small" class="slds-m-right_x-small">
                            </lightning-icon>
                            <span>
                                {customLabel.accountStatusLabel}&nbsp;-&nbsp;
                                <span class="sync-fail-text">
                                    {customLabel.msgErrorAPI}
                                </span>
                            </span>

                        </span>
                    </h3>
                </div>
                <div class="slds-accordion__content slds-hide">
                </div>
            </section>
            <section class="slds-accordion__section slds-is-open">
                <div class="slds-accordion__summary">
                    <h3 class="slds-accordion__summary-heading">
                        <span class="slds-accordion__summary-content slds-grid">
                            <lightning-icon icon-name="utility:chevrondown" size="x-small" class="slds-m-right_x-small">
                            </lightning-icon>
                            <span>
                                {customLabel.cardStatusLabel}&nbsp;-&nbsp;
                                <span class="sync-fail-text">
                                    {customLabel.msgErrorAPI}
                                </span>
                            </span>

                        </span>
                    </h3>
                </div>
                <div class="slds-accordion__content slds-hide">
                </div>
            </section>
            <section class="slds-accordion__section slds-is-open">
                <div class="slds-accordion__summary">
                    <h3 class="slds-accordion__summary-heading">
                        <span class="slds-accordion__summary-content slds-grid">
                            <lightning-icon icon-name="utility:chevrondown" size="x-small" class="slds-m-right_x-small">
                            </lightning-icon>
                            <span>
                                {customLabel.debtSaleLabel}&nbsp;-&nbsp;
                                <span class="sync-fail-text">
                                    {customLabel.msgErrorAPI}
                                </span>
                            </span>

                        </span>
                    </h3>
                </div>
                <div class="slds-accordion__content slds-hide">
                </div>
            </section>
        </div>
    </template>
</template>
