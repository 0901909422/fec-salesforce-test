<template>
    <div class="slds-card slds-card_boundary custom-card">
        <div class="slds-p-around_medium slds-grid slds-grid_vertical-align-center slds-border_bottom">
            <div class="slds-col slds-size_1-of-2 slds-grid slds-grid_vertical-align-center">
                <lightning-icon icon-name="standard:campaign" size="small" class="custom-icon-purple slds-m-right_small"></lightning-icon>
                <h2 class="slds-text-heading_small custom-header-title">Campaign Configuration</h2>
            </div>
        </div>

        <div class="slds-p-around_medium">
            <div class="slds-grid slds-gutters slds-grid_vertical-align-start">
                
                <div class="slds-col slds-size_3-of-12">
                    <lightning-combobox
                        data-id="mappingDropdown"
                        label="CS Campaign Mapping"
                        value={selectedMappingId}
                        placeholder="Select Campaign..."
                        options={mappingOptions}
                        onchange={handleMappingChange}
                        required
                        class="slds-m-bottom_medium">
                    </lightning-combobox>
                    
                    <div class="slds-box slds-theme_shade slds-m-top_medium">
                        <div class="slds-grid slds-grid_vertical-align-center">
                            <div class="slds-col">
                                <span class="slds-text-title_bold">No. of Inprogress records: </span>
                                <span class="slds-badge slds-m-left_x-small">{inProgressCount}</span>
                            </div>
                            
                            <div class="slds-col slds-no-flex">
                                <template if:true={inProgressCount}>
                                    <lightning-button 
                                        label="Download Excel" 
                                        icon-name="utility:download" 
                                        variant="neutral" 
                                        onclick={handleDownloadExcel}
                                        class="slds-m-left_small">
                                    </lightning-button>
                                </template>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="slds-col slds-size_3-of-12">
                    <div class="db-job-announcement slds-m-bottom_small">
                        <lightning-icon icon-name="utility:info" size="x-small" class="slds-m-right_xx-small info-icon-bold"></lightning-icon>
                        <strong>DB job will be run between 6 AM - 6 PM only</strong>
                    </div>

                    <div class="slds-p-top_small">
                        <lightning-input 
                            type="checkbox" 
                            label="Enable Schedule" 
                            checked={blnIsScheduleEnabled}
                            onchange={handleToggleSchedule}>
                        </lightning-input>
                    </div>
                </div>

                <div class="slds-col slds-size_6-of-12">
                    <template if:true={blnIsScheduleEnabled}>
                        <div class="schedule-section-gray">
                            <p class="slds-text-title_bold slds-m-bottom_small">Do you want to run the campaign on weekends?</p>
                            
                            <div class="slds-grid slds-m-bottom_small">
                                <div class="slds-m-right_xx-large">
                                    <lightning-input type="checkbox" label="Saturday" name="saturday" onchange={handleDayChange}></lightning-input>
                                </div>
                                <div>
                                    <lightning-input type="checkbox" label="Sunday" name="sunday" onchange={handleDayChange}></lightning-input>
                                </div>
                            </div>

                            <button class="custom-push-btn" disabled={isPushDisabled} onclick={handlePushRecord}>
                                Push Record
                            </button>
                        </div>
                    </template>
                </div>
            </div>

            <div class="slds-m-top_xx-large" if:true={selectedMappingId}>
                <button class="custom-upload-btn" onclick={handleUploadData}>
                    Upload Campaign Data
                </button>
            </div>

            <c-fec-upload-campaign-modal
                if:true={blnIsModalOpen}
                selected-campaign-id={selectedMappingId}
                onclose={closeModal}
                onsave={handleUploadFile}>
            </c-fec-upload-campaign-modal>
        </div>
    </div>
</template>
