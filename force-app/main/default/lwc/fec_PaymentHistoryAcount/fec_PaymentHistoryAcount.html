<template>
    <div class="customer-info-container slds-card slds-p-around_small">
        <lightning-accordion active-section-name={activeSections} allow-multiple-sections-open>

            <!-- Payment History -->
            <lightning-accordion-section name="paymentHistory" label="Payment History">

                <div class="slds-m-top_xx-small slds-m-bottom_small">
                    <span class="slds-text-heading_small slds-text-title_bold" style="color: #e11900;">
                        Total Payment Amount:
                    </span>
                    <span class="slds-text-body_regular slds-m-left_x-small">
                        {formattedTotalAmount}
                    </span>
                </div>

                <c-fec_-related-list-addresses-paging 
                        records={paymentHistory} 
                        columns={paymentHistoryColumns}
                        sorted-by="paymentDate"
                        hide-row-number>
                </c-fec_-related-list-addresses-paging>

            </lightning-accordion-section>

            <!-- Real-time Payment -->
            <lightning-accordion-section name="realtimePayment" label="Real-time Payment">

                <c-fec_-related-list-addresses-paging records={realtimePayments} columns={realtimePaymentColumns}
                    sorted-by="paymentDate" show-refresh onrefresh={handleRefreshData}>
                </c-fec_-related-list-addresses-paging>

            </lightning-accordion-section>

        </lightning-accordion>
    </div>
</template>
