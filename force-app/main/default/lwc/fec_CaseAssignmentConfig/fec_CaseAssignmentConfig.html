<template>
  <lightning-card title="Case Assignment Config">
    <div class="slds-p-horizontal_small slds-p-bottom_small">
      <lightning-dual-listbox
        name="queues"
        label="Select Queues"
        source-label="Available"
        selected-label="Chosen"
        options={queueOptions}
        value={selectedQueues}
        onchange={handleQueuesChange}>
      </lightning-dual-listbox>

      <div class="slds-grid slds-gutters slds-m-top_small">
        <div class="slds-col">
          <lightning-combobox
            label="Role"
            value={selectedRole}
            options={roleOptions}
            onchange={handleRoleChange}>
          </lightning-combobox>
        </div>
        <div class="slds-col">
          <lightning-input
            type="number"
            label="Scale"
            min="1"
            step="1"
            value={selectedScale}
            onchange={handleScaleChange}>
          </lightning-input>
        </div>
        <div class="slds-col slds-align-bottom">
          <lightning-button
            label="Add"
            variant="neutral"
            disabled={isAddDisabled}
            onclick={handleAddRole}>
          </lightning-button>
        </div>
      </div>

      <template if:true={hasRoleRows}>
        <div class="slds-m-top_small">
          <table class="slds-table slds-table_cell-buffer slds-table_bordered">
            <thead>
              <tr>
                <th>Role</th>
                <th>Scale</th>
                <th></th>
              </tr>
            </thead>
            <tbody>
              <template for:each={roleRows} for:item="row">
                <tr key={row.key}>
                  <td>{row.role}</td>
                  <td>{row.scale}</td>
                  <td class="slds-text-align_right">
                    <lightning-button-icon
                      icon-name="utility:delete"
                      alternative-text="Remove"
                      data-role={row.role}
                      onclick={handleRemoveRole}>
                    </lightning-button-icon>
                  </td>
                </tr>
              </template>
            </tbody>
          </table>
        </div>
      </template>

      <div class="slds-m-top_small slds-text-align_right">
        <lightning-button
          variant="brand"
          label="Save Config"
          onclick={handleSave}
          disabled={isSaving}>
        </lightning-button>
      </div>
    </div>
  </lightning-card>
</template>
