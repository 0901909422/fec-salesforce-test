<template>
    <lightning-card title="Quản lý dữ liệu khách hàng" icon-name="standard:customers" class="relative-container">
        
        <div slot="actions">
            <lightning-button label="Thêm mới" variant="success" class="slds-m-left_x-small" onclick={handleAddNew}></lightning-button>
            <lightning-button label="Tải lại" variant="success" class="slds-m-left_x-small" onclick={handleReload}></lightning-button>
        </div>

        <div class="slds-p-around_medium">
            <div if:true={isLoading} class="slds-is-relative">
                <lightning-spinner alternative-text="Loading" size="medium"></lightning-spinner>
            </div>
            <div class="slds-m-bottom_large">
                <div class="header-section slds-p-vertical_x-small slds-p-horizontal_small slds-theme_shade slds-border_top slds-border_bottom">
                    <h3 class="slds-text-heading_small"><strong>Tải lên thành công và chờ xử lý</strong></h3>
                </div>
                <c-fec-custom-datatable
                    hide-checkbox-column="true"
                    table-data={uploadedData}
                    columns={columnsPending}
                    onrowaction={handleUploadedRowAction}>
                </c-fec-custom-datatable>
            </div>

            <div class="slds-m-bottom_large">
                <div class="header-section slds-p-vertical_x-small slds-p-horizontal_small slds-theme_shade slds-border_top slds-border_bottom">
                    <h3 class="slds-text-heading_small"><strong>Trường Thông Tin Hiện Có</strong></h3>
                </div>
                <c-fec-custom-datatable
                    hide-checkbox-column="true"
                    table-data={processedData}
                    columns={columnsProcessed}
                    onrowaction={handleProcessedRowAction}>
                </c-fec-custom-datatable>
            </div>
        </div>
    </lightning-card>

    <template if:true={isHistoryModalOpen}>
        <c-fec-customer-history-modal
            history-data={historyData}
            onclose={closeHistoryModal}> 
        </c-fec-customer-history-modal>
    </template>

    <template if:true={isEditModalOpen}>
        <c-fec-customer-upsert-modal
            title={modalTitle}
            initial-data={formData}
            onclose={handleCloseModal}
            onsave={handleSaveModal}>
        </c-fec-customer-upsert-modal>
    </template>
</template>
