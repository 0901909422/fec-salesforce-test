<template>
    <template if:true={isShowModal}>
        <section role="dialog" tabindex="-1" aria-modal="true" class="slds-modal slds-fade-in-open slds-modal_large">
            <div class="slds-modal__container">

                <!-- CLOSE BUTTON -->
                <button class="slds-button slds-button_icon slds-modal__close slds-button_icon-inverse"
                    onclick={handleClose}>
                    <lightning-icon icon-name="utility:close" size="small"></lightning-icon>
                </button>

                <!-- HEADER -->
                <div class="slds-modal__header">
                    <h2 class="slds-text-heading_medium">{labels.CREATE_CASE_INTERNAL}</h2>
                </div>
                <!-- CONTENT -->
                <div class="slds-modal__content slds-p-around_medium">

                    <!-- SEARCH COMPONENT -->
                    <c-fec_-search record-id={recordId}
                            show-skip-button={showSkip}
                            is-selectable="true"
                            oncloserequest={handleCloseModal}
                            onskippedwithoutrecord={handleSkipWithoutRecord}
                            oncreatesuccess={handleCreateSuccess}
                            is-list-view="true">
                    </c-fec_-search>
                </div>
            </div>
        </section>
        <!-- BACKDROP -->
        <div class="slds-backdrop slds-backdrop_open"></div>
    </template>
</template>
