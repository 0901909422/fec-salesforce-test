<template>
    <lightning-card title="Integration Fraud Master Data">

        <!-- ACTION BAR -->
        <div class="slds-m-around_medium">
            <lightning-button 
                variant="brand" 
                label="Sync Master Data"
                onclick={handleImport}
                class="slds-m-right_small">
            </lightning-button>

            <lightning-button 
                label="Reload Master Data"
                onclick={loadMasterData}
                class="slds-m-bottom_medium">
            </lightning-button>
        </div>

        <!-- LOADING SPINNER -->
        <template if:true={isLoading}>
            <div class="slds-m-around_medium">
                <lightning-spinner size="medium"></lightning-spinner>
            </div>
        </template>

        <template if:true={masterData}>
            <lightning-accordion allow-multiple-sections-open>

                <template for:each={masterData} for:item="cat">
                    <lightning-accordion-section key={cat.id} label={cat.name}>

                        <template for:each={cat.subCategories} for:item="sub">
                            <lightning-accordion-section 
                                key={sub.id}
                                label={sub.name}>

                                <template for:each={sub.subCodes} for:item="sc">
                                    <lightning-accordion-section 
                                        key={sc.id}
                                        label={sc.name}>

                                        <p><b>SubCode:</b> {sc.id}</p>

                                        <h3 class="slds-m-top_small">Additional Properties</h3>

                                        <template for:each={sc.additionalProperties} for:item="p">
                                            <p key={p.id}>
                                                <b>{p.name}</b> ({p.type}) - Mandatory: {p.mandatory}
                                            </p>
                                        </template>

                                    </lightning-accordion-section>
                                </template>

                            </lightning-accordion-section>
                        </template>

                    </lightning-accordion-section>
                </template>

            </lightning-accordion>
        </template>
        

    </lightning-card>
</template>
