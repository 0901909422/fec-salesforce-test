<template>
    <lightning-card title="Integration Fraud Master Data">

        <!-- ACTION BAR -->
        <div class="slds-m-around_medium">
            <lightning-button 
                variant="brand" 
                label="Sync Master Data"
                onclick={handleImport}
                class="slds-m-right_small">
            </lightning-button>

            <lightning-button 
                variant="brand-outline" 
                label="Sync Master Location"
                onclick={handleSyncLocation}
                class="slds-m-right_small">
            </lightning-button>

        </div>

        <!-- LOADING SPINNER -->
        <template if:true={isLoading}>
            <div class="slds-m-around_medium">
                <lightning-spinner size="medium"></lightning-spinner>
            </div>
        </template>

        
        

    </lightning-card>
</template>
