<template>
    <lightning-accordion-section name={sectionTitle} label={sectionTitle} class="slds-accordion__section">
        <!-- ================= ACTIONS ================= -->
        <div slot="actions" if:true={showRefreshButton}>
            <lightning-button label="Refresh" variant="brand" onclick={handleRefresh}>
            </lightning-button>
        </div>

        <!-- ================= CONTENT ================= -->
        <div class="slds-form slds-form_horizontal slds-p-around_small" role="list">
            <template for:each={rows} for:item="row">
                <!-- ========== BUTTON ROW ========== -->
                <div key={row.key} if:true={row.isButtonRow} class="slds-m-vertical_x-small">
                    <template for:each={row.buttons} for:item="btn">
                        <lightning-button key={btn.name} label={btn.label} variant={btn.variant} data-name={btn.name}
                            onclick={handleButtonClick} class="slds-m-right_x-small">
                        </lightning-button>
                    </template>
                </div>

                <!-- ========== FIELD ROW ========== -->
                <div key={row.key} if:false={row.isButtonRow} class="slds-form__row">
                    <template for:each={row.fields} for:item="field">
                        <!-- EMPTY -->
                        <div key={field.key} if:true={field.isEmpty} class="slds-form__item" role="listitem"></div>
                        <!-- FULL WIDTH FIELD -->
                        <div key={field.key} if:true={field.isFullWidth} class="slds-form__item slds-size_1-of-1"
                            role="listitem">
                            <div class="slds-form-element slds-form-element_horizontal slds-form-element_readonly">

                                <span class="slds-form-element__label">
                                    <span class="slds-grid slds-grid_vertical-align-center">
                                        <span>{field.label}</span>

                                        <template if:true={field.hasHelpText}>
                                            <lightning-helptext content={field.helpText}
                                                class="slds-m-left_xx-small"></lightning-helptext>
                                        </template>
                                    </span>
                                </span>

                                <div class="slds-form-element__control">
                                    <div class="slds-form-element__static
                                               slds-grid
                                               slds-grid_align-spread
                                               slds-grid_vertical-align-center">
                                        <span>{field.value}</span>

                                        <span>
                                            <template if:true={field.showSuccess}>
                                                <lightning-icon icon-name="utility:success" variant="success"
                                                    size="x-small"></lightning-icon>
                                            </template>

                                            <template if:true={field.showError}>
                                                <lightning-icon icon-name="utility:error" variant="error"
                                                    size="x-small"></lightning-icon>
                                            </template>
                                        </span>
                                    </div>
                                </div>
                            </div>
                        </div>

                        <!-- NORMAL FIELD -->
                        <div key={field.key} if:false={field.isEmpty} class="slds-form__item" role="listitem">
                            <div class="slds-form-element slds-form-element_horizontal slds-form-element_readonly">

                                <span class="slds-form-element__label">
                                    <span class="slds-grid slds-grid_vertical-align-center">
                                        <span>{field.label}</span>

                                        <template if:true={field.hasHelpText}>
                                            <lightning-helptext content={field.helpText}
                                                class="slds-m-left_xx-small"></lightning-helptext>
                                        </template>
                                    </span>
                                </span>

                                <div class="slds-form-element__control">
                                    <div class="slds-form-element__static
                                               slds-grid
                                               slds-grid_align-spread
                                               slds-grid_vertical-align-center">
                                        <span>{field.value}</span>

                                        <span>
                                            <template if:true={field.showSuccess}>
                                                <lightning-icon icon-name="utility:success" variant="success"
                                                    size="x-small"></lightning-icon>
                                            </template>

                                            <template if:true={field.showError}>
                                                <lightning-icon icon-name="utility:error" variant="error"
                                                    size="x-small"></lightning-icon>
                                            </template>
                                        </span>
                                    </div>
                                </div>
                            </div>
                        </div>

                    </template>
                </div>

            </template>
        </div>

    </lightning-accordion-section>
</template>
