<template>
    <lightning-card title="Files" icon-name="standard:file">
        <template if:true={isLoading}>
            <lightning-spinner alternative-text="Loading" size="small"></lightning-spinner>
        </template>

        <template if:false={isLoading}>
            <template if:true={hasFiles}>
                <table class="slds-table slds-table_cell-buffer slds-table_bordered slds-table_col-bordered">
                    <thead>
                        <tr class="slds-line-height_reset">
                            <th scope="col">
                                <div class="slds-truncate" title="Title">
                                    {customLabel.titleAtt}
                                </div>
                            </th>
                            <th scope="col">
                                <div class="slds-truncate" title="Type">
                                    {customLabel.typeAtt}
                                </div>
                            </th>
                            <th scope="col"></th>
                        </tr>
                    </thead>
                    <tbody>
                        <template for:each={files} for:item="file">
                            <tr key={file.s3Key}>
                                <td>
                                    <div class="slds-truncate">
                                        {file.filename}
                                    </div>
                                </td>
                                <td><div class="slds-truncate">{file.extension}</div></td>
                                <td>
                                    <div class="slds-grid slds-grid_vertical-align-center">
                                        <a href="#" onclick={handleDownload} data-s3key={file.s3Key} title={file.filename}
                                           class={file.downloadLinkClass}>
                                            {customLabel.downloadAtt}
                                        </a>
                                        <template if:true={file.isDownloading}>
                                            <lightning-spinner alternative-text="Downloading" size="xx-small" class="slds-m-left_x-small"></lightning-spinner>
                                        </template>
                                    </div>
                                </td>
                            </tr>
                        </template>
                    </tbody>
                </table>
            </template>

            <template if:false={hasFiles}>
                <div class="slds-p-around_medium slds-text-align_center slds-text-color_weak">
                    {customLabel.noAttachment}
                </div>
            </template>
        </template>
    </lightning-card>
</template>
