<template>
    <template if:false={isEditMode}>
        <article class="slds-card">
            <div class="slds-card__header slds-grid">
                <header class="slds-media slds-media_center slds-has-flexi-truncate">
                    <div class="slds-media__body">
                        <h2 class="slds-card__header-title"><span>Detail Information</span></h2>
                    </div>
                </header>
            </div>
            <div class="slds-card__body">
                <div class="slds-grid slds-wrap detail-grid">
                    <div class="slds-col slds-size_1-of-2 detail-row">
                        <span class="detail-label">GA Name</span>
                        <span class="detail-value">{record.Name}</span>
                    </div>
                    <div class="slds-col slds-size_1-of-2 detail-row">
                        <span class="detail-label">Customer Type</span>
                        <span class="detail-value">{record.FEC_Customer_Type__c}</span>
                    </div>
                    <div class="slds-col slds-size_1-of-2 detail-row">
                        <span class="detail-label">Channel</span>
                        <span class="detail-value">{record.FEC_Channel__c}</span>
                    </div>
                    <div class="slds-col slds-size_1-of-2 detail-row">
                        <span class="detail-label">General Assignment Name</span>
                        <span class="detail-value">{record.FEC_General_Assignment_Name__c}</span>
                    </div>
                    <div class="slds-col slds-size_1-of-2 detail-row">
                        <span class="detail-label">General Assignment Code</span>
                        <span class="detail-value">{record.FEC_General_Assignment_Code__c}</span>
                    </div>
                    <div class="slds-col slds-size_1-of-2 detail-row">
                        <span class="detail-label">Active</span>
                        <span class="detail-value">
                            <template if:true={record.FEC_Active__c}>
                                <lightning-icon icon-name="utility:check" size="x-small"></lightning-icon>
                            </template>
                            <template if:false={record.FEC_Active__c}>
                                <span>-</span>
                            </template>
                        </span>
                    </div>
                </div>
            </div>
        </article>
    </template>

    <template if:true={isEditMode}>
        <article class="slds-card">
            <div class="slds-card__header slds-grid">
                <header class="slds-media slds-media_center slds-has-flexi-truncate">
                    <div class="slds-media__body">
                        <h2 class="slds-card__header-title"><span>Detail Information</span></h2>
                    </div>
                </header>
            </div>
            <div class="slds-card__body slds-card__body_inner">
                <div class="slds-grid slds-gutters slds-wrap">
                    <!-- Customer Type -->
                    <div class="slds-col slds-size_1-of-2 slds-m-bottom_small">
                        <lightning-combobox
                            label="Customer Type"
                            value={editCustomerType}
                            options={customerTypeOptions}
                            onchange={handleCustomerTypeChange}>
                        </lightning-combobox>
                    </div>

                    <!-- Channel search+tag -->
                    <div class="slds-col slds-size_1-of-2 slds-m-bottom_small">
                        <div class="slds-form-element">
                            <label class="slds-form-element__label">Channel</label>
                            <div class="slds-form-element__control">
                                <div class={channelComboboxClass}>
                                    <div class="slds-combobox__form-element slds-input-has-icon slds-input-has-icon_right" role="none">
                                        <input type="text" class="slds-input slds-combobox__input"
                                            placeholder="Search Channel"
                                            value={channelSearchTerm}
                                            oninput={handleChannelSearch}
                                            onfocus={handleChannelFocus}
                                            onblur={handleChannelBlur} />
                                        <span class="slds-icon_container slds-input__icon slds-input__icon_right">
                                            <lightning-icon icon-name="utility:search" size="x-small"></lightning-icon>
                                        </span>
                                    </div>
                                    <template if:true={showChannelDropdown}>
                                        <div class="slds-dropdown slds-dropdown_length-5 slds-dropdown_fluid" role="listbox">
                                            <ul class="slds-listbox slds-listbox_vertical" role="presentation">
                                                <template for:each={filteredChannelOptions} for:item="opt">
                                                    <li key={opt.value} role="presentation" class="slds-listbox__item">
                                                        <div class="slds-media slds-listbox__option slds-listbox__option_plain slds-media_small"
                                                            role="option" data-value={opt.value} onclick={handleChannelSelect}>
                                                            <span class="slds-media__body">
                                                                <span class="slds-truncate">{opt.label}</span>
                                                            </span>
                                                        </div>
                                                    </li>
                                                </template>
                                            </ul>
                                        </div>
                                    </template>
                                </div>
                                <template if:true={selectedChannels.length}>
                                    <div class="slds-m-top_x-small">
                                        <template for:each={selectedChannels} for:item="ch">
                                            <lightning-pill key={ch} label={ch} name={ch} onremove={handleChannelRemove}></lightning-pill>
                                        </template>
                                    </div>
                                </template>
                            </div>
                        </div>
                    </div>

                    <!-- General Assignment Name search+tag -->
                    <div class="slds-col slds-size_1-of-2 slds-m-bottom_small">
                        <div class="slds-form-element">
                            <label class="slds-form-element__label">General Assignment Name</label>
                            <div class="slds-form-element__control">
                                <div class={gaComboboxClass}>
                                    <div class="slds-combobox__form-element slds-input-has-icon slds-input-has-icon_right" role="none">
                                        <input type="text" class="slds-input slds-combobox__input"
                                            placeholder="Search General Assignment Name"
                                            value={gaSearchTerm}
                                            oninput={handleGASearch}
                                            onfocus={handleGAFocus}
                                            onblur={handleGABlur} />
                                        <span class="slds-icon_container slds-input__icon slds-input__icon_right">
                                            <lightning-icon icon-name="utility:search" size="x-small"></lightning-icon>
                                        </span>
                                    </div>
                                    <template if:true={showGADropdown}>
                                        <div class="slds-dropdown slds-dropdown_length-5 slds-dropdown_fluid" role="listbox">
                                            <ul class="slds-listbox slds-listbox_vertical" role="presentation">
                                                <template for:each={filteredGAOptions} for:item="opt">
                                                    <li key={opt.value} role="presentation" class="slds-listbox__item">
                                                        <div class="slds-media slds-listbox__option slds-listbox__option_plain slds-media_small"
                                                            role="option" data-value={opt.value} onclick={handleGASelect}>
                                                            <span class="slds-media__body">
                                                                <span class="slds-truncate">{opt.label}</span>
                                                            </span>
                                                        </div>
                                                    </li>
                                                </template>
                                            </ul>
                                        </div>
                                    </template>
                                </div>
                                <template if:true={selectedGANames.length}>
                                    <div class="slds-m-top_x-small">
                                        <template for:each={selectedGANames} for:item="gaName">
                                            <lightning-pill key={gaName} label={gaName} name={gaName} onremove={handleGARemove}></lightning-pill>
                                        </template>
                                    </div>
                                </template>
                            </div>
                        </div>
                    </div>

                    <!-- GA Code: editable, auto-filled when GA Name selected -->
                    <div class="slds-col slds-size_1-of-2 slds-m-bottom_small">
                        <lightning-input label="General Assignment Code" value={gaCodeDisplay} onchange={handleGACodeChange}></lightning-input>
                    </div>

                    <!-- Active -->
                    <div class="slds-col slds-size_1-of-1 slds-m-bottom_small">
                        <div class="slds-form-element">
                            <label class="slds-form-element__label">Active</label>
                            <div class="slds-form-element__control">
                                <input type="checkbox" checked={editActive} onchange={handleActiveChange} />
                            </div>
                        </div>
                    </div>
                </div>

                <div class="slds-text-align_center slds-m-top_medium">
                    <lightning-button label="Cancel" onclick={handleCancel} class="slds-m-right_small"></lightning-button>
                    <lightning-button variant="brand" label="Save" onclick={handleSave}></lightning-button>
                </div>
            </div>
        </article>
    </template>
</template>
