<template>
    <lightning-card title={cardTitle} icon-name="standard:people">
        <div slot="actions">
            <lightning-button-icon 
                icon-name="utility:refresh" 
                alternative-text="Refresh"
                onclick={handleRefresh}>
            </lightning-button-icon>
        </div>

        <div class="slds-p-horizontal_medium slds-p-bottom_medium">
            <template if:true={isLoading}>
                <div class="slds-text-align_center slds-p-around_medium">
                    <lightning-spinner alternative-text="Loading..." size="small"></lightning-spinner>
                </div>
            </template>

            <template if:false={isLoading}>
                <div class="slds-text-body_small slds-m-bottom_small">
                    {recordInfo}
                </div>

                <lightning-datatable
                    key-field="odtId"
                    data={watchers}
                    columns={columns}
                    hide-checkbox-column
                    show-row-number-column
                    sorted-by={sortedBy}
                    sorted-direction={sortDirection}
                    onsort={handleSort}>
                </lightning-datatable>

                <template if:true={showPagination}>
                    <div class="pagination-bar">
                        <div class="pagination-section">
                            <span class="pagination-label">Page size</span>
                            <lightning-combobox
                                value={pageSizeStr}
                                options={pageSizeOptions}
                                onchange={handlePageSizeChange}
                                variant="label-hidden"
                                label="Page size"
                                class="page-size-combobox">
                            </lightning-combobox>
                        </div>
                        <div class="pagination-section">
                            <button class="nav-btn" disabled={isFirstPage} onclick={handlePrevPage}>
                                <lightning-icon icon-name="utility:chevronleft" size="xx-small"></lightning-icon>
                            </button>
                            <button class="current-page-btn" disabled>{currentPage}</button>
                            <button class="nav-btn" disabled={isLastPage} onclick={handleNextPage}>
                                <lightning-icon icon-name="utility:chevronright" size="xx-small"></lightning-icon>
                            </button>
                        </div>
                        <div class="pagination-section">
                            <span class="pagination-label">Go to</span>
                            <input
                                type="text"
                                value={gotoPageInputValue}
                                onkeydown={handleGotoKeydown}
                                oninput={handleGoToPageInput}
                                class="goto-input"
                            />
                            <lightning-button
                                label="Go"
                                variant="brand"
                                onclick={handleGoToPage}>
                            </lightning-button>
                        </div>
                    </div>
                </template>
            </template>
        </div>
    </lightning-card>
</template>
