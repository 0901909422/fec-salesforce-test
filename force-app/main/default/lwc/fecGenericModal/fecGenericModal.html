<template>
    <section role="dialog" tabindex="-1" class={modalClass}>
        <div class="slds-modal__container">
            <header class="slds-modal__header">
                <button class="slds-button slds-button_icon slds-modal__close slds-button_icon-inverse" title="Close" onclick={handleClose}>
                    <lightning-icon icon-name="utility:close" size="small" variant="inverse"></lightning-icon>
                </button>
                <h2 class="slds-modal__title slds-hyphenate">{title}</h2>
            </header>

            <div class="slds-modal__content slds-p-around_medium" id="modal-content-id-1">
                <slot></slot> 
            </div>

            <footer class="slds-modal__footer">
                <slot name="footer">
                    <lightning-button label="Đóng" onclick={handleClose}></lightning-button>
                </slot>
            </footer>
        </div>
    </section>
    <div class="slds-backdrop slds-backdrop_open"></div>
</template>
