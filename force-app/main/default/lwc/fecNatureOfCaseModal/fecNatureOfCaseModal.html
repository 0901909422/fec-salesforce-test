<template>
    <lightning-modal-header label={modalTitle}></lightning-modal-header>

    <lightning-modal-body>
        <lightning-layout multiple-rows>
            <template if:true={isShowCustomerType}>
                <div class="slds-col slds-size_1-of-1 slds-p-around_small">
                    <lightning-combobox name={FIELD_CUSTOMER_TYPE} label={labelCustomerType} value={customerTypeValue}
                        options={customerTypeOptions} onchange={handleCustomerTypeChange} required>
                    </lightning-combobox>
                </div>
            </template>

            <lightning-layout-item size="12" medium-device-size="12"
                class="slds-p-horizontal_small slds-m-bottom_small">
                <lightning-input 
                    data-field="inputCode"
                    label={labelCodeId} 
                    onchange={handleInputChange} 
                    required
                    value={strCode}>
                </lightning-input>
            </lightning-layout-item>

            <lightning-layout-item size="12" medium-device-size="12"
                class="slds-p-horizontal_small slds-m-bottom_small">
                <lightning-input 
                    data-field="inputAlias"
                    label={labelAlias} 
                    onchange={handleInputChange} 
                    required
                    value={strAlias}>
                </lightning-input>
            </lightning-layout-item>

            <lightning-layout-item size="12" medium-device-size="12"
                class="slds-p-horizontal_small slds-m-bottom_small">
                <lightning-input 
                    data-field="inputName"
                    label={labelNameEn} 
                    onchange={handleInputChange} 
                    required
                    value={strName}>
                </lightning-input>
            </lightning-layout-item>

            <lightning-layout-item size="12" medium-device-size="12"
                class="slds-p-horizontal_small slds-m-bottom_small">
                <lightning-input 
                    data-field="inputNameVN"
                    label={labelNameVn} 
                    onchange={handleInputChange}
                    required 
                    value={strNameVN}>
                </lightning-input>
            </lightning-layout-item>

            <lightning-layout-item size="12" medium-device-size="1" class="slds-p-horizontal_small slds-m-bottom_small">
                <lightning-input 
                    data-field="inputOrder"
                    label={labelOrder} 
                    type="number"
                    onchange={handleInputChange} 
                    value={intPosOrder}>
                </lightning-input>
            </lightning-layout-item>

            <lightning-layout-item size="12" medium-device-size="6" class="slds-p-horizontal_small slds-m-bottom_small">
                <div class="slds-m-top_large">
                    <lightning-input 
                        data-field="inputStatus"
                        label={labelStatus} 
                        type="checkbox"
                        onchange={handleInputChange} 
                        checked={isStatus}>
                    </lightning-input>
                </div>
            </lightning-layout-item>
        </lightning-layout>
    </lightning-modal-body>

    <lightning-modal-footer>
        <lightning-button label={labelCancel} onclick={handleClose}></lightning-button>
        <lightning-button variant="brand" label={labelSave} onclick={handleSave}></lightning-button>
        <lightning-button variant="brand" label={labelSaveAndNew} onclick={handleSaveAndNew}></lightning-button>
    </lightning-modal-footer>
</template>
