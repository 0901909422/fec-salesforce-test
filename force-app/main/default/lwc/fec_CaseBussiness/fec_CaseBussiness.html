<template>
  <c-fec_-spinner is-loaded={isLoaded}></c-fec_-spinner>

  <lightning-accordion
    if:true={businessLoaded}
    allow-multiple-sections-open
    active-section-name={activeSectionlst}
  >
    <!-- section -->
    <template for:each={business.sectionlst} for:item="section">
      <lightning-accordion-section
        key={section.id}
        name={section.id}
        label={section.name}
      >
        <div class="error" if:true={section.hasError}>
          <p>{section.error.label}</p>
          <p>{customLabel.reasonLabel}:</p>
          <template for:each={section.error.errorPanellst} for:item="item">
            <p key={item.id}>{item.value}</p>
          </template>
        </div>
        <div class="slds-grid slds-wrap slds-m-top--small">
          <!-- subsection -->
          <template for:each={section.subSectionlst} for:item="subSection">
            <div key={subSection.name} class={subSection.className}>
              <p class="sub-section">{subSection.name}</p>

              <template for:each={subSection.objlst} for:item="obj">
                <lightning-record-edit-form
                  key={obj.id}
                  object-api-name={obj.name}
                  onsuccess={handleSuccess}
                  record-id={obj.id}
                >
                  <div class="slds-grid slds-wrap">
                    <template for:each={obj.fieldlst} for:item="field">
                      <!-- editable -->
                      <div
                        key={field.apiName}
                        if:false={field.isHidden}
                        class="slds-col slds-size_1-of-1 slds-medium-size_6-of-12"
                      >
                        <!-- editable -->
                        <div
                          if:true={field.editable}
                          class="edit slds-m-around--small slds-p-around--x-small"
                        >
                          <p class="label">
                            {field.label}
                            <abbr if:true={field.mandatory} title="*">*</abbr>
                            <lightning-helptext
                              if:true={field.hasHelpText}
                              class="slds-m-left--x-small"
                              content={field.helpText}
                            ></lightning-helptext>
                          </p>

                          <lightning-input-field
                            data-section={section.id}
                            data-sub={subSection.name}
                            data-obj-name={obj.name}
                            data-obj={obj.id}
                            variant="label-hidden"
                            field-name={field.apiName}
                            required={field.mandatory}
                            onchange={handleChangeInput}
                            value={field.value}
                          >
                          </lightning-input-field>
                        </div>

                        <!-- readonly -->
                        <div
                          if:true={field.readonly}
                          class="read slds-border--bottom slds-m-around--small slds-p-around--x-small"
                        >
                          <p class="label">
                            {field.label}
                            <lightning-helptext
                              if:true={field.hasHelpText}
                              class="slds-m-left--x-small"
                              content={field.helpText}
                            ></lightning-helptext>
                          </p>
                          <p class="value">
                            {field.value}
                            <lightning-icon
                              if:true={field.masked}
                              data-section={section.id}
                              data-sub={subSection.name}
                              data-obj={obj.id}
                              data-field={field.apiName}
                              icon-name="utility:hide"
                              size="x-small"
                              class="slds-m-left--small"
                              onclick={handleToggleMask}
                            >
                            </lightning-icon>
                          </p>
                        </div>
                      </div>
                    </template>
                  </div>
                </lightning-record-edit-form>
              </template>
            </div>
          </template>
        </div>

        <!-- process action -->
        <template if:true={finalShowProcessAction}>
          <div class="process-action" if:true={section.isLastSection}>
            <template for:each={business.processActionlst} for:item="process">
              <lightning-button
                key={process.value}
                variant="brand"
                label={process.label}
                onclick={handleProcessAction}
                class="slds-m-right_x-small"
                data-id={process.value}
              ></lightning-button>
            </template>
          </div>
        </template>

        <template if:true={section.isLastSection}>
          <div
            if:true={isProcessActionFailed}
            class="process-action-result process-action-result--error"
          >
            <p>{processActionMsg}</p>
          </div>

          <div
            if:true={isProcessActionSuccessed}
            class="process-action-result process-action-result--success"
          >
            <p>{processActionMsg}</p>
          </div>
        </template>
      </lightning-accordion-section>
    </template>

    <!-- routing action -->
    <lightning-accordion-section
      if:true={business.hasRoutingAction}
      name="routing-action"
      label={customLabel.routingActionLabel}
    >
      <div class="slds-grid slds-wrap slds-m-top--small">
        <div class="slds-col slds-size_1-of-1 slds-medium-size_6-of-12">
          <lightning-select
            data-id="routing-action"
            label={customLabel.actionLabel}
            value={actionValue}
            options={business.routingActionlst}
            onchange={handleChangeAction}
            required
          ></lightning-select>
        </div>

        <div
          if:true={showRouteTo}
          class="route-to-info slds-col slds-size_1-of-1 slds-medium-size_6-of-12"
        >
          <div
            class="route-to-info__item read slds-border--bottom slds-m-around--small slds-p-around--x-small"
          >
            <p class="label">{customLabel.teamLabel}</p>
            <p class="value">{business.nextTeam}</p>
          </div>

          <div
            class="route-to-info__item read slds-border--bottom slds-m-around--small slds-p-around--x-small"
          >
            <p class="label">{customLabel.queueLabel}</p>
            <p class="value">{business.nextQueue.label}</p>
          </div>
        </div>

        <div
          if:true={showRevert}
          class="route-to-info slds-col slds-size_1-of-1 slds-medium-size_6-of-12"
        >
          <div
            class="route-to-info__item read slds-border--bottom slds-m-around--small slds-p-around--x-small"
          >
            <p class="label">{customLabel.decisionLabel}</p>
            <p class="value">{business.lastUser}</p>
          </div>
        </div>
      </div>
    </lightning-accordion-section>
  </lightning-accordion>

  <c-fec_-modal
    header={header}
    onclose={handleCloseModal}
    if:true={isModalOpen}
  >
    <div slot="content">
      <div class="t-a-c"><p>{content}</p></div>
    </div>
    <div slot="footer">
      <lightning-button
        label="Không"
        onclick={handleCloseModal}
      ></lightning-button>

      <lightning-button
        variant="brand"
        label="Có"
        onclick={handleRun}
        class="slds-m-left_x-small"
      ></lightning-button>
    </div>
  </c-fec_-modal>
</template>
