<template>
    <template lwc:if={isNewMode}>
        <div class="slds-brand-band slds-brand-band_cover slds-brand-band_medium page-container">
            <div class="slds-grid slds-grid_align-center slds-p-bottom_xlarge">
                <div
                    class="slds-col slds-size_1-of-1 slds-medium-size_10-of-12 slds-large-size_8-of-12 main-content-card">
                    <div class="slds-p-around_medium slds-border_bottom header-title">
                        <h1 class="slds-text-heading_medium">{labels.newEnhancedLetterhead}</h1>
                    </div>
                    <div class="slds-text-align_right slds-text-align_right slds-p-right_xx-large">
                        <abbr class="slds-required  slds-text-color_error " title="required">*</abbr>
                        {labels.requireInfoLabel}
                    </div>
                    <template if:true={hasErrors}>
                        <div class="slds-box slds-box_small slds-theme_error slds-m-around_medium">
                            <div class="slds-p-around_x-small">
                                <h2 class="slds-text-heading_small">{labels.reviewErrorLabel}</h2>
                            </div>
                        </div>
                        <p class="slds-text-color_error slds-m-left_medium">{errorMessage}</p>
                    </template>
                    <div class="slds-p-around_medium">

                        <div class="slds-section slds-is-open">
                            <h3 class="slds-section__title slds-theme_shade">
                                <span class="slds-truncate slds-p-horizontal_small"
                                    title={labels.informationLabel}>{labels.informationLabel}</span>
                            </h3>
                            <div class="slds-grid slds-wrap slds-p-top_small">
                                <div class="slds-col slds-size_1-of-2 slds-p-right_medium">
                                    <lightning-input max-length="80" value={name} class="name-input"
                                        label={labels.nameLabel} required
                                        onchange={handleNameChange}>{labels.nameLabel}</lightning-input>
                                </div>
                                <div class="slds-col slds-size_1-of-2">
                                    <lightning-input max-length="255" value={description}
                                        label={labels.descriptionLabel}
                                        onchange={handleDescChange}>{labels.descriptionLabel}</lightning-input>
                                </div>
                            </div>
                        </div>

                        <div class="slds-section slds-is-open slds-m-top_medium">
                            <h3 class="slds-section__title slds-theme_shade">
                                <span class="slds-truncate slds-p-horizontal_small">{labels.contentLabel}</span>
                            </h3>
                            <p class="slds-p-vertical_small slds-text-body_small slds-text-color_weak custom-font-size">
                                {labels.contentInfoLabel}
                            </p>

                            <div class="slds-grid slds-m-top_small">
                                <div class="slds-col slds-size_1-of-12 slds-p-top_x-small">
                                    <label class="slds-form-element__label">{labels.headerInfo}</label>
                                </div>
                                <div class="slds-col slds-size_11-of-12">
                                    <lightning-input-rich-text max-length="131072" class="header-input"
                                        data-id="headerEditor" value={header} onchange={handleHeaderChange}>
                                    </lightning-input-rich-text>
                                    <div class="custom-bottom-toolbar">
                                        <button class="merge-field-button" onclick={openMergePicker}
                                            data-target="header">
                                            <p class="slds-m-bottom_xx-small">{getMergeFieldLabel}</p>
                                        </button>
                                    </div>
                                </div>
                            </div>

                            <div class="slds-grid slds-m-top_large slds-m-bottom_large">
                                <div class="slds-col slds-size_1-of-12 slds-p-top_x-small">
                                    <label class="slds-form-element__label">{labels.footerInfo}</label>
                                </div>
                                <div class="slds-col slds-size_11-of-12">
                                    <lightning-input-rich-text max-length="131072" class="footer-input" value={footer}
                                        onchange={handleFooterChange}></lightning-input-rich-text>
                                    <div class="custom-bottom-toolbar">
                                        <button class="merge-field-button" onclick={openMergePicker}
                                            data-target="footer">
                                            <p class="slds-m-bottom_xx-small">{getMergeFieldLabel}</p>
                                        </button>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>

                    <div class="slds-p-around_medium slds-border_top slds-align_absolute-center">
                        <lightning-button label={labels.buttonCancel} onclick={handleCancel}
                            class="slds-m-right_x-small"></lightning-button>
                        <lightning-button label={labels.buttonSave} variant="brand"
                            onclick={handleSave}></lightning-button>
                    </div>

                </div>
            </div>
        </div>
    </template>

    <template if:false={isNewMode}>
        <section role="dialog" tabindex="-1" aria-modal="true" 
            class="slds-modal slds-fade-in-open slds-modal_small">
            <div class={containerCss}>
                <button class="slds-button slds-button_icon slds-modal__close" onclick={handleCancel}>
                    <p class="custom-font-24">X</p>
                    <span class="slds-assistive-text">Cancel and close</span>
                </button>
                <div class="slds-modal__header">
                    <h1 id="modal-heading-01" class="slds-modal__title slds-hyphenate" tabindex="-1">{headerTitle}</h1>
                </div>
                <div class="slds-modal__content slds-p-around_medium" >
                    <div class="">
                            <div class="slds-text-align_right slds-text-align_right slds-p-right_xx-large">
                                <abbr class="slds-required  slds-text-color_error " title="required">*</abbr>
                                {labels.requireInfoLabel}
                            </div>
                            <template if:true={hasErrors}>
                                <div class="slds-box slds-box_small slds-theme_error slds-m-around_medium">
                                    <div class="slds-p-around_x-small">
                                        <h2 class="slds-text-heading_small">{labels.reviewErrorLabel}</h2>
                                    </div>
                                </div>
                                <p class="slds-text-color_error slds-m-left_medium">{errorMessage}</p>
                            </template>
                            <div class="slds-p-around_medium">

                                <div class="slds-section slds-is-open">
                                    <h3 class="slds-section__title slds-theme_shade">
                                        <span class="slds-truncate slds-p-horizontal_small"
                                            title={labels.informationLabel}>{labels.informationLabel}</span>
                                    </h3>
                                    <div class="slds-grid slds-wrap slds-p-top_small">
                                        <div class="slds-col slds-size_1-of-2 slds-p-right_medium">
                                            <lightning-input max-length="80" value={name} class="name-input"
                                                label={labels.nameLabel} required
                                                onchange={handleNameChange}>{labels.nameLabel}</lightning-input>
                                        </div>
                                        <div class="slds-col slds-size_1-of-2">
                                            <lightning-input max-length="255" value={description}
                                                label={labels.descriptionLabel}
                                                onchange={handleDescChange}>{labels.descriptionLabel}</lightning-input>
                                        </div>
                                    </div>
                                </div>

                                <div class="slds-section slds-is-open slds-m-top_medium">
                                    <h3 class="slds-section__title slds-theme_shade">
                                        <span class="slds-truncate slds-p-horizontal_small">{labels.contentLabel}</span>
                                    </h3>
                                    <p
                                        class="slds-p-vertical_small slds-text-body_small slds-text-color_weak custom-font-size">
                                        {labels.contentInfoLabel}
                                    </p>

                                    <div class="slds-grid slds-m-top_small">
                                        <div class="slds-col slds-size_1-of-12 slds-p-top_x-small">
                                            <label class="slds-form-element__label">{labels.headerInfo}</label>
                                        </div>
                                        <div class="slds-col slds-size_11-of-12">
                                            <lightning-input-rich-text max-length="131072" class="header-input"
                                                data-id="headerEditor" value={header} onchange={handleHeaderChange}>
                                            </lightning-input-rich-text>
                                            <div class="custom-bottom-toolbar">
                                                <button class="merge-field-button" onclick={openMergePicker}
                                                    data-target="header">
                                                    <p class="slds-m-bottom_xx-small">{getMergeFieldLabel}</p>
                                                </button>
                                            </div>
                                        </div>
                                    </div>

                                    <div class="slds-grid slds-m-top_large slds-m-bottom_large">
                                        <div class="slds-col slds-size_1-of-12 slds-p-top_x-small">
                                            <label class="slds-form-element__label">{labels.footerInfo}</label>
                                        </div>
                                        <div class="slds-col slds-size_11-of-12">
                                            <lightning-input-rich-text max-length="131072" class="footer-input"
                                                value={footer}
                                                onchange={handleFooterChange}></lightning-input-rich-text>
                                            <div class="custom-bottom-toolbar">
                                                <button class="merge-field-button" onclick={openMergePicker}
                                                    data-target="footer">
                                                    <p class="slds-m-bottom_xx-small">{getMergeFieldLabel}</p>
                                                </button>
                                            </div>
                                        </div>
                                    </div>
                                </div>
                            </div>
                    </div>
                </div>
                <div class="slds-modal__footer">
                    <div class="slds-grid slds-float_right">
                        <lightning-button label={labels.buttonCancel} onclick={handleCancel} class="slds-m-right_x-small"></lightning-button>
                        <lightning-button label={labels.buttonSave} variant="brand" onclick={handleSave}></lightning-button>
                    </div>
                </div>
            </div>
        </section>
        
        <div class={backdropCss}></div>
    </template>
    <template if:true={isPickerOpen}>
        <c-fec_-merge-field-picker onclose={handleClosePicker} oninsert={handleMergeFieldInsert}>
        </c-fec_-merge-field-picker>
    </template>
</template>
