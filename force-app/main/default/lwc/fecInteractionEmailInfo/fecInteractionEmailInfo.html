<template>
  <lightning-accordion class="interaction-email-infor" allow-multiple-sections-open active-section-name={activeSections}>
    <lightning-accordion-section name="interactionEmailInfo" label={labels.interactionEmailInfo}>
      <template if:true={isInteractionCase}>
        <div class="slds-p-horizontal_medium slds-p-vertical_small">
          <div class="interaction-grid">
            <div class="col">
              <div class="row">
                <span class="label">{labels.interactionEmail}</span>
                <span class="value">
                  <template if:true={isEmailReadOnly}>
                    {displayInteractionEmail}
                  </template>
                  <template if:false={isEmailReadOnly}>
                    <template if:true={isEditingEmail}>
                      <lightning-input type="email" value={emailDraft} onchange={handleEmailChange} variant="label-hidden" placeholder={labels.inputPlaceholder} message-when-value-missing={labels.emailRequiredMsg}></lightning-input>
                      <template if:true={emailError}>
                        <span class="error-text">{emailError}</span>
                      </template>
                    </template>
                    <template if:false={isEditingEmail}></template>
                  </template>
                </span>
                <span>
                  <template if:true={showEmailEditIcon}>
                    <lightning-icon icon-name="utility:edit" size="x-small" class="edit-icon" onclick={handleEditEmail}></lightning-icon>
                  </template>
                  <template if:true={isEditingEmail}>
                    <lightning-icon icon-name="utility:check" size="x-small" class="edit-icon save-icon" onclick={handleSaveEmail}></lightning-icon>
                    <lightning-icon icon-name="utility:close" size="x-small" class="edit-icon" onclick={handleCancelEditEmail}></lightning-icon>
                  </template>
                </span>
              </div>
              <div class="row">
                <span class="label">{labels.interactionCreatedOn}</span>
                <span class="value">{createdOn}</span>
                <span></span>
              </div>
              <div class="row">
                <span class="label">{labels.interactionCreatedBy}</span>
                <span class="value">{createdBy}</span>
                <span></span>
              </div>
              <template if:true={showClosedOnlyFields}>
                <div class="row">
                  <span class="label">{labels.outcomeCode}</span>
                  <span class="value">{outcomeCode}</span>
                  <span></span>
                </div>
              </template>
            </div>
            <div class="col">
              <div class="row">
                <span class="label">{labels.sendTo}</span>
                <span class="value">{sendTo}</span>
                <span></span>
              </div>
              <template if:true={showOnHold}>
                <div class="row">
                  <span class="label">
                    {labels.onHold}
                    <lightning-helptext content={labels.onHoldHelpText} class="slds-m-left_xx-small"></lightning-helptext>
                  </span>
                  <span class="value">
                    <lightning-input type="checkbox" checked={onHold} onchange={handleOnHoldChange} disabled={isReview}></lightning-input>
                  </span>
                  <span></span>
                </div>
              </template>
              <div class="row">
                <span class="label">{labels.parentId}</span>
                <span class="value">
                  <template if:true={showParentIdLink}>
                    <a href="javascript:void(0);" class="parent-link" onclick={handleNavigateToParent}>
                      {parentId}
                    </a>
                  </template>
                </span>
                <span></span>
              </div>
              <template if:true={showClosedOnlyFields}>
                <div class="row">
                  <span class="label">{labels.interactionRemark}</span>
                  <span class="value">{interactionRemark}</span>
                  <span></span>
                </div>
              </template>
            </div>
          </div>
        </div>
      </template>

      <template if:true={isCustomerCase}>
        <div class="slds-p-horizontal_medium slds-p-vertical_small">
          <div class="interaction-grid">
            <div class="col">
              <div class="row">
                <span class="label">{labels.interactionEmail}</span>
                <span class="value">
                  <template if:true={isEmailReadOnly}>
                    {displayInteractionEmail}
                  </template>
                  <template if:false={isEmailReadOnly}>
                    <template if:true={isEditingEmail}>
                      <lightning-input type="email" value={emailDraft} onchange={handleEmailChange} variant="label-hidden" placeholder={labels.inputPlaceholder}></lightning-input>
                      <template if:true={emailError}>
                        <span class="error-text">{emailError}</span>
                      </template>
                    </template>
                    <template if:false={isEditingEmail}>
                      <span class="empty">{labels.empty}</span>
                    </template>
                  </template>
                </span>
                <span>
                  <template if:true={showEmailEditIcon}>
                    <lightning-icon icon-name="utility:edit" size="x-small" class="edit-icon" onclick={handleEditEmail}></lightning-icon>
                  </template>
                  <template if:true={isEditingEmail}>
                    <lightning-icon icon-name="utility:check" size="x-small" class="edit-icon save-icon" onclick={handleSaveEmail}></lightning-icon>
                    <lightning-icon icon-name="utility:close" size="x-small" class="edit-icon" onclick={handleCancelEditEmail}></lightning-icon>
                  </template>
                </span>
              </div>
              <div class="row">
                <span class="label">{labels.interactionCreatedOn}</span>
                <span class="value">{createdOn}</span>
                <span></span>
              </div>
              <div class="row">
                <span class="label">{labels.interactionCreatedBy}</span>
                <span class="value">{createdBy}</span>
                <span></span>
              </div>
              <template if:true={showClosedOnlyFields}>
                <div class="row">
                  <span class="label">{labels.outcomeCode}</span>
                  <span class="value">{outcomeCode}</span>
                  <span></span>
                </div>
              </template>
            </div>
            <div class="col">
              <div class="row">
                <span class="label">{labels.sendTo}</span>
                <span class="value">{sendTo}</span>
                <span></span>
              </div>
              <template if:true={showOnHold}>
                <div class="row">
                  <span class="label">
                    {labels.onHold}
                    <lightning-helptext content={labels.onHoldHelpText} class="slds-m-left_xx-small"></lightning-helptext>
                  </span>
                  <span class="value">
                    <lightning-input type="checkbox" checked={onHold} onchange={handleOnHoldChange} disabled="true"></lightning-input>
                  </span>
                  <span></span>
                </div>
              </template>
              <div class="row">
                <span class="label">{labels.parentId}</span>
                <span class="value">
                  <template if:true={showParentIdLink}>
                    <a href="javascript:void(0);" class="parent-link" onclick={handleNavigateToParent}>
                      {parentId}
                    </a>
                  </template>
                </span>
                <span></span>
              </div>
              <template if:true={showClosedOnlyFields}>
                <div class="row">
                  <span class="label">{labels.interactionRemark}</span>
                  <span class="value">{interactionRemark}</span>
                  <span></span>
                </div>
              </template>
            </div>
          </div>
        </div>
      </template>
    </lightning-accordion-section>
  </lightning-accordion>
</template>
