<template>
  <lightning-accordion class="interaction-email-infor" allow-multiple-sections-open
    active-section-name={activeSections}>
    <lightning-accordion-section name="interactionEmailInfo" label={labels.interactionEmailInfo}>
      <template if:true={isInteractionCase}>
        <div class="slds-p-horizontal_medium slds-p-vertical_small">
          <div class="interaction-grid">
            <div class="col">
              <div class="row row--email-field">
                <span class="label">
                  <template if:true={isInteractionEmailRequired}>
                    <abbr class="required-indicator" title="required">*</abbr>
                  </template>
                  {labels.interactionEmail}
                </span>
                <span class="value email-field-value">
                  <template if:true={isEmailReadOnly}>
                    {displayInteractionEmail}
                  </template>
                  <template if:false={isEmailReadOnly}>
                    <div class="email-input-wrap">
                      <lightning-input data-id="interaction-email-input" type="email" value={emailDraft}
                        required={isInteractionEmailRequired} message-when-value-missing={completeFieldMsg}
                        onchange={handleEmailChange} variant="label-hidden"></lightning-input>
                    </div>
                    <template if:true={emailError}>
                      <span class="error-text">{emailError}</span>
                    </template>
                  </template>
                </span>
                <span>
                  <template if:true={showEmailEditIcon}>
                    <lightning-icon icon-name="utility:edit" size="x-small" class="edit-icon"
                      onclick={handleEditEmail}></lightning-icon>
                  </template>
                  <template if:true={showEmailSaveIcon}>
                    <lightning-icon icon-name="utility:check" size="x-small" class="edit-icon save-icon"
                      onclick={handleSaveEmail}></lightning-icon>
                  </template>
                  <template if:true={showEmailCancelIcon}>
                    <lightning-icon icon-name="utility:close" size="x-small" class="edit-icon"
                      onclick={handleCancelEditEmail}></lightning-icon>
                  </template>
                </span>
              </div>
              <div class="row">
                <span class="label">{labels.interactionCreatedOn}</span>
                <span class="value">{createdOn}</span>
                <span></span>
              </div>
              <div class="row">
                <span class="label">{labels.interactionCreatedBy}</span>
                <span class="value">{createdBy}</span>
                <span></span>
              </div>
              <template if:true={showClosedOnlyFields}>
                <div class="row">
                  <span class="label">{labels.outcomeCode}</span>
                  <span class="value">{outcomeCode}</span>
                  <span></span>
                </div>
              </template>
            </div>
            <div class="col">
              <div class="row">
                <span class="label">{labels.sendTo}</span>
                <span class="value">
                  <template if:true={isSendToReadOnly}>
                    <template if:true={hasSendTo}>{displaySendTo}</template>
                  </template>
                  <template if:false={isSendToReadOnly}>
                    <template if:true={isEditingSendTo}>
                      <lightning-input type="email" value={sendToDraft} onchange={handleSendToChange}
                        variant="label-hidden"></lightning-input>
                      <template if:true={sendToError}>
                        <span class="error-text">{sendToError}</span>
                      </template>
                    </template>
                  </template>
                </span>
                <span>
                  <template if:true={showSendToEditIcon}>
                    <lightning-icon icon-name="utility:edit" size="x-small" class="edit-icon"
                      onclick={handleEditSendTo}></lightning-icon>
                  </template>
                  <template if:true={isEditingSendTo}>
                    <lightning-icon icon-name="utility:check" size="x-small" class="edit-icon save-icon"
                      onclick={handleSaveSendTo}></lightning-icon>
                    <lightning-icon icon-name="utility:close" size="x-small" class="edit-icon"
                      onclick={handleCancelEditSendTo}></lightning-icon>
                  </template>
                </span>
              </div>
              <template if:true={showOnHold}>
                <div class="row">
                  <span class="label">
                    {labels.onHold}
                    <lightning-helptext content={labels.onHoldHelpText}
                      class="slds-m-left_xx-small"></lightning-helptext>
                  </span>
                  <span class="value">
                    <lightning-input type="checkbox" checked={onHold} onchange={handleOnHoldChange}
                      disabled={isReview}></lightning-input>
                  </span>
                  <span></span>
                </div>
              </template>
              <div class="row">
                <span class="label">{labels.parentId}</span>
                <span class="value">
                  <template if:true={showParentIdLink}>
                    <a href="javascript:void(0);" class="parent-link" onclick={handleNavigateToParent}>
                      {parentId}
                    </a>
                  </template>
                </span>
                <span></span>
              </div>
              <template if:true={showExternalInteractionId}>
                <div class="row">
                  <span class="label">{labels.externalInteractionId}</span>
                  <span class="value">
                    <template if:true={isExternalIdReadOnly}>
                      <template if:true={hasExternalInteractionId}>{displayExternalInteractionId}</template>
                    </template>
                    <template if:false={isExternalIdReadOnly}>
                      <template if:true={isEditingExternalId}>
                        <lightning-input type="text" value={externalIdDraft} onchange={handleExternalIdChange}
                          variant="label-hidden" maxlength="255"></lightning-input>
                        <template if:true={externalIdError}>
                          <span class="error-text">{externalIdError}</span>
                        </template>
                      </template>
                    </template>
                  </span>
                  <span>
                    <template if:true={showExternalIdEditIcon}>
                      <lightning-icon icon-name="utility:edit" size="x-small" class="edit-icon"
                        onclick={handleEditExternalId}></lightning-icon>
                    </template>
                    <template if:true={isEditingExternalId}>
                      <lightning-icon icon-name="utility:check" size="x-small" class="edit-icon save-icon"
                        onclick={handleSaveExternalId}></lightning-icon>
                      <lightning-icon icon-name="utility:close" size="x-small" class="edit-icon"
                        onclick={handleCancelEditExternalId}></lightning-icon>
                    </template>
                  </span>
                </div>
              </template>
              <template if:true={showClosedOnlyFields}>
                <div class="row">
                  <span class="label">{labels.interactionRemark}</span>
                  <span class="value">{interactionRemark}</span>
                  <span></span>
                </div>
              </template>
            </div>
          </div>
        </div>
      </template>

      <template if:true={isCustomerCase}>
        <div class="slds-p-horizontal_medium slds-p-vertical_small">
          <div class="interaction-grid">
            <div class="col">
              <div class="row row--email-field">
                <span class="label">
                  <template if:true={isInteractionEmailRequired}>
                    <abbr class="required-indicator" title="required">*</abbr>
                  </template>
                  {labels.interactionEmail}
                </span>
                <span class="value email-field-value">
                  <template if:true={isEmailReadOnly}>
                    {displayInteractionEmail}
                  </template>
                  <template if:false={isEmailReadOnly}>
                    <div class="email-input-wrap">
                      <lightning-input data-id="interaction-email-input" type="email" value={emailDraft}
                        required={isInteractionEmailRequired} message-when-value-missing={completeFieldMsg}
                        onchange={handleEmailChange} variant="label-hidden"></lightning-input>
                    </div>
                    <template if:true={emailError}>
                      <span class="error-text">{emailError}</span>
                    </template>
                  </template>
                </span>
                <span>
                  <template if:true={showEmailEditIcon}>
                    <lightning-icon icon-name="utility:edit" size="x-small" class="edit-icon"
                      onclick={handleEditEmail}></lightning-icon>
                  </template>
                  <template if:true={showEmailSaveIcon}>
                    <lightning-icon icon-name="utility:check" size="x-small" class="edit-icon save-icon"
                      onclick={handleSaveEmail}></lightning-icon>
                  </template>
                  <template if:true={showEmailCancelIcon}>
                    <lightning-icon icon-name="utility:close" size="x-small" class="edit-icon"
                      onclick={handleCancelEditEmail}></lightning-icon>
                  </template>
                </span>
              </div>
              <div class="row">
                <span class="label">{labels.interactionCreatedOn}</span>
                <span class="value">{createdOn}</span>
                <span></span>
              </div>
              <div class="row">
                <span class="label">{labels.interactionCreatedBy}</span>
                <span class="value">{createdBy}</span>
                <span></span>
              </div>
              <template if:true={showClosedOnlyFields}>
                <div class="row">
                  <span class="label">{labels.outcomeCode}</span>
                  <span class="value">{outcomeCode}</span>
                  <span></span>
                </div>
              </template>
            </div>
            <div class="col">
              <div class="row">
                <span class="label">{labels.sendTo}</span>
                <span class="value">
                  <template if:true={isSendToReadOnly}>
                    <template if:true={hasSendTo}>{displaySendTo}</template>
                  </template>
                  <template if:false={isSendToReadOnly}>
                    <template if:true={isEditingSendTo}>
                      <lightning-input type="email" value={sendToDraft} onchange={handleSendToChange}
                        variant="label-hidden"></lightning-input>
                      <template if:true={sendToError}>
                        <span class="error-text">{sendToError}</span>
                      </template>
                    </template>
                  </template>
                </span>
                <span>
                  <template if:true={showSendToEditIcon}>
                    <lightning-icon icon-name="utility:edit" size="x-small" class="edit-icon"
                      onclick={handleEditSendTo}></lightning-icon>
                  </template>
                  <template if:true={isEditingSendTo}>
                    <lightning-icon icon-name="utility:check" size="x-small" class="edit-icon save-icon"
                      onclick={handleSaveSendTo}></lightning-icon>
                    <lightning-icon icon-name="utility:close" size="x-small" class="edit-icon"
                      onclick={handleCancelEditSendTo}></lightning-icon>
                  </template>
                </span>
              </div>
              <template if:true={showOnHold}>
                <div class="row">
                  <span class="label">
                    {labels.onHold}
                    <lightning-helptext content={labels.onHoldHelpText}
                      class="slds-m-left_xx-small"></lightning-helptext>
                  </span>
                  <span class="value">
                    <lightning-input type="checkbox" checked={onHold} onchange={handleOnHoldChange}
                      disabled="true"></lightning-input>
                  </span>
                  <span></span>
                </div>
              </template>
              <div class="row">
                <span class="label">{labels.parentId}</span>
                <span class="value">
                  <template if:true={showParentIdLink}>
                    <a href="javascript:void(0);" class="parent-link" onclick={handleNavigateToParent}>
                      {parentId}
                    </a>
                  </template>
                </span>
                <span></span>
              </div>
              <template if:true={showExternalInteractionId}>
                <div class="row">
                  <span class="label">{labels.externalInteractionId}</span>
                  <span class="value">
                    <template if:true={isExternalIdReadOnly}>
                      <template if:true={hasExternalInteractionId}>{displayExternalInteractionId}</template>
                    </template>
                    <template if:false={isExternalIdReadOnly}>
                      <template if:true={isEditingExternalId}>
                        <lightning-input type="text" value={externalIdDraft} onchange={handleExternalIdChange}
                          variant="label-hidden" maxlength="255"></lightning-input>
                        <template if:true={externalIdError}>
                          <span class="error-text">{externalIdError}</span>
                        </template>
                      </template>
                    </template>
                  </span>
                  <span>
                    <template if:true={showExternalIdEditIcon}>
                      <lightning-icon icon-name="utility:edit" size="x-small" class="edit-icon"
                        onclick={handleEditExternalId}></lightning-icon>
                    </template>
                    <template if:true={isEditingExternalId}>
                      <lightning-icon icon-name="utility:check" size="x-small" class="edit-icon save-icon"
                        onclick={handleSaveExternalId}></lightning-icon>
                      <lightning-icon icon-name="utility:close" size="x-small" class="edit-icon"
                        onclick={handleCancelEditExternalId}></lightning-icon>
                    </template>
                  </span>
                </div>
              </template>
              <template if:true={showClosedOnlyFields}>
                <div class="row">
                  <span class="label">{labels.interactionRemark}</span>
                  <span class="value">{interactionRemark}</span>
                  <span></span>
                </div>
              </template>
            </div>
          </div>
        </div>
      </template>
    </lightning-accordion-section>
  </lightning-accordion>
</template>
