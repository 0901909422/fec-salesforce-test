<template>
  <lightning-tabset variant="default">
    <lightning-tab label="Config" icon-name="utility:settings">
      <div class="master-data-layout">
        <div class="tree-panel">
          <c-fec-nature-of-case-tree onitemselect={handleItemSelect}></c-fec-nature-of-case-tree>
        </div>
        <div class="detail-panel">
          <c-fec-master-data-container onrefreshall={handleRefreshTree}
            item={selectedItem}></c-fec-master-data-container>
        </div>
        <div class="right-panel">
          <c-fec-flow-control-data-view item={selectedItem}></c-fec-flow-control-data-view>
        </div>
      </div>
    </lightning-tab>
    <lightning-tab label="Channels" icon-name="standard:channel_programs">
      <div class="slds-p-around_medium">
        <c-fec-channel-session></c-fec-channel-session>
      </div>
    </lightning-tab>
    <lightning-tab label="Property" icon-name="standard:drafts">
      <div class="slds-p-around_medium">
        <c-fec-additional-field-list></c-fec-additional-field-list>
      </div>
    </lightning-tab>
    <lightning-tab label="ServiceType's Property Mappings" icon-name="standard:drafts">
      <div class="slds-p-around_medium">
        <c-fec-service-type-mapping></c-fec-service-type-mapping>
      </div>
    </lightning-tab>
    <lightning-tab label="Review" icon-name="standard:database">
      <div class="slds-p-around_medium">
        <c-fec-mater-data-review></c-fec-mater-data-review>
      </div>
    </lightning-tab>
    <lightning-tab label="Master Data Gốc" icon-name="standard:database">
      <div class="slds-p-around_medium">
        <c-fec-all-master-data></c-fec-all-master-data>
      </div>
    </lightning-tab>
    <lightning-tab label="Master Data Clone" icon-name="standard:database">
      <div class="slds-p-around_medium">
        <c-fec-all-master-data-mdm></c-fec-all-master-data-mdm>
      </div>
    </lightning-tab>
    <lightning-tab label="Case Channel" icon-name="standard:channel_programs">
      <div class="slds-p-around_medium">
        <c-fec-case-channel-management></c-fec-case-channel-management>
      </div>
    </lightning-tab>
  </lightning-tabset>
</template>
