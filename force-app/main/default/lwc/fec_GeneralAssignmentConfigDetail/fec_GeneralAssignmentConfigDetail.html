<template>
    <article class="slds-card">
        <div class="slds-card__body">
            <lightning-accordion allow-multiple-sections-open active-section-name="detailInfo">
                <lightning-accordion-section name="detailInfo" label="Detail Information">
                    <!-- VIEW MODE -->
                    <template if:false={isEditMode}>
                        <div class="slds-grid slds-wrap slds-p-horizontal_medium slds-p-vertical_small">
                            <div class="slds-col slds-size_1-of-2 slds-p-around_x-small">
                                <div class="row-item">
                                    <span class="row-label">GA Name</span>
                                    <span class="row-value">{record.Name}</span>
                                </div>
                            </div>
                            <div class="slds-col slds-size_1-of-2 slds-p-around_x-small">
                                <div class="row-item">
                                    <span class="row-label">Customer Type</span>
                                    <span class="row-value">{record.FEC_Customer_Type__c}</span>
                                </div>
                            </div>
                            <div class="slds-col slds-size_1-of-2 slds-p-around_x-small">
                                <div class="row-item">
                                    <span class="row-label">Channel</span>
                                    <span class="row-value">{record.FEC_Channel__c}</span>
                                </div>
                            </div>
                            <div class="slds-col slds-size_1-of-2 slds-p-around_x-small">
                                <div class="row-item">
                                    <span class="row-label">General Assignment Name</span>
                                    <span class="row-value">{record.FEC_General_Assignment_Name__c}</span>
                                </div>
                            </div>
                            <div class="slds-col slds-size_1-of-2 slds-p-around_x-small">
                                <div class="row-item">
                                    <span class="row-label">General Assignment Code</span>
                                    <span class="row-value">{record.FEC_General_Assignment_Code__c}</span>
                                </div>
                            </div>
                            <div class="slds-col slds-size_1-of-2 slds-p-around_x-small">
                                <div class="row-item">
                                    <span class="row-label">Active</span>
                                    <span class="row-value">
                                        <template if:true={record.FEC_Active__c}>
                                            <lightning-icon icon-name="utility:check" size="x-small"></lightning-icon>
                                        </template>
                                        <template if:false={record.FEC_Active__c}>
                                            <span>—</span>
                                        </template>
                                    </span>
                                </div>
                            </div>
                        </div>
                    </template>

                    <!-- EDIT MODE -->
                    <template if:true={isEditMode}>
                        <div class="slds-p-around_medium">
                            <lightning-record-edit-form
                                record-id={recordId}
                                object-api-name="FEC_General_Assignment_Config__c"
                                onsubmit={handleSubmit}
                                onsuccess={handleSuccess}
                                onerror={handleError}
                            >
                                <div class="form-grid">
                                    <div class="form-label">Customer Type</div>
                                    <div class="form-value">
                                        <lightning-input-field field-name="FEC_Customer_Type__c"></lightning-input-field>
                                    </div>
                                    <div class="form-label">Channel</div>
                                    <div class="form-value">
                                        <lightning-input-field field-name="FEC_Channel__c"></lightning-input-field>
                                    </div>
                                    <div class="form-label">General Assignment Name</div>
                                    <div class="form-value">
                                        <lightning-input-field field-name="FEC_General_Assignment_Name__c"></lightning-input-field>
                                    </div>
                                    <div class="form-label">General Assignment Code</div>
                                    <div class="form-value">
                                        <lightning-input-field field-name="FEC_General_Assignment_Code__c"></lightning-input-field>
                                    </div>
                                    <div class="form-label">Active</div>
                                    <div class="form-value">
                                        <lightning-input-field field-name="FEC_Active__c"></lightning-input-field>
                                    </div>
                                </div>
                                <div class="slds-text-align_center slds-m-top_medium">
                                    <lightning-button label="Cancel" onclick={handleCancel} class="slds-m-right_small"></lightning-button>
                                    <lightning-button variant="brand" type="submit" label="Save"></lightning-button>
                                </div>
                            </lightning-record-edit-form>
                        </div>
                    </template>
                </lightning-accordion-section>
            </lightning-accordion>
        </div>
    </article>
</template>
