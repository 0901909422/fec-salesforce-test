<template>
    <div class="table-wrapper">
        <div class="datatable-container" onclick={captureClickPosition}>
            <lightning-datatable
                key-field={keyField}
                data={paginatedData}
                columns={internalColumns}
                hide-checkbox-column={hideCheckboxColumn}
                onsort={handleSort}
                sorted-by={sortedBy}
                sorted-direction={sortDirection}
                onheaderaction={handleHeaderAction}
                onrowaction={handleRowAction}>
            </lightning-datatable>
        </div>

        <template if:true={showPagination}>
            <div class="slds-var-p-around_small slds-grid slds-grid_align-center slds-grid_vertical-align-center">
                <lightning-button
                    label={label.previous}
                    disabled={hasPrevious}
                    onclick={handlePrevious}>
                </lightning-button>
                <span class="slds-var-p-horizontal_small">{pageInfo}</span>
                <lightning-button
                    label={label.next}
                    disabled={hasNext}
                    onclick={handleNext}>
                </lightning-button>
            </div>
        </template>

        <template if:true={isFilterOpen}>
            <div onclick={handleInsideClick}>
                <c-fec-custom-popover-filter
                    str-column-label={currentFilterLabel}
                    str-column-field={currentFilterColumn}
                    str-popover-style={popoverStyle}
                    filter-options={filterOptions}
                    onapply={handleApplyFilter}
                    onclear={handleClearFilter}
                    onclose={closeFilter}>
                </c-fec-custom-popover-filter>
            </div>
        </template>
    </div>
</template>
