<template>

  <div class="slds-grid slds-gutters slds-grid_align-stretch">
    <div class="slds-col slds-size_8-of-12">
      <!--Interaction Details-->
      <div class="slds-tabs_card full-height">
        <div class="slds-page-header slds-page-header_object-home">
          <div class="slds-grid slds-grid_align-spread slds-wrap">
            <div class="slds-col slds-grid slds-grid_vertical-align-center slds-grow">
              <div class="slds-media">
                <div class="slds-media__figure">
                  <lightning-icon icon-name="standard:case" size="small"></lightning-icon>
                </div>
                <div class="slds-media__figure">
                  <h1 class="slds-page-header__title slds-truncate">
                    <lightning-formatted-rich-text value={interactionId}></lightning-formatted-rich-text>
                  </h1>
                </div>
              </div>
            </div>
          </div>
        </div>
        <div class="slds-border_bottom"></div>
        <div class="slds-grid slds-gutters slds-p-around_xxx-small">
          <ul class="slds-grid slds-wrap slds-size_1-of-1 slds-m-top_small">

            <li class="slds-col slds-size_1-of-6 slds-p-horizontal_small">
              <span class="slds-text-title"><b>{labels.interactionId}</b></span><br />
              <span class="slds-text-body_regular">
                <lightning-formatted-rich-text value={interactionId}></lightning-formatted-rich-text>
              </span>
            </li>

            <li class="slds-col slds-size_1-of-6 slds-p-horizontal_small">
              <span class="slds-text-title"><b>{labels.interactionStatus}</b></span><br />
              <span class="slds-text-body_regular">{status}</span>
            </li>

            <li class="slds-col slds-size_1-of-6 slds-p-horizontal_small">
              <span class="slds-text-title"><b>{labels.interactionChannel}</b></span><br />
              <span class="slds-text-body_regular">{interactionChannel}</span>
            </li>

            <li class="slds-col slds-size_1-of-6 slds-p-horizontal_small">
              <span class="slds-text-title"><b>{labels.interactionSubChannel}</b></span><br />
              <span class="slds-text-body_regular">{interactionSubChannel}</span>
            </li>

            <li class="slds-col slds-size_1-of-6 slds-p-horizontal_small">
              <span class="slds-text-title"><b>{labels.lastUpdatedOn}</b></span><br />
              <span class="slds-text-body_regular">{lastUpdated}</span>
            </li>

            <li class="slds-col slds-size_1-of-6 slds-p-horizontal_small">
              <span class="slds-text-title"><b>{labels.lastUpdatedBy}</b></span><br />
              <span class="slds-text-body_regular">{updatedBy}</span>
            </li>

          </ul>
        </div>

      </div>

    </div>

    <div class="slds-col slds-size_4-of-12">
      <!--SLA-->
      <div class="slds-tabs_card full-height slds-grid slds-grid_vertical">
        <!-- Header Section -->
        <!-- Header -->
        <div class="slds-page-header slds-page-header_object-home">
          <div class="slds-grid slds-grid_align-spread">
            <h1 class="slds-page-header__title">{labels.interactionDuration}</h1>
            <div>
              <template if:true={isHandling}>
                <button class="slds-button slds-button_neutral" onclick={handleWrapUpClick}>{labels.wrapUp}</button>
              </template>
              <!-- Chỉ có nút Execute khi ở trạng thái review -->
              <template if:false={isHandling}>
                <button class="slds-button slds-button_neutral" onclick={handleExecute}>{labels.execute}</button>
              </template>
              <template if:true={isHandling}>
                <button class="slds-button slds-button_neutral" onclick={handleCreateCase}>{labels.createCase}</button>
              </template>

            </div>
          </div>
        </div>

        <div class="slds-border_bottom"></div>

        <!-- Body: chiếm toàn bộ phần còn lại -->
        <div class="slds-grow slds-p-around_x-small">
          <c-fec_-interaction-s-l-a record-id={recordId} is-mode-edit={isModeEdit}>
          </c-fec_-interaction-s-l-a>
        </div>
      </div>
    </div>
  </div>

  <template if:true={isOpen}>
    <!-- BACKDROP -->
    <div class="slds-backdrop slds-backdrop_open"></div>

    <!-- MODAL -->
    <section role="dialog" tabindex="-1" class="slds-modal slds-fade-in-open" aria-modal="true">
      <div class="slds-modal__container">
        <!-- HEADER -->
        <header class="slds-modal__header">
          <button class="slds-button slds-button_icon slds-modal__close" title="Close" onclick={close}>
            <lightning-icon icon-name="utility:close" size="small"></lightning-icon>
          </button>
          <h2 class="slds-text-heading_medium">{labels.createCase}</h2>
        </header>

        <!-- BODY -->
        <div class="slds-modal__content slds-p-around_medium">
          <c-fec_-create-case-non-existing-customer record-id={recordId}></c-fec_-create-case-non-existing-customer>
        </div>

        <!-- FOOTER -->
        <footer class="slds-modal__footer">

        </footer>
      </div>
    </section>
  </template>


</template>
