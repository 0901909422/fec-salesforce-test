<template>
    <div class="ra-container">
        <!-- ── LIST VIEW ── -->
        <template if:false={showDetail}>
            <lightning-accordion allow-multiple-sections-open active-section-name="routingAssignment">
                <lightning-accordion-section name="routingAssignment" label="Routing Assignment">
                    <div slot="actions">
                        <lightning-button label={labels.new} variant="brand" onclick={handleNew}></lightning-button>
                    </div>

                    <div class="slds-p-horizontal_medium slds-p-vertical_small">
                        <template if:true={hasRecords}>
                            <lightning-datatable
                                key-field="id"
                                data={paginatedRecords}
                                columns={columns}
                                onrowaction={handleRowAction}
                                hide-checkbox-column>
                            </lightning-datatable>

                            <!-- Pagination -->
                            <div class="slds-m-top_small slds-grid slds-grid_align-spread slds-grid_vertical-align-center">
                                <span class="slds-text-body_small">{pageInfo}</span>
                                <div class="slds-grid slds-grid_vertical-align-center slds-gutters_x-small">
                                    <span class="slds-text-body_small">Page</span>
                                    <input type="number" class="slds-input page-input" value={pageNumber} min="1" max={totalPages} onchange={handlePageInput} />
                                    <lightning-button-group>
                                        <lightning-button label={labels.previous} onclick={handlePreviousPage} disabled={isFirstPage}></lightning-button>
                                        <lightning-button label={labels.next} onclick={handleNextPage} disabled={isLastPage}></lightning-button>
                                    </lightning-button-group>
                                </div>
                            </div>
                        </template>

                        <template if:false={hasRecords}>
                            <div class="slds-text-align_center slds-p-around_medium slds-text-color_weak">
                                {labels.noRecords}
                            </div>
                        </template>
                    </div>
                </lightning-accordion-section>
            </lightning-accordion>
        </template>

        <!-- ── DETAIL VIEW ── -->
        <template if:true={showDetail}>
            <div class="slds-p-around_medium">
                <!-- Back button -->
                <div class="slds-m-bottom_small">
                    <lightning-button label={labels.back} variant="neutral" onclick={handleDetailBack}></lightning-button>
                </div>

                <!-- Header -->
                <div class="ra-detail-header slds-m-bottom_medium">
                    <lightning-icon icon-name="standard:routing_rules" size="small" class="slds-m-right_small"></lightning-icon>
                    <span class="slds-text-heading_medium">{detailRecord.name}</span>
                    <template if:false={isDetailEdit}>
                        <lightning-button label={labels.edit} variant="neutral" onclick={handleDetailEdit} class="slds-m-left_small"></lightning-button>
                    </template>
                </div>

                <!-- Detail Information -->
                <div class="ra-section-header slds-m-bottom_small">{labels.detailInfo}</div>
                <div class="slds-box slds-m-bottom_medium">
                    <template if:false={isDetailEdit}>
                        <!-- Read-only -->
                        <div class="slds-grid slds-wrap slds-gutters">
                            <div class="slds-col slds-size_1-of-2 slds-p-around_small">
                                <div class="slds-form-element__label ra-field-label">{labels.raName}</div>
                                <div>{detailRecord.name}</div>
                            </div>
                            <div class="slds-col slds-size_1-of-2 slds-p-around_small">
                                <div class="slds-form-element__label ra-field-label">{labels.customerType}</div>
                                <div>{detailRecord.customerType}</div>
                            </div>
                            <div class="slds-col slds-size_1-of-2 slds-p-around_small">
                                <div class="slds-form-element__label ra-field-label">{labels.channel}</div>
                                <div>{detailRecord.channel}</div>
                            </div>
                            <div class="slds-col slds-size_1-of-2 slds-p-around_small">
                                <div class="slds-form-element__label ra-field-label">{labels.team}</div>
                                <div>{detailRecord.team}</div>
                            </div>
                            <div class="slds-col slds-size_1-of-2 slds-p-around_small">
                                <div class="slds-form-element__label ra-field-label">{labels.queue}</div>
                                <div>{detailRecord.queue}</div>
                            </div>
                            <div class="slds-col slds-size_1-of-2 slds-p-around_small">
                                <div class="slds-form-element__label ra-field-label">{labels.active}</div>
                                <lightning-input type="checkbox" checked={detailRecord.active} disabled></lightning-input>
                            </div>
                        </div>
                    </template>

                    <template if:true={isDetailEdit}>
                        <!-- Edit form -->
                        <div class="slds-grid slds-wrap slds-gutters">
                            <div class="slds-col slds-size_1-of-2">
                                <div class="slds-form-element__label ra-field-label">{labels.raName}</div>
                                <div class="slds-p-around_small">{detailRecord.name}</div>
                            </div>
                            <div class="slds-col slds-size_1-of-2">
                                <lightning-combobox
                                    label={labels.customerType}
                                    required
                                    value={detailFormCustomerType}
                                    options={customerTypeOptions}
                                    onchange={handleDetailCustomerTypeChange}>
                                </lightning-combobox>
                            </div>
                            <!-- Channel multi-select -->
                            <div class="slds-col slds-size_1-of-2">
                                <div class="slds-form-element">
                                    <label class="slds-form-element__label"><abbr class="slds-required" title="required">*</abbr> {labels.channel}</label>
                                    <div class="ra-search-container">
                                        <div class="slds-input-has-icon slds-input-has-icon_right">
                                            <lightning-icon icon-name="utility:search" size="x-small" class="slds-icon slds-input__icon slds-input__icon_right"></lightning-icon>
                                            <input type="text" class="slds-input" placeholder={labels.searchChannel}
                                                value={detailChannelSearchTerm}
                                                oninput={handleDetailChannelSearch}
                                                onfocus={handleDetailChannelFocus}
                                                onblur={handleDetailChannelBlur}
                                                autocomplete="off" />
                                        </div>
                                        <template if:true={detailShowChannelDropdown}>
                                            <div class="ra-dropdown">
                                                <ul class="slds-listbox slds-listbox_vertical">
                                                    <template for:each={detailFilteredChannelOptions} for:item="opt">
                                                        <li key={opt.value} class="ra-option" data-value={opt.value} onmousedown={handleDetailChannelSelect}>
                                                            {opt.label}
                                                        </li>
                                                    </template>
                                                </ul>
                                            </div>
                                        </template>
                                    </div>
                                    <template if:true={detailSelectedChannelIds.length}>
                                        <div class="slds-m-top_x-small">
                                            <template for:each={detailSelectedChannelIds} for:item="ch">
                                                <lightning-pill key={ch} label={ch} name={ch} onremove={handleDetailChannelRemove}></lightning-pill>
                                            </template>
                                        </div>
                                    </template>
                                </div>
                            </div>
                            <div class="slds-col slds-size_1-of-2">
                                <lightning-combobox
                                    label={labels.team}
                                    required
                                    value={detailFormTeam}
                                    options={teamOptions}
                                    onchange={handleDetailTeamChange}>
                                </lightning-combobox>
                            </div>
                            <div class="slds-col slds-size_1-of-2">
                                <lightning-combobox
                                    label={labels.queue}
                                    required
                                    value={detailFormQueue}
                                    options={detailQueueOptions}
                                    onchange={handleDetailQueueChange}>
                                </lightning-combobox>
                            </div>
                            <div class="slds-col slds-size_1-of-1 slds-p-around_small">
                                <lightning-input type="checkbox" label={labels.active} checked={detailFormActive} onchange={handleDetailActiveChange}></lightning-input>
                            </div>
                        </div>
                        <div class="slds-m-top_medium">
                            <lightning-button label={labels.cancel} onclick={handleDetailCancel} class="slds-m-right_small"></lightning-button>
                            <lightning-button variant="brand" label={labels.save} onclick={handleDetailSave}></lightning-button>
                        </div>
                    </template>
                </div>

                <!-- Routing Assignment History -->
                <div class="ra-section-header slds-m-bottom_small">{labels.raHistory}</div>
                <div class="slds-box">
                    <template if:true={hasHistory}>
                        <table class="slds-table slds-table_cell-buffer slds-table_bordered ra-table">
                            <thead>
                                <tr>
                                    <th><div class="slds-truncate">Date</div></th>
                                    <th><div class="slds-truncate">Field</div></th>
                                    <th><div class="slds-truncate">User</div></th>
                                    <th><div class="slds-truncate">Original Value</div></th>
                                    <th><div class="slds-truncate">New Value</div></th>
                                </tr>
                            </thead>
                            <tbody>
                                <template for:each={historyRecords} for:item="h">
                                    <tr key={h.historyDate}>
                                        <td>{h.historyDate}</td>
                                        <td>{h.historyField}</td>
                                        <td>{h.userName}</td>
                                        <td>{h.oldValue}</td>
                                        <td>{h.newValue}</td>
                                    </tr>
                                </template>
                            </tbody>
                        </table>
                        <div class="slds-m-top_small slds-grid slds-grid_align-spread slds-grid_vertical-align-center">
                            <span class="slds-text-body_small">{historyPageInfo}</span>
                            <lightning-button-group>
                                <lightning-button label={labels.previous} onclick={handleHistoryPrev} disabled={isHistoryFirstPage}></lightning-button>
                                <lightning-button label={labels.next} onclick={handleHistoryNext} disabled={isHistoryLastPage}></lightning-button>
                            </lightning-button-group>
                        </div>
                    </template>
                    <template if:false={hasHistory}>
                        <div class="slds-text-align_center slds-p-around_medium slds-text-color_weak">{labels.noHistory}</div>
                    </template>
                </div>
            </div>
        </template>
    </div>

    <!-- ── NEW MODAL ── -->
    <template if:true={showModal}>
        <section role="dialog" tabindex="-1" class="slds-modal slds-fade-in-open">
            <div class="slds-modal__container">
                <header class="slds-modal__header">
                    <h2 class="slds-text-heading_medium">{labels.newRA}</h2>
                    <p class="slds-text-body_small slds-m-top_x-small">{labels.requiredInfo}</p>
                </header>
                <div class="slds-modal__content slds-p-around_medium">
                    <div class="slds-grid slds-wrap slds-gutters">
                        <!-- Customer Type -->
                        <div class="slds-col slds-size_1-of-2">
                            <lightning-combobox
                                label={labels.customerType}
                                required
                                value={formCustomerType}
                                options={customerTypeOptions}
                                onchange={handleFormCustomerTypeChange}>
                            </lightning-combobox>
                        </div>
                        <!-- Channel -->
                        <div class="slds-col slds-size_1-of-2">
                            <div class="slds-form-element">
                                <label class="slds-form-element__label"><abbr class="slds-required" title="required">*</abbr> {labels.channel}</label>
                                <div class="ra-search-container">
                                    <div class="slds-input-has-icon slds-input-has-icon_right">
                                        <lightning-icon icon-name="utility:search" size="x-small" class="slds-icon slds-input__icon slds-input__icon_right"></lightning-icon>
                                        <input type="text" class="slds-input" placeholder={labels.searchChannel}
                                            value={channelSearchTerm}
                                            oninput={handleChannelSearch}
                                            onfocus={handleChannelFocus}
                                            onblur={handleChannelBlur}
                                            autocomplete="off" />
                                    </div>
                                    <template if:true={showChannelDropdown}>
                                        <div class="ra-dropdown">
                                            <ul class="slds-listbox slds-listbox_vertical">
                                                <template for:each={filteredChannelOptions} for:item="opt">
                                                    <li key={opt.value} class="ra-option" data-value={opt.value} onmousedown={handleChannelSelect}>
                                                        {opt.label}
                                                    </li>
                                                </template>
                                            </ul>
                                        </div>
                                    </template>
                                </div>
                                <template if:true={selectedChannelIds.length}>
                                    <div class="slds-m-top_x-small">
                                        <template for:each={selectedChannelIds} for:item="ch">
                                            <lightning-pill key={ch} label={ch} name={ch} onremove={handleChannelRemove}></lightning-pill>
                                        </template>
                                    </div>
                                </template>
                            </div>
                        </div>
                        <!-- Team -->
                        <div class="slds-col slds-size_1-of-2">
                            <lightning-combobox
                                label={labels.team}
                                required
                                value={formTeam}
                                options={teamOptions}
                                onchange={handleFormTeamChange}>
                            </lightning-combobox>
                        </div>
                        <!-- Queue -->
                        <div class="slds-col slds-size_1-of-2">
                            <lightning-combobox
                                label={labels.queue}
                                required
                                value={formQueue}
                                options={queueOptions}
                                onchange={handleFormQueueChange}>
                            </lightning-combobox>
                        </div>
                        <!-- Active -->
                        <div class="slds-col slds-size_1-of-1 slds-p-around_small">
                            <lightning-input type="checkbox" label={labels.active} checked={formActive} onchange={handleFormActiveChange}></lightning-input>
                        </div>
                    </div>
                </div>
                <footer class="slds-modal__footer">
                    <lightning-button label={labels.cancel} onclick={handleCancel} class="slds-m-right_small"></lightning-button>
                    <lightning-button variant="brand" label={labels.save} onclick={handleSave}></lightning-button>
                </footer>
            </div>
        </section>
        <div class="slds-backdrop slds-backdrop_open"></div>
    </template>
</template>
