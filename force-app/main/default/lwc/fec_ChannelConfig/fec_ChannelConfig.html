<template>
    <lightning-card>
        <div class="slds-p-around_medium">

            <!-- VIEW MODE -->
            <template if:false={isEditMode}>
                <table class="channel-config-table">
                    <tbody>
                        <tr class="channel-config-row">
                            <td class="channel-config-label channel-config-label_fixed">{labelGetNatureOfCase}</td>
                            <td class="channel-config-value">
                                <input type="checkbox" disabled checked={getNatureOfCase} />
                            </td>
                            <td class="channel-config-action">
                                <lightning-button-icon icon-name="utility:edit" variant="bare" size="small" title="Edit" onclick={handleEdit} data-field="FEC_Get_Nature_Of_Case__c"></lightning-button-icon>
                            </td>
                        </tr>
                        <tr class="channel-config-row">
                            <td class="channel-config-label">{labelCancelCase}</td>
                            <td class="channel-config-value">
                                <input type="checkbox" disabled checked={cancelCase} />
                            </td>
                            <td class="channel-config-action">
                                <lightning-button-icon icon-name="utility:edit" variant="bare" size="small" title="Edit" onclick={handleEdit} data-field="FEC_Cancel_Case__c"></lightning-button-icon>
                            </td>
                        </tr>
                        <tr>
                            <td class="channel-config-label">{labelUpdateCaseStatus}</td>
                            <td class="channel-config-value">
                                <input type="checkbox" disabled checked={updateCaseStatus} />
                            </td>
                            <td class="channel-config-action">
                                <lightning-button-icon icon-name="utility:edit" variant="bare" size="small" title="Edit" onclick={handleEdit} data-field="FEC_Update_Case_Status__c"></lightning-button-icon>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </template>

            <!-- EDIT MODE -->
            <template if:true={isEditMode}>
                <lightning-record-edit-form
                    record-id={recordId}
                    object-api-name="FEC_Channel__c"
                    onsubmit={handleSubmit}
                    onsuccess={handleSuccess}
                    onerror={handleError}
                >
                    <div class="slds-grid slds-gutters slds-wrap">
                        <div class="slds-col slds-size_1-of-1">
                            <lightning-input-field field-name="FEC_Get_Nature_Of_Case__c"></lightning-input-field>
                        </div>
                        <div class="slds-col slds-size_1-of-1">
                            <lightning-input-field field-name="FEC_Cancel_Case__c"></lightning-input-field>
                        </div>
                        <div class="slds-col slds-size_1-of-1">
                            <lightning-input-field field-name="FEC_Update_Case_Status__c"></lightning-input-field>
                        </div>
                    </div>
                    <div class="slds-m-top_medium slds-text-align_right">
                        <lightning-button label={labelCancel} onclick={handleCancel} class="slds-m-right_small"></lightning-button>
                        <lightning-button variant="brand" type="submit" label={labelSave} disabled={isSaving}></lightning-button>
                    </div>
                </lightning-record-edit-form>
            </template>

        </div>
    </lightning-card>
</template>
