<template>
  <div class="slds-box">
    <h2 class="slds-text-heading_medium slds-m-bottom_small">{customLabel.sectionTitle}</h2>
    <div class="input-row">
      <lightning-input
        type="text"
        name="removedPhone"
        label={customLabel.removedPhoneLabel}
        value={phoneInputDisplayValue}
        readonly={readOnlyRemovePhone}
        onchange={handlePhoneChange}
        onblur={handlePhoneChange}>
      </lightning-input>
      <div class="button-wrap">
        <lightning-button
          label={customLabel.checkEligibility}
          variant="brand"
          onclick={handleCheckEligibility}
          disabled={disableCheckButton}>
        </lightning-button>
      </div>
    </div>
    <template if:true={isLoading}>
      <lightning-spinner alternative-text={customLabel.loading} size="small"></lightning-spinner>
    </template>
    <template if:true={resultMessage}>
      <p class={resultClass}>{resultMessage}</p>
    </template>
  </div>
  <template if:true={showDataTable}>
    <div class="slds-box slds-m-top_medium">
      <template for:each={datatableMountRows} for:item="mountRow">
        <lightning-datatable
          key={mountRow.mountKey}
          key-field="id"
          data={pagedRows}
          columns={columns}
          selected-rows={selectedRowIds}
          onrowselection={handleRowSelection}>
        </lightning-datatable>
      </template>
      <template if:true={showPagination}>
        <div class="table-pagination slds-m-top_small slds-grid slds-grid_align-spread slds-grid_vertical-align-center">
          <div class="page-size slds-grid slds-grid_vertical-align-center">
            <span class="slds-m-right_x-small">{paginationLabels.pageSizeLabel}</span>
            <lightning-combobox
              value={pageSizeStr}
              options={pageSizeOptions}
              onchange={handlePageSizeChange}
              variant="label-hidden">
            </lightning-combobox>
          </div>
          <div class="pagination-controls slds-grid slds-grid_vertical-align-center">
            <lightning-button-icon
              class="square-icon"
              icon-name="utility:chevronleft"
              alternative-text={paginationLabels.prevLabel}
              onclick={handlePrevPage}
              disabled={disablePaginationPrevPage}>
            </lightning-button-icon>
            <span class="page-number">{currentPage}</span>
            <lightning-button-icon
              class="square-icon"
              icon-name="utility:chevronright"
              alternative-text={paginationLabels.nextLabel}
              onclick={handleNextPage}
              disabled={disablePaginationNextPage}>
            </lightning-button-icon>
          </div>
          <div class="go-to-page slds-grid slds-grid_vertical-align-center">
            <span class="slds-m-right_x-small">{paginationLabels.goToPageLabel}</span>
            <lightning-input
              type="number"
              value={currentPage}
              min="1"
              max={totalPages}
              variant="label-hidden"
              class="page-input"
              onchange={handleGoToPageInput}>
            </lightning-input>
            <span class="slds-m-horizontal_x-small">of {totalPages}</span>
            <lightning-button
              class="square-go-btn"
              label={paginationLabels.goBtnLabel}
              onclick={handleGoToPage}
              variant="brand">
            </lightning-button>
          </div>
        </div>
      </template>
    </div>
  </template>
</template>
