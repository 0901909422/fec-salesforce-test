<template>
    <lightning-card title="View All Cases">
        <lightning-datatable key-field="Id" data={pagedData} columns={columns} hide-checkbox-column>
        </lightning-datatable>

        <!-- Pagination -->
        <div class="slds-m-top_small slds-grid slds-grid_align-spread slds-grid_vertical-align-center">
            <div>{pageInfoLabel}</div>

            <div>
                <lightning-button label={labels.prev} onclick={handlePrev} disabled={isFirstPage}>
                </lightning-button>

                <lightning-button class="slds-m-left_x-small" label={labels.next} onclick={handleNext} disabled={isLastPage}>
                </lightning-button>
            </div>
        </div>
    </lightning-card>
</template>
