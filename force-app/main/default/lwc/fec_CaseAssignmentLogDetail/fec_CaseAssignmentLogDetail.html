<template>
  <div class="detail-root slds-p-around_small">
    <!-- User Information -->
    <section class="accordion-block">
      <button
        type="button"
        class="section-header"
        onclick={toggleUserSection}
        aria-expanded={userInfoExpanded}
      >
        <lightning-icon
          icon-name={userSectionChevron}
          size="x-small"
          class="section-chevron"
          alternative-text=""
        ></lightning-icon>
        <span class="section-header-text">User Information</span>
      </button>
      <template if:true={userInfoExpanded}>
        <div class="section-body">
          <div class="detail-grid">
            <div class="detail-cell">
              <div class="detail-label">Name</div>
              <div class="detail-value-row">
                <template if:true={hasNameLink}>
                  <a href="#" class="entity-link" onclick={handleNameNav}>{displayName}</a>
                </template>
                <template if:false={hasNameLink}>
                  <span class="detail-value">{displayName}</span>
                </template>
              </div>
            </div>
            <div class="detail-cell">
              <div class="detail-label">Number of Case</div>
              <div class="detail-value">{displayNumberOfCase}</div>
            </div>
            <div class="detail-cell">
              <div class="detail-label">Created Date</div>
              <div class="detail-value">{displayCreatedDate}</div>
            </div>
          </div>
        </div>
      </template>
    </section>

    <!-- Case Assignment Log Details -->
    <section class="accordion-block">
      <button
        type="button"
        class="section-header"
        onclick={toggleDetailsSection}
        aria-expanded={detailsExpanded}
      >
        <lightning-icon
          icon-name={detailsSectionChevron}
          size="x-small"
          class="section-chevron"
          alternative-text=""
        ></lightning-icon>
        <span class="section-header-text">Case Assignment Log Details</span>
      </button>
      <template if:true={detailsExpanded}>
        <div class="section-body">
          <template if:true={hasDetailRows}>
            <table class="slds-table slds-table_cell-buffer slds-table_bordered detail-table">
              <thead>
                <tr>
                  <th scope="col">Name</th>
                  <th scope="col">Number of Case</th>
                </tr>
              </thead>
              <tbody>
                <template for:each={detailRows} for:item="row">
                  <tr key={row.key}>
                    <td>
                      <template if:true={row.hasNameLink}>
                        <a
                          href="#"
                          class="entity-link"
                          data-record-id={row.recordId}
                          onclick={handleDetailNameNav}
                        >{row.name}</a>
                      </template>
                      <template if:false={row.hasNameLink}>
                        <span>{row.name}</span>
                      </template>
                    </td>
                    <td>{row.numberOfCase}</td>
                  </tr>
                </template>
              </tbody>
            </table>
          </template>
          <template if:false={hasDetailRows}>
            <div class="empty-hint">No log detail records.</div>
          </template>
        </div>
      </template>
    </section>

    <!-- System Information -->
    <section class="accordion-block accordion-block-last">
      <button
        type="button"
        class="section-header"
        onclick={toggleSystemSection}
        aria-expanded={systemInfoExpanded}
      >
        <lightning-icon
          icon-name={systemSectionChevron}
          size="x-small"
          class="section-chevron"
          alternative-text=""
        ></lightning-icon>
        <span class="section-header-text">System Information</span>
      </button>
      <template if:true={systemInfoExpanded}>
        <div class="section-body">
          <div class="detail-grid">
            <div class="detail-cell">
              <div class="detail-label">Created By</div>
              <div class="detail-value-row">
                <template if:true={hasCreatedByLink}>
                  <a href="#" class="entity-link" onclick={handleCreatedByNav}>{createdByName}</a>
                </template>
                <template if:false={hasCreatedByLink}>
                  <span class="detail-value">{createdByName}</span>
                </template>
              </div>
            </div>
            <div class="detail-cell">
              <div class="detail-label">Last Modified By</div>
              <div class="detail-value-row">
                <template if:true={hasLastModifiedByLink}>
                  <a href="#" class="entity-link" onclick={handleLastModifiedByNav}>{lastModifiedByName}</a>
                </template>
                <template if:false={hasLastModifiedByLink}>
                  <span class="detail-value">{lastModifiedByName}</span>
                </template>
              </div>
            </div>
          </div>
        </div>
      </template>
    </section>
  </div>
</template>
