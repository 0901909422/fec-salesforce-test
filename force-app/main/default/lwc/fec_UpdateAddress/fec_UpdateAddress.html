<template>
    <c-fec_-spinner is-loaded={isLoaded}></c-fec_-spinner>

    <template if:true={isLoaded}>
        <div class="case-info case-info--card slds-p-around_medium">
                    <template if:true={loadError}>
                        <div
                            class="slds-text-color_error slds-m-bottom_small"
                        >
                            {loadError}
                        </div>
                    </template>

                    <template if:true={showAddressEligibilityBlock}>
                        <div
                            class="fec-update-address__eligibility slds-m-bottom_medium"
                            role="alert"
                        >
                            <p class="fec-update-address__eligibility-title">
                                {addressEligibilityTitle}
                            </p>
                            <template
                                for:each={addressEligibilityReasonLines}
                                for:item="row"
                            >
                                <p
                                    key={row.key}
                                    class="fec-update-address__eligibility-reason"
                                >
                                    {row.text}
                                </p>
                            </template>
                        </div>
                    </template>

                    <template if:false={showAddressEligibilityBlock}>
                    <div class="slds-grid slds-wrap slds-gutters_medium">
                        <!-- Original column -->
                        <div
                            class="slds-col slds-size_1-of-1 slds-large-size_1-of-2"
                        >
                            <h3 class="case-info__column-title slds-m-bottom_small">
                                {labels.originalInformation}
                            </h3>
                            <template
                                for:each={originalInformationRows}
                                for:item="row"
                            >
                                <div
                                    key={row.key}
                                    class="case-info__row slds-border_bottom"
                                >
                                    <div
                                        class="slds-grid slds-wrap slds-gutters_small"
                                    >
                                        <div
                                            class="slds-col slds-size_1-of-1 slds-medium-size_1-of-2"
                                        >
                                            <p class="case-info__field-label">
                                                {row.typeLabel}
                                            </p>
                                            <p class="case-info__field-value">
                                                {row.addressDisplay}
                                            </p>
                                        </div>
                                        <div
                                            class="slds-col slds-size_1-of-1 slds-medium-size_1-of-2 case-info__mailing-toggle-col"
                                        >
                                            <p
                                                class="case-info__field-label slds-m-bottom_xx-small"
                                            >
                                                {labels.mailingAddress}
                                            </p>
                                            <lightning-input
                                                type="checkbox"
                                                variant="label-hidden"
                                                label={labels.mailingAddress}
                                                checked={row.mailingChecked}
                                                disabled={originalMailingCheckboxDisabled}
                                                class="case-info__mailing-checkbox-input"
                                            ></lightning-input>
                                        </div>
                                    </div>
                                </div>
                            </template>

                            <div
                                class="case-info__toolbar case-info__toolbar--original slds-m-top_small"
                            >
                                <lightning-button
                                    label={labels.addNewAddress}
                                    variant="brand"
                                    disabled={addNewAddressDisabled}
                                    onclick={handleAddNewAddress}
                                ></lightning-button>
                            </div>
                        </div>

                        <!-- Updated column -->
                        <div
                            class="slds-col slds-size_1-of-1 slds-large-size_1-of-2"
                        >
                            <h3 class="case-info__column-title slds-m-bottom_small">
                                {labels.updatedInformation}
                            </h3>
                            <template if:true={showPermanentUpdatedRow}>
                            <div
                                class="case-info__row case-info__row--editable slds-border_bottom"
                            >
                                <template if:false={isEditingPermanentMailing}>
                                    <div
                                        class="slds-grid slds-wrap slds-gutters_small slds-grid_vertical-align-start"
                                    >
                                        <div
                                            class="slds-col slds-size_1-of-1 slds-medium-size_6-of-12"
                                        >
                                            <p class="case-info__field-label">
                                                {labels.permanentAddress}
                                            </p>
                                            <p class="case-info__field-value">
                                                {permanentUpdatedDisplay}
                                            </p>
                                        </div>
                                        <div
                                            class="slds-col slds-size_1-of-1 slds-medium-size_3-of-12 case-info__mailing-toggle-col"
                                        >
                                            <p
                                                class="case-info__field-label slds-m-bottom_xx-small"
                                            >
                                                {labels.mailingAddress}
                                            </p>
                                            <lightning-input
                                                type="checkbox"
                                                variant="label-hidden"
                                                label={labels.mailingAddress}
                                                data-row="permanent"
                                                checked={permanentMailingRadioChecked}
                                                disabled={permanentMailingCheckboxDisabled}
                                                onchange={handleMailingCheckboxChange}
                                                class="case-info__mailing-checkbox-input"
                                            ></lightning-input>
                                        </div>
                                        <div
                                            class="slds-col slds-size_1-of-1 slds-medium-size_3-of-12 slds-text-align_right case-info__pencil-cell"
                                        >
                                            <template if:true={canEdit}>
                                                <lightning-button-icon
                                                    icon-name="utility:edit"
                                                    variant="bare"
                                                    alternative-text={labels.editMailing}
                                                    data-row="permanent"
                                                    onclick={handleEditMailing}
                                                    disabled={permanentEditPencilDisabled}
                                                ></lightning-button-icon>
                                            </template>
                                        </div>
                                    </div>
                                </template>
                                <template if:true={isEditingPermanentMailing}>
                                    <template if:true={mailingModalLoading}>
                                        <lightning-spinner
                                            alternative-text={labels.loading}
                                            size="small"
                                        ></lightning-spinner>
                                    </template>
                                    <template if:false={mailingModalLoading}>
                                        <div
                                            class="slds-grid slds-wrap slds-gutters_medium slds-grid_vertical-align-start"
                                        >
                                            <div
                                                class="slds-col slds-size_1-of-1 slds-large-size_8-of-12"
                                            >
                                                <p class="case-info__field-label">
                                                    {labels.permanentAddress}
                                                </p>
                                                <div
                                                    class="case-info__mailing-inline-form"
                                                >
                                                    <div
                                                        class="slds-form-element slds-m-bottom_small"
                                                    >
                                                        <lightning-input
                                                            label={labels.building}
                                                            value={mailingBuilding}
                                                            onchange={handleMailingBuildingChange}
                                                        ></lightning-input>
                                                    </div>
                                                    <div
                                                        class="slds-form-element slds-m-bottom_small"
                                                    >
                                                        <lightning-input
                                                            label={labels.number}
                                                            value={mailingNumber}
                                                            onchange={handleMailingNumberChange}
                                                        ></lightning-input>
                                                    </div>
                                                    <div
                                                        class="slds-form-element slds-m-bottom_small"
                                                    >
                                                        <lightning-input
                                                            label={labels.street}
                                                            value={mailingStreet}
                                                            required
                                                            onchange={handleMailingStreetChange}
                                                        ></lightning-input>
                                                    </div>
                                                    <div
                                                        class="slds-form-element slds-m-bottom_small"
                                                    >
                                                        <c-fec_searchable-combobox
                                                            label={labels.provinceCity}
                                                            value={mailingCity}
                                                            options={provinceOptions}
                                                            placeholder={labels.provinceSearchPlaceholder}
                                                            required
                                                            onchange={handleMailingProvinceChange}
                                                        ></c-fec_searchable-combobox>
                                                    </div>
                                                    <div
                                                        class="slds-form-element slds-m-bottom_small"
                                                    >
                                                        <c-fec_searchable-combobox
                                                            label={labels.ward}
                                                            value={mailingDistrict}
                                                            options={districtOptions}
                                                            placeholder={labels.wardSearchPlaceholder}
                                                            required
                                                            disabled={districtComboboxDisabled}
                                                            onchange={handleMailingDistrictChange}
                                                        ></c-fec_searchable-combobox>

                                                            onclick={handleCancelMailingEdit}
                                                            disabled={mailingSaveLoading}
                                                        ></lightning-button>
                                                        <lightning-button
                                                            variant="brand"
                                                            label={labels.save}
                                                            onclick={handleSaveMailing}
                                                            disabled={mailingSaveButtonDisabled}
                                                            class="slds-m-left_x-small"
                                                        ></lightning-button>
                                                    </div>
                                                </div>
                                            </div>
                                            <div
                                                class="slds-col slds-size_1-of-1 slds-large-size_4-of-12 case-info__mailing-aside"

                                                <p
                                                    class="case-info__field-label slds-m-bottom_xx-small"

                                                    {labels.mailingAddress}

                                                    type="checkbox"
                                                    variant="label-hidden"
                                                    label={labels.mailingAddress}

                                                    disabled={permanentMailingCheckboxDisabled}
                                                    onchange={handleMailingCheckboxChange}
                                                    class="case-info__mailing-checkbox-input"
                                                ></lightning-input>
                                            </div>
                                        </div>
                                    </template>
                                </template>
                            </div>
                            </template>

                                                    </div>
                                                    <div

                                                    <div
                                                        class="slds-form-element slds-m-bottom_small"

                                                        ></lightning-input>
                                                    </div>
                                                    <div
                                                        class="slds-form-element slds-m-bottom_small"
                                                    >
                                                        <c-fec_searchable-combobox
                                                            label={labels.provinceCity}
                                                            value={mailingCity}
                                                            options={provinceOptions}
                                                            placeholder={labels.provinceSearchPlaceholder}
                                                            required
                                                            onchange={handleMailingProvinceChange}
                                                        ></c-fec_searchable-combobox>
                                                    </div>
                                                    <div
                                                        class="slds-form-element slds-m-bottom_small"
                                                    >
                                                        <c-fec_searchable-combobox
                                                            label={labels.ward}
                                                            value={mailingDistrict}
                                                            options={districtOptions}
                                                            placeholder={labels.wardSearchPlaceholder}
                                                            required
                                                            disabled={districtComboboxDisabled}
                                                            onchange={handleMailingDistrictChange}
                                                        ></c-fec_searchable-combobox>
                                                    </div>
                                                    <div
                                                        class="slds-grid slds-grid_align-end slds-m-top_small case-info__form-actions"
                                                    >
                                                        <lightning-button
                                                            variant="neutral"
                                                            label={labels.cancel}
                                                            onclick={handleCancelMailingEdit}
                                                            disabled={mailingSaveLoading}
                                                        ></lightning-button>
                                                        <lightning-button
                                                            variant="brand"
                                                            label={labels.save}
                                                            onclick={handleSaveMailing}
                                                            disabled={mailingSaveButtonDisabled}
                                                            class="slds-m-left_x-small"
                                                        ></lightning-button>
                                                    </div>
                                                </div>
                                            </div>
                                            <div
                                                class="slds-col slds-size_1-of-1 slds-large-size_4-of-12 case-info__mailing-aside"
                                            >
                                                <p
                                                    class="case-info__field-label slds-m-bottom_xx-small"
                                                >
                                                    {labels.mailingAddress}
                                                </p>
                                                <lightning-input

                                                    label={labels.mailingAddress}
                                                    data-row="office"

                                                    disabled={officeMailingCheckboxDisabled}
                                                    onchange={handleMailingCheckboxChange}
                                                    class="case-info__mailing-checkbox-input"
                                                ></lightning-input>
                                            </div>
                                        </div>
                                    </template>
                                </template>
                            </div>
                            </template>

                            <template if:true={showCurrentUpdatedRow}>
                            <div
                                class="case-info__row case-info__row--editable slds-border_bottom"
                            >
                                <template if:false={isEditingCurrentMailing}>
                                    <div
                                        class="slds-grid slds-wrap slds-gutters_small slds-grid_vertical-align-start"
                                    >
                                        <div
                                            class="slds-col slds-size_1-of-1 slds-medium-size_6-of-12"
                                        >
                                            <p class="case-info__field-label">
                                                {labels.currentAddressOption}
                                            </p>
                                            <p class="case-info__field-value">
                                                {currentUpdatedDisplay}
                                            </p>
                                        </div>
                                        <div
                                            class="slds-col slds-size_1-of-1 slds-medium-size_3-of-12 case-info__mailing-toggle-col"
                                        >
                                            <p
                                                class="case-info__field-label slds-m-bottom_xx-small"
                                            >

                                            </p>
                                            <lightning-input
                                                type="checkbox"
                                                variant="label-hidden"
                                                label={labels.mailingAddress}

                                                disabled={currentMailingCheckboxDisabled}
                                                onchange={handleMailingCheckboxChange}

                                        </div>
                                        <div

                                            <div

                                            >
                                                <p class="case-info__field-label">

                                                    <div

                                                        <lightning-input

                                                    </div>

                                                    >
                                                        <c-fec_searchable-combobox

                                                            value={mailingDistrict}
                                                            options={districtOptions}
                                                            placeholder={labels.wardSearchPlaceholder}
                                                            required
                                                            disabled={districtComboboxDisabled}
                                                            onchange={handleMailingDistrictChange}
                                                        ></c-fec_searchable-combobox>
                                                    </div>
                                                    <div

                                                </div>

        <template if:true={newAddressModalOpen}>
            <div
                class="fec-new-address-modal__overlay"
                role="presentation"
                onclick={handleCancelNewAddress}
            >
                <section
                    role="dialog"
                    tabindex="-1"
                    aria-modal="true"
                    aria-labelledby="fec-new-address-heading"
                    class="fec-new-address-modal__panel"
                    onclick={handleNewAddressPanelClick}
                >
                    <header class="fec-new-address-modal__header">
                        <h2
                            id="fec-new-address-heading"
                            class="fec-new-address-modal__title"
                        >
                            {labels.newAddressTitle}
                        </h2>
                        <div class="fec-new-address-modal__rule"></div>
                    </header>
                    <div class="fec-new-address-modal__body slds-p-around_medium">
                        <template if:true={newAddressModalLoading}>
                            <div class="fec-new-address-modal__spinner-wrap">
                                <lightning-spinner
                                    alternative-text={labels.loading}
                                    size="medium"
                                ></lightning-spinner>
                            </div>
                        </template>
                        <template if:false={newAddressModalLoading}>
                            <div class="case-info__new-address-form">
                                <div
                                    class="slds-form-element slds-m-bottom_small"
                                >
                                    <lightning-combobox
                                        label={labels.addressTypeLabel}
                                        value={newAddrAddressType}
                                        options={newAddressTypeOptions}
                                        required
                                        onchange={handleNewAddressTypeChange}
                                    ></lightning-combobox>
                                </div>
                                <div
                                    class="slds-grid slds-wrap slds-gutters_small"
                                >
                                    <div
                                        class="slds-col slds-size_1-of-1 slds-medium-size_1-of-2"
                                    >
                                        <lightning-input
                                            label={labels.building}
                                            value={newAddrBuilding}
                                            onchange={handleNewAddrBuildingChange}
                                        ></lightning-input>
                                    </div>
                                    <div
                                        class="slds-col slds-size_1-of-1 slds-medium-size_1-of-2"
                                    >
                                        <c-fec_searchable-combobox
                                            label={labels.provinceCity}
                                            value={newAddrCity}
                                            options={newAddrProvinceOptions}
                                            placeholder={labels.provinceSearchPlaceholder}

                                    </div>
                                    <div class="slds-col slds-size_1-of-1">
                                        <c-fec_searchable-combobox
                                            label={labels.ward}
                                            value={newAddrDistrict}
                                            options={newAddrDistrictOptions}
                                            placeholder={labels.wardSearchPlaceholder}
                                            required
                                            disabled={newAddrDistrictComboboxDisabled}
                                            onchange={handleNewAddrDistrictChange}
                                        ></c-fec_searchable-combobox>
                                    </div>
                                    <div
                                        class="slds-col slds-size_1-of-1 slds-medium-size_1-of-2"
                                    >
                                        <lightning-input
                                            label={labels.number}
                                            value={newAddrNumber}
                                            onchange={handleNewAddrNumberChange}
                                        ></lightning-input>
                                    </div>
                                    <div
                                        class="slds-col slds-size_1-of-1 slds-medium-size_1-of-2"
                                    >
                                        <lightning-input
                                            label={labels.street}
                                            value={newAddrStreet}
                                            required
                                            onchange={handleNewAddrStreetChange}
                                        ></lightning-input>
                                    </div>
                                    <div
                                        class="slds-col slds-size_1-of-1 slds-medium-size_1-of-2 slds-grid slds-grid_vertical-align-end"
                                    >
                                        <lightning-input
                                            type="checkbox"
                                            label={labels.mailingAddress}
                                            checked={newAddrIsMailing}
                                            onchange={handleNewAddrMailingChange}
                                            class="fec-new-address-modal__mailing-cb"
                                        ></lightning-input>
                                    </div>
                                </div>
                            </div>
                        </template>
                    </div>
                    <footer class="fec-new-address-modal__footer">
                        <div class="fec-new-address-modal__rule"></div>
                        <div
                            class="slds-grid slds-grid_align-end slds-m-top_small"
                        >
                            <lightning-button
                                variant="neutral"
                                label={labels.cancel}
                                onclick={handleCancelNewAddress}
                                disabled={newAddressSaveLoading}
                            ></lightning-button>
                            <lightning-button
                                variant="brand"
                                label={labels.save}
                                onclick={handleSaveNewAddress}
                                disabled={newAddressSubmitDisabled}
                                class="slds-m-left_x-small"
                            ></lightning-button>
                        </div>
                    </footer>
                </section>
            </div>
        </template>
</template>
