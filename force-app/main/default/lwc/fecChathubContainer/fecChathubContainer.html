<template>
    <div class="slds-p-around_x-small">
        <template if:true={isInitialized}>            
            <template if:true={isChatHubVisible}>
                <div class="chathub-iframe-wrapper slds-m-top_medium" style="height: 600px; width: 100%;">
                    <iframe 
                        src={chatHubUrl} 
                        class="chathub-iframe" 
                        style="height: 100%; width: 100%; border: none;"
                        title="ChatHub"
                    ></iframe>
                </div>
            </template>
        </template>
        <template if:false={isInitialized}>
            <p>ChatHub is disabled or user access denied.</p>
        </template>
    </div>
</template>
