<template>
    <lightning-card title={labelTitle} icon-name="standard:record_lookup">

                    <lightning-datatable key-field="Id" data={pagedProductType}
                        columns={columnsBasic} hide-checkbox-column></lightning-datatable>
                    <div class="slds-grid slds-grid_align-center slds-p-top_x-small">
                        <lightning-button-group>
                            <lightning-button label="First" data-tab="ProductType" onclick={handleFirst} disabled={isPrevDisabledProductType} variant="neutral"></lightning-button>

                        <span class="slds-p-left_small slds-align-middle page-info">{pageInfoProductType}</span>
