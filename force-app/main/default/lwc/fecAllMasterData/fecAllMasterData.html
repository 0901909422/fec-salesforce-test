<template>
    <lightning-card title={labelTitle} icon-name="standard:record_lookup">
        <div slot="actions">
            <lightning-button label={labelRefresh} icon-name="utility:refresh" onclick={handleRefresh}
                variant="neutral">
            </lightning-button>
        </div>
        <div class="slds-p-around_small">
            <lightning-tabset variant="scoped">

                <!-- Product Type -->
                <lightning-tab label={labelTabProduct}>
                    <div class="slds-p-bottom_x-small">
                        <lightning-input type="search" placeholder={labelSearchAll} data-tab="ProductType"
                            onchange={handleSearch} variant="label-hidden"></lightning-input>
                    </div>
                    <lightning-datatable key-field="Id" data={pagedProductType}
                        columns={columnsBasic} hide-checkbox-column></lightning-datatable>
                    <c-fec-pagination
                        current-page={currentPageProductType}
                        total-records={totalRecordsProductType}
                        page-size={pageSize}
                        data-tab="ProductType"
                        onpagechange={handleTabPageChange}
                        onpagesizechange={handleTabPageSizeChange}>
                    </c-fec-pagination>
                </lightning-tab>

                <!-- Business Process -->
                <lightning-tab label={labelTabBP}>
                    <div class="slds-p-bottom_x-small">
                        <lightning-input type="search" placeholder={labelSearchAll} data-tab="BusinessProcess"
                            onchange={handleSearch} variant="label-hidden"></lightning-input>
                    </div>
                    <lightning-datatable key-field="Id" data={pagedBusinessProcess}
                        columns={columnsBasic} hide-checkbox-column></lightning-datatable>
                    <c-fec-pagination
                        current-page={currentPageBusinessProcess}
                        total-records={totalRecordsBusinessProcess}
                        page-size={pageSize}
                        data-tab="BusinessProcess"
                        onpagechange={handleTabPageChange}
                        onpagesizechange={handleTabPageSizeChange}>
                    </c-fec-pagination>
                </lightning-tab>

                <!-- Category -->
                <lightning-tab label={labelTabCategory}>
                    <div class="slds-p-bottom_x-small">
                        <lightning-input type="search" placeholder={labelSearchAll} data-tab="Category"
                            onchange={handleSearch} variant="label-hidden"></lightning-input>
                    </div>
                    <lightning-datatable key-field="Id" data={pagedCategory}
                        columns={columnsBasic} hide-checkbox-column></lightning-datatable>
                    <c-fec-pagination
                        current-page={currentPageCategory}
                        total-records={totalRecordsCategory}
                        page-size={pageSize}
                        data-tab="Category"
                        onpagechange={handleTabPageChange}
                        onpagesizechange={handleTabPageSizeChange}>
                    </c-fec-pagination>
                </lightning-tab>

                <!-- Sub Category -->
                <lightning-tab label={labelTabSubCategory}>
                    <div class="slds-p-bottom_x-small">
                        <lightning-input type="search" placeholder={labelSearchAll} data-tab="SubCategory"
                            onchange={handleSearch} variant="label-hidden"></lightning-input>
                    </div>
                    <lightning-datatable key-field="Id" data={pagedSubCategory}
                        columns={columnsBasic} hide-checkbox-column></lightning-datatable>
                    <c-fec-pagination
                        current-page={currentPageSubCategory}
                        total-records={totalRecordsSubCategory}
                        page-size={pageSize}
                        data-tab="SubCategory"
                        onpagechange={handleTabPageChange}
                        onpagesizechange={handleTabPageSizeChange}>
                    </c-fec-pagination>
                </lightning-tab>

                <!-- Sub Code -->
                <lightning-tab label={labelTabSubCode}>
                    <div class="slds-p-bottom_x-small">
                        <lightning-input type="search" placeholder={labelSearchAll} data-tab="SubCode"
                            onchange={handleSearch} variant="label-hidden"></lightning-input>
                    </div>
                    <lightning-datatable key-field="Id" data={pagedSubCode}
                        columns={columnsBasic} hide-checkbox-column></lightning-datatable>
                    <c-fec-pagination
                        current-page={currentPageSubCode}
                        total-records={totalRecordsSubCode}
                        page-size={pageSize}

                        onpagechange={handleTabPageChange}
                        onpagesizechange={handleTabPageSizeChange}>

                        page-size={pageSize}

                        onpagesizechange={handleTabPageSizeChange}>
                    </c-fec-pagination>
                </lightning-tab>

                <!-- Channel -->

                    <lightning-datatable key-field="Id" data={pagedChannel}

                <!-- Additional Field -->
                <lightning-tab label={labelTabAddField}>
                    <div class="slds-p-bottom_x-small">

                    <lightning-datatable key-field="Id" data={pagedAdditionalField}

                </lightning-tab>

                <!-- Additional Field List -->
                <lightning-tab label={labelTabAddFieldList}>

                <!-- Action Button -->
                <lightning-tab label={labelTabActionButton} value="ActionButton">
                    <div class="slds-p-bottom_x-small">
                        <lightning-input type="search" placeholder={labelSearchAll} data-tab="ActionButton"

                    </div>
                    <lightning-datatable key-field="Id" data={pagedActionButton}

                    <c-fec-pagination

                </lightning-tab>

                <!-- Stage Change -->
                <lightning-tab label={labelTabStageChange} value="StageChange">
                    <div class="slds-p-bottom_x-small">
                        <lightning-input type="search" placeholder={labelSearchAll} data-tab="StageChange"
                            onchange={handleSearch} variant="label-hidden"></lightning-input>
                    </div>
                    <lightning-datatable key-field="Id" data={pagedStageChange}
                        columns={columnsStageChange} hide-checkbox-column></lightning-datatable>
                    <c-fec-pagination
                        current-page={currentPageStageChange}
                        total-records={totalRecordsStageChange}
                        page-size={pageSize}
                        data-tab="StageChange"
                        onpagechange={handleTabPageChange}
                        onpagesizechange={handleTabPageSizeChange}>
                    </c-fec-pagination>
                </lightning-tab>

            </lightning-tabset>
        </div>
    </lightning-card>
</template>
