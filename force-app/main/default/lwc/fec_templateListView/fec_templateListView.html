<template>
    <!-- Loading spinner -->
    <template if:true={isLoading}>
        <lightning-spinner alternative-text="Loading" size="medium"></lightning-spinner>
    </template>

    <template if:false={isLoading}>
        <template if:true={hasTemplates}>
            <c-fec_-custom-datatable
                key-field="id"
                data={filteredTemplates}
                columns={columns}
                hide-checkbox-column
                show-row-number-column
                sorted-by={sortedBy}
                sorted-direction={sortedDirection}
                onsort={handleSort}
                onrowaction={handleRowAction}
                onnamelinkclick={handleNameLinkClick}
            ></c-fec_-custom-datatable>
        </template>
        <template if:false={hasTemplates}>
            <div class="slds-illustration slds-illustration_small slds-p-around_large">
                <div class="slds-text-longform">
                    <h3 class="slds-text-heading_medium">{label.FEC_No_Templates_Found}</h3>
                </div>
            </div>
        </template>
    </template>
</template>
