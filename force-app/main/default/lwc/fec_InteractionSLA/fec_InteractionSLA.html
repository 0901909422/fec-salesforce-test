<template>
  <div class="slds-card">
    <div class="slds-grid slds-gutters slds-m-top_small">

      <!-- LEFT: Icons (50%) -->
      <div class="slds-col slds-size_6-of-12 slds-p-bottom_none">
        
        <div class="duration">
          <div class="duration__donut"></div>
          <div>
            <img src={iconUrl} alt="" />
          </div>
        </div>
      </div>

      <!-- RIGHT: Picklist component (50%) - hidden when viewMode is 'review' -->
      <!-- <template if:false={isReviewMode}> -->
        <div class="slds-col slds-size_6-of-12">
          <c-fec_-account-or-contract-picklist-interaction
            record-id={recordId}></c-fec_-account-or-contract-picklist-interaction>
        </div>
      <!-- </template> -->
    </div>
  </div>

  <!-- Quick Wrap-up Modal (same UI as Wrap-up, but combobox is disabled and default value) -->
  <template if:true={isQuickWrapUpModalOpen}>
    <section role="dialog" tabindex="-1" class="slds-modal slds-fade-in-open">
      <div class="slds-modal__container">
        <!-- Modal Header -->
        <header class="slds-modal__header">
          <h2 class="slds-text-heading_medium">{customLabel.quickWrapUp}</h2>
        </header>

        <!-- Modal Body -->
        <div class="slds-modal__content slds-p-around_medium">
          <lightning-combobox name="quickOutcomeCode" label={customLabel.selectOutcomeCode} value={quickWrapUpOutcomeCode}
            placeholder="--None--" options={quickOutcomeCodeOptions} disabled></lightning-combobox>
        </div>

        <!-- Modal Footer -->
        <footer class="slds-modal__footer">
          <lightning-button variant="neutral" label={customLabel.btnCancel} onclick={handleQuickWrapUpCancelClick}></lightning-button>
          <lightning-button variant="brand" label={customLabel.btnConfirm} onclick={handleQuickWrapUpConfirmClick}></lightning-button>
        </footer>
      </div>
    </section>
    <div class="slds-backdrop slds-backdrop_open"></div>
  </template>

  <!-- Wrap-up Modal -->
  <template if:true={isWrapUpModalOpen}>
    <section role="dialog" tabindex="-1" class="slds-modal slds-fade-in-open">
      <div class="slds-modal__container">
        <!-- Modal Header -->
        <header class="slds-modal__header">
          <h2 class="slds-text-heading_medium">{customLabel.wrapUpInformation}</h2>
        </header>

        <!-- Modal Body -->
        <div class="slds-modal__content slds-p-around_medium">
          <lightning-combobox name="outcomeCode" label={customLabel.selectOutcomeCode} value={selectedOutcomeCode}
            placeholder="--None--" options={outcomeCodeOptions} onchange={handleOutcomeCodeChange}
            required></lightning-combobox>

          <div class="slds-form-element slds-m-top_medium">
            <label class="slds-form-element__label" for="interactionRemarks">
              <span class="slds-form-element__label">{customLabel.interactionRemark}</span>
            </label>
            <div class="slds-form-element__control">
              <textarea id="interactionRemarks" class="slds-textarea" oninput={handleInteractionRemarksChange}
                placeholder={customLabel.interactionRemarkPlaceholder}>{interactionRemarks}</textarea>
            </div>
          </div>
        </div>

        <!-- Modal Footer -->
        <footer class="slds-modal__footer">
          <lightning-button variant="neutral" label={customLabel.btnCancel} onclick={handleCancelClick}></lightning-button>
          <lightning-button variant="brand" label={customLabel.btnConfirm} onclick={handleConfirmClick}></lightning-button>
        </footer>
      </div>
    </section>
    <div class="slds-backdrop slds-backdrop_open"></div>
  </template>
</template>
