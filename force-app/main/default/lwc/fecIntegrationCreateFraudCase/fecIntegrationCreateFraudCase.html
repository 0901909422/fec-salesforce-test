<template>
    <lightning-card title="Create Fraud Case" variant="base">
        <div class="slds-p-around_medium">

            <!-- LOADING -->
            <template lwc:if={loading}>
                <lightning-spinner alternative-text="Loading"></lightning-spinner>
            </template>

            <template lwc:if={notLoading}>
                
                <div class="slds-box slds-m-bottom_medium">            
                    <div class="slds-grid slds-wrap slds-gutters">        
                        <lightning-combobox
                            label={labels.Int_Category}
                            required
                            class="slds-col slds-size_1-of-4"
                            options={categoryOptions}
                            value={category}
                            onchange={handleCategory}>
                        </lightning-combobox>
        
                        <lightning-combobox
                            label={labels.Int_Sub_Category}
                            required
                            class="slds-col slds-size_1-of-4"
                            options={subCategoryOptions}
                            value={subCategory}
                            onchange={handleSubCategory}>
                        </lightning-combobox>
        
                        <lightning-combobox
                            label={labels.Int_Sub_Code}
                            class="slds-col slds-size_1-of-4"
                            options={subCodeOptions}
                            value={subCode}
                            onchange={handleSubCode}>
                        </lightning-combobox>
        
                    </div>
                </div>
                <!-- Additional Properties -->
                <template lwc:if={additionalProps.length}>
                    <div class="slds-m-top_medium slds-p-around_small slds-box">
                       
                        <div class="slds-box slds-theme_default">

                            <!-- TITLE -->
                            <h3 class="slds-text-heading_small slds-m-bottom_small slds-text-title_caps">
                                {fraudIntChannel} Properties
                            </h3>
                    
                            <!-- GRID -->
                            <div class="slds-grid slds-wrap slds-gutters">
                    
                                <!-- Int User Type -->
                                <div class="slds-col slds-size_1-of-6">
                                    <div class="slds-text-title">{labels.Int_User_Type}</div>
                                    <div class="slds-text-title_bold">{fraudIntUserType}</div>
                                </div>
                    
                                <!-- Int Product Line -->
                                <div class="slds-col slds-size_1-of-6">
                                    <div class="slds-text-title">{labels.Int_Product_Line}</div>
                                    <div class="slds-text-title_bold">{fraudIntProductLine}</div>
                                </div>
                    
                                <!-- Int Service Type -->
                                <div class="slds-col slds-size_1-of-6">
                                    <div class="slds-text-title">{labels.Int_Service_Type}</div>
                                    <div class="slds-text-title_bold">{fraudIntServiceType}</div>
                                </div>
                    
                                <!-- Int Category -->
                                <div class="slds-col slds-size_1-of-6">
                                    <div class="slds-text-title">{labels.Int_Category}</div>
                                    <div class="slds-text-title_bold">{fraudIntCategory}</div>
                                </div>
                    
                                <!-- Int Sub Category -->
                                <div class="slds-col slds-size_1-of-6">
                                    <div class="slds-text-title">{labels.Int_Sub_Category}</div>
                                    <div class="slds-text-title_bold">{fraudIntSubCategory}</div>
                                </div>
                    
                                <!-- Int Sub Code -->
                                <div class="slds-col slds-size_1-of-6">
                                    <div class="slds-text-title">{labels.Int_Sub_Code}</div>
                                    <div class="slds-text-title_bold">{fraudIntSubCode}</div>
                                </div>
                    
                            </div>
                        </div>
                        
                        
                
                        <div class="slds-grid slds-wrap slds-gutters">
                            <template for:each={additionalProps} for:item="prop">
                                <!-- 1 column (1/3 width) -->
                                <div key={prop.id} class="slds-col slds-size_1-of-1 slds-medium-size_1-of-3">
                                    
                                    <div class="slds-m-vertical_small">
                    
                                        <!-- STRING -->
                                        <template lwc:if={prop.isString}>
                                            <lightning-input
                                                type="text"
                                                label={prop.displayName}
                                                value={prop.value}
                                                data-id={prop.id}
                                                required={prop.mandatory}
                                                onchange={onFieldChange}>
                                            </lightning-input>
                                        </template>
                    
                                        <!-- NUMBER -->
                                        <template lwc:if={prop.isNumber}>
                                            <lightning-input
                                                type="number"
                                                label={prop.displayName}
                                                data-id={prop.id}
                                                value={prop.value}
                                                required={prop.mandatory}
                                                onchange={onFieldChange}>
                                            </lightning-input>
                                        </template>
                    
                                        <!-- BOOLEAN -->
                                        <template lwc:if={prop.isBoolean}>
                                            <lightning-input
                                                type="checkbox"
                                                label={prop.displayName}
                                                checked={prop.value}
                                                data-id={prop.id}
                                                onchange={onFieldChange}>
                                            </lightning-input>
                                        </template>
                    
                                        <!-- MULTI -->
                                        <template lwc:if={prop.isMulti}>
                                            <lightning-textarea
                                                label={prop.displayName}
                                                data-id={prop.id}
                                                value={prop.value}
                                                required={prop.mandatory}
                                                placeholder="Enter multiple values separated by commas"
                                                onchange={onFieldChange}>
                                            </lightning-textarea>
                                        </template>
                    
                                        <!-- DATE -->
                                        <template lwc:if={prop.isDate}>
                                            <lightning-input
                                                type="date"
                                                label={prop.displayName}
                                                data-id={prop.id}
                                                value={prop.value}
                                                required={prop.mandatory}
                                                onchange={onFieldChange}>
                                            </lightning-input>
                                        </template>
                    
                                        <!-- PICKLIST -->
                                        <template lwc:if={prop.isPicklist}>
                                            <lightning-combobox
                                                label={prop.displayName}
                                                data-id={prop.id}
                                                value={prop.value}
                                                options={prop.options}
                                                required={prop.mandatory}
                                                onchange={onFieldChange}>
                                            </lightning-combobox>
                                        </template>
                    
                                        <!-- LIST -->
                                        <template lwc:if={prop.isList}>
                                            <lightning-combobox
                                                label={prop.displayName}
                                                data-id={prop.id}
                                                value={prop.value}
                                                options={prop.options}
                                                required={prop.mandatory}
                                                onchange={onFieldChange}>
                                            </lightning-combobox>
                                        </template>
                    
                                        <!-- FILE -->
                                        <template lwc:if={prop.isFile}>
                                            <lightning-input
                                                type="file"
                                                label={prop.displayName}
                                                data-id={prop.id}
                                                required={prop.mandatory}
                                                onchange={onFileChange}>
                                            </lightning-input>
                    
                                            <template lwc:if={prop.fileName}>
                                                <div class="slds-text-body_small slds-m-top_x-small">
                                                    File: {prop.fileName}
                                                </div>
                                            </template>
                                        </template>
                    
                                    </div>
                                </div>
                            </template>
                        </div>
                    </div>
                </template>

                <!-- Other Fields -->
                <div class="slds-m-top_medium slds-box slds-p-around_small">
                    <div class="slds-grid slds-wrap slds-gutters">
                        
                        <!-- Column 1 -->
                        <div class="slds-col slds-size_1-of-3">
                            <lightning-textarea
                                label="Remarks"
                                data-field="remarks"
                                required
                                value={remarks}
                                onchange={onSimpleChange}>
                            </lightning-textarea>
                        </div>                
                    </div>
                </div>
                

                <!-- BUTTONS -->
                <div class="slds-m-top_large">
                    <lightning-button
                        label={labels.Create_Fraud_Case_Button}
                        variant="brand"
                        onclick={onSubmit}
                        disabled={isCreateSubmitting}>
                    </lightning-button>
                
                    
                </div>


                <!-- Result -->
                <template lwc:if={resultMessage}>
                    <div class="slds-m-top_medium">
                        <lightning-formatted-text value={resultMessage}></lightning-formatted-text>
                    </div>
                </template>
                <!-- Preview Modal -->
            <template lwc:if={showPreview}>
                <section role="dialog" tabindex="-1" class="slds-modal slds-fade-in-open">
                    <div class="slds-modal__container">

                        <!-- HEADER -->
                        <header class="slds-modal__header">
                            <h2 class="slds-modal__title"></h2>
                        </header>

                        <!-- BODY -->
                        <div class="slds-modal__content slds-p-around_medium">
                            <pre style="white-space: pre-wrap; background:#f4f6f9; padding:10px;">
            {previewJson}
                            </pre>
                        </div>

                        <!-- FOOTER -->
                        <footer class="slds-modal__footer">
                            <lightning-button variant="neutral" label="Cancel" onclick={cancelPreview}></lightning-button>
                            <lightning-button variant="brand" label="Confirm Submit" onclick={confirmSubmit} class="slds-m-left_small"></lightning-button>
                        </footer>

                    </div>
                </section>
                <div class="slds-backdrop slds-backdrop_open"></div>
            </template>

            </template>
            

        </div>
    </lightning-card>
</template>
