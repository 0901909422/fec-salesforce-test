<template>
    <template if:true={showHoldCaseSection}>
        <c-fec_hold-case-auto
            record-id={recordId}
            result-override={holdCaseResultOverride}>
        </c-fec_hold-case-auto>
    </template>

    <template if:true={showRemovePhone}>
        <c-fec_-remove-phone-form
            record-id={recordId}
            lock-after-revert-to-default-stage={lockApiLwcsAfterRevertToDefaultStage}>
        </c-fec_-remove-phone-form>
    </template>

    <template if:true={showDoNotBother}>
        <c-fec_-do-not-bother-handling record-id={recordId}>
        </c-fec_-do-not-bother-handling>
    </template>

    <template if:true={showTransferCall}>
        <c-fec_-transfer-call record-id={recordId}>
        </c-fec_-transfer-call>
    </template>
</template>
