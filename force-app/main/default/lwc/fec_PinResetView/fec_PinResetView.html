<template>
    <div class="container">
        <!-- Button -->
        <div class="button-container">
            <template if:false={isInvisibleButton}>
                <lightning-button label={label.FEC_Reset_PIN_Title} variant="brand" onclick={openModal}>
                </lightning-button>
            </template>

            <template if:true={isShowSuccessMessage}>
                <p class="slds-text-color_success slds-m-top_medium">Test</p>
            </template>

            <template if:true={isShowRetryMessage}>
                <p class="slds-text-color_error slds-m-top_medium">{label.FEC_RESET_PIN_ERROR}</p>
            </template>

            <template if:true={isShowFailedMessage}>
                <p class="slds-text-color_error slds-m-top_medium">{label.FEC_RESET_PIN_FAILED}</p>
            </template>
        </div>
    </div>

    <!-- MODAL -->
    <template if:true={isOpen}>
        <section role="dialog" tabindex="-1" aria-modal="true" class="slds-modal slds-fade-in-open">

            <div class="slds-modal__container">

                <!-- HEADER -->
                <header class="slds-modal__header custom-header">
                    <h2 class="slds-text-heading_medium">{label.FEC_Reset_PIN_Title}</h2>
                </header>

                <!-- BODY -->
                <div class="slds-modal__content slds-p-around_medium custom-body">
                    <p>
                        {label.FEC_Reset_Pin_Confirm_Msg}
                    </p>
                </div>

                <!-- FOOTER -->
                <footer class="slds-modal__footer custom-footer">

                    <lightning-button label={label.FEC_No_Btn} variant="neutral" onclick={handleCloseModal}>
                    </lightning-button>

                    <lightning-button label={label.FEC_Yes_Btn} variant="brand" class="slds-m-left_small"
                        onclick={handleConfirmReset}>
                    </lightning-button>

                </footer>

            </div>
        </section>

        <!-- BACKDROP -->
        <div class="slds-backdrop slds-backdrop_open"></div>
    </template>
</template>
