<template>
    <template if:true={item.name}>

        <lightning-layout class="main-container slds-grid_stretch">

            <lightning-layout-item size="12" large-device-size={mainPanelSize} class="main-panel slds-p-right_small">

                <div class="config-main slds-m-bottom_medium">
                    <c-fec-flow-configuration onhandlestageclick={handleStageClick}
                        node-data={item}></c-fec-flow-configuration>
                </div>

                <lightning-tabset variant="scoped">
                    <lightning-tab label="Property Configuration">
                        <lightning-card title={labelCardTitle} icon-name="standard:settings">
                            <lightning-button label={labelNewSetting} icon-name="utility:add" slot="actions"
                                onclick={openNewSettingModal} variant="brand">
                            </lightning-button>
                            <div class="slds-p-horizontal_small slds-m-top_small">
                                <lightning-input
                                    type="search"
                                    placeholder={labelSearchPlaceholder}
                                    value={searchTermProperty}
                                    onchange={handleSearchProperty}
                                    icon-name="utility:search"
                                    variant="label-hidden">
                                </lightning-input>
                            </div>
                        </lightning-card>

                        <div class="slds-p-around_small">
                          <div class="table-scroll-wrapper">
                            <div class="custom-table-grid slds-theme_shade slds-text-title_caps slds-border_bottom">
                                <div class="slds-col" style="text-align: center;">STT</div>
                                <div class="slds-col" style="text-align: center;"></div>
                                <div class="slds-col" onclick={handleSort} data-field="FEC_Channel__c"
                                    style="text-align: center;">
                                    {labelColChannel}
                                    <span class="slds-m-left_xx-small">
                                        <lightning-icon if:true={isChannelSorted} icon-name={sortIconName}
                                            size="xx-small"></lightning-icon>
                                    </span>
                                </div>
                                <div class="slds-col" onclick={handleSort} data-field="FEC_Applicable_Role__c"
                                    style="text-align: center;">
                                    {labelColApplicableRole}
                                    <span class="slds-m-left_xx-small">
                                        <lightning-icon if:true={isRoleSorted} icon-name={sortIconName}
                                            size="xx-small"></lightning-icon>
                                    </span>
                                </div>
                                <div class="slds-col" onclick={handleSort} data-field="FEC_Additional_Field_Name">
                                    {labelColPropertyName}
                                    <span class="slds-m-left_xx-small">
                                        <lightning-icon if:true={isPropertySorted} icon-name={sortIconName}
                                            size="xx-small"></lightning-icon>
                                    </span>
                                </div>
                                <div class="slds-col" onclick={handleSort} data-field="FEC_Section__c">
                                    {labelColSection}
                                    <span class="slds-m-left_xx-small">
                                        <lightning-icon if:true={isSectionSorted} icon-name={sortIconName}
                                            size="xx-small"></lightning-icon>
                                    </span>
                                </div>
                                <div class="slds-col" onclick={handleSort} data-field="FEC_Sub_Section__c">
                                    {labelColSubSection}
                                    <span class="slds-m-left_xx-small">
                                        <lightning-icon if:true={isSubSectionSorted} icon-name={sortIconName}
                                            size="xx-small"></lightning-icon>
                                    </span>
                                </div>
                                <div class="slds-col">{labelColEditableRole}</div>
                                <div class="slds-col" onclick={handleSort} data-field="FEC_Sub_Section_Order__c"
                                    style="text-align: center;">
                                    {labelColSubSecOrder}
                                </div>
                                <div class="slds-col" style="text-align: center;">Columns</div>
                                <div class="slds-col" onclick={handleSort} data-field="FEC_Field_Order_Display__c"
                                    style="text-align: center;">
                                    {labelColOrder}
                                    <span class="slds-m-left_xx-small">
                                        <lightning-icon if:true={isOrderSorted} icon-name={sortIconName}
                                            size="xx-small"></lightning-icon>
                                    </span>
                                </div>
                                <div class="slds-col" onclick={handleSort} data-field="FEC_Field_Status__c"
                                    style="text-align: center;">{labelColStatus}</div>
                                <div class="slds-col" style="text-align: center;">{labelColProcessStatus}</div>
                                <div class="slds-col" style="text-align: center;">{labelAction}</div>
                            </div>

                            <template if:true={processedData}>
                                <template for:each={processedData} for:item="row">
                                    <div key={row.Id} class="slds-border_bottom">
                                        <div class="custom-table-grid">
                                            <div class="slds-col" style="text-align: center;">
                                                {row.rowNumber}
                                            </div>
                                            <div class="slds-col" style="text-align: center;">
                                                <lightning-icon icon-name="utility:record" size="xx-small"
                                                    class={row.dynamicIconClass}></lightning-icon>
                                                <lightning-icon icon-name="utility:user" size="xx-small"
                                                    class={row.customerIconClass}></lightning-icon>
                                            </div>

                                            <div class="slds-col slds-truncate"
                                                style="text-align: center;"
                                                title={row.FEC_Channel_Name_Name}>
                                                {row.FEC_Channel_Name_Name}
                                            </div>
                                            <div class="slds-col slds-truncate"
                                                style="text-align: center;"
                                                title={row.FEC_Applicable_Role__c}>{row.FEC_Applicable_Role__c}</div>
                                            <div class="slds-col slds-truncate"
                                                title={row.FEC_Additional_Field_Name}>{row.FEC_Additional_Field_Name}
                                            </div>
                                            <div class="slds-col slds-truncate"
                                                title={row.FEC_Section__c}>{row.FEC_Section__c}</div>
                                            <div class="slds-col slds-truncate"
                                                title={row.FEC_Sub_Section__c}>{row.FEC_Sub_Section__c}</div>
                                            <div class="slds-col slds-truncate"
                                                title={row.FEC_Editable_Role__c}>{row.FEC_Editable_Role__c}</div>
                                            <div class="slds-col" style="text-align: center;">
                                                {row.FEC_Sub_Section_Order__c}</div>
                                            <div class="slds-col" style="text-align: center;">
                                                {row.computedColumnCount}</div>
                                            <div class="slds-col" style="text-align: center;">
                                                {row.FEC_Field_Order_Display__c}</div>

                                            <div class="slds-col" style="text-align: center;">
                                                <lightning-icon if:true={row.FEC_Field_Status__c}
                                                    icon-name="utility:check" variant="success"
                                                    size="xx-small"></lightning-icon>
                                            </div>

                                            <div class="slds-col slds-truncate"
                                                style="text-align: center;"
                                                title={row.Process_Change_Status__c}>{row.Process_Change_Status__c}
                                            </div>
                                            <div class="slds-col" style="text-align: center;">
                                                <lightning-button-icon icon-name="utility:edit" alternative-text="Edit"
                                                    variant="bare" size="small" data-id={row.Id} data-action="edit"
                                                    onclick={handleIconAction} class="slds-m-right_xx-small">
                                                </lightning-button-icon>
                                                <span class="delete-icon-red" data-id={row.Id} data-action="delete" onclick={handleIconAction} style="cursor:pointer;">
                                                    <lightning-icon icon-name="utility:delete" size="xx-small" alternative-text="Delete"></lightning-icon>
                                                </span>
                                            </div>
                                        </div>
                                    </div>
                                </template>
                            </template>
                          </div>
                        </div>
                        <template if:true={hasPropertyData}>
                            <details class="slds-m-top_medium slds-m-horizontal_small slds-box slds-theme_default">
                                <summary class="slds-p-around_small" style="cursor:pointer; font-weight:600">▶ History</summary>
                                <div class="slds-p-horizontal_small slds-p-bottom_small">
                                    <c-fec-setting-history-by-noc data-id="propertyHistory" noc-id={currentNatureOfCaseId} is-integration={isPropertyIntegration}></c-fec-setting-history-by-noc>
                                </div>
                            </details>
                        </template>
                    </lightning-tab>

                    <lightning-tab label={labelTabFraudIntegration}>
                        <lightning-card title="Fraud Integration Mapping" icon-name="standard:hierarchy">
                        </lightning-card>

                        <div class="slds-is-relative slds-p-around_small">
                            <lightning-spinner if:true={isLoading} variant="brand" size="medium"></lightning-spinner>

                            <template if:true={isIntegrationAdd}>
                                <div class="slds-box slds-theme_default">
                                    <div
                                        class="slds-grid slds-grid_align-spread slds-align-content-center slds-p-bottom_medium slds-border_bottom">
                                        <div class="slds-text-heading_small">
                                            Add Integration Mapping & Settings
                                        </div>
                                        <div class="slds-grid slds-gap_small">
                                            <lightning-button label="Cancel"
                                                onclick={handleCancelIntegration}></lightning-button>
                                            <lightning-button label="Save Mapping" variant="brand"
                                                onclick={handleSaveIntegration}></lightning-button>
                                        </div>
                                    </div>

                                    <div class="slds-p-around_medium">
                                        <div class="slds-m-bottom_large">
                                            <h3 class="slds-text-heading_small slds-m-bottom_medium">Mapping Settings
                                            </h3>

                                            <div class="slds-m-bottom_medium">
                                                <label class="slds-form-element__label">
                                                    <span class="slds-required">*</span> Applicable Roles
                                                </label>
                                                <div class="slds-combobox_container" style="position:relative;">
                                                    <lightning-input type="search"
                                                        placeholder="Search Roles..."
                                                        value={roleSearchTerm}
                                                        onchange={handleRoleSearchInput}
                                                        onfocus={handleRoleSearchFocus}
                                                        onblur={handleRoleSearchBlur}
                                                        variant="label-hidden">
                                                    </lightning-input>
                                                    <template if:true={isRoleDropdownOpen}>
                                                        <div style="position:absolute;top:100%;left:0;z-index:9999;max-height:200px;overflow-y:auto;width:100%;background:#ffffff;border:1px solid #d8dde6;border-radius:0 0 4px 4px;box-shadow:0 2px 3px rgba(0,0,0,0.16);">
                                                            <template for:each={filteredRoleOptions} for:item="opt">
                                                                <div key={opt.value}
                                                                    data-value={opt.value} 
                                                                    onclick={handleSelectRoleFromList}
                                                                    class="slds-p-horizontal_small slds-p-vertical_xx-small"
                                                                    style="cursor:pointer;color:#181818;font-size:13px;border-bottom:1px solid #f3f3f3;"
                                                                    onmouseenter={handleRoleItemHover}>
                                                                    {opt.label}
                                                                </div>
                                                            </template>
                                                        </div>
                                                    </template>
                                                </div>
                                                <div class="slds-m-top_small">
                                                    <template for:each={integrationFormData.selectedRoles}
                                                        for:item="role" for:index="roleIndex">
                                                        <lightning-pill key={role} label={role} name={role}
                                                            onremove={handleRemoveRole} data-role={role}
                                                            data-index={roleIndex}>
                                                        </lightning-pill>
                                                    </template>
                                                </div>
                                            </div>

                                            <div class="slds-m-bottom_medium">
                                                <label class="slds-form-element__label">Settings</label>
                                                <div class="slds-grid slds-wrap slds-gutters">
                                                    <div class="slds-col slds-size_1-of-2 slds-m-bottom_small">
                                                        <lightning-combobox
                                                            label="Section"
                                                            value={integrationFormData.section}
                                                            options={integrationSectionOptions}
                                                            onchange={handleInputChange}
                                                            data-field="section"
                                                            disabled>
                                                        </lightning-combobox>
                                                    </div>
                                                    <div class="slds-col slds-size_1-of-2 slds-m-bottom_small">
                                                        <lightning-combobox
                                                            label="Sub Section"
                                                            value={integrationFormData.subSection}
                                                            options={integrationSubSectionOptions}
                                                            onchange={handleInputChange}
                                                            data-field="subSection"
                                                            disabled>
                                                        </lightning-combobox>
                                                    </div>
                                                    <div class="slds-col slds-size_1-of-3">
                                                        <lightning-input type="checkbox" label="Field Status"
                                                            checked={integrationFormData.fieldStatus}
                                                            onchange={handleCheckboxChange} data-field="fieldStatus">
                                                        </lightning-input>
                                                    </div>
                                                </div>
                                            </div>
                                        </div>

                                        <div class="slds-m-bottom_large">
                                            <c-fec-integration-mapping
                                                data-mapping-mode="add"
                                                onsuccessintegration={handleSuccessIntegration}
                                                oncancelintegration={handleCancelIntegration}
                                                mapping-id={selectedMappingId} user-type-name={userTypeName}
                                                channel-filter={defaultChannelCode}>
                                            </c-fec-integration-mapping>
                                        </div>
                                    </div>
                                </div>
                            </template>

                            <template if:false={isIntegrationAdd}>
                                <template if:true={hasFraudData}>
                                    <div
                                        class="custom-table-grid fraud-grid slds-theme_shade slds-text-title_caps slds-border_bottom">
                                        <div class="slds-col" style="text-align: center; grid-column: span 2;"></div>
                                        <div class="slds-col" style="text-align: center; grid-column: span 1;">Channel
                                        </div>
                                        <div class="slds-col" style="text-align: center; grid-column: span 2;">Product
                                            Line
                                        </div>
                                        <div class="slds-col" style="grid-column: span 4;">Service Type</div>
                                        <div class="slds-col" style="grid-column: span 2;">Category</div>
                                        <div class="slds-col" style="text-align: center; grid-column: span 2;">Sub
                                            Category
                                        </div>
                                        <div class="slds-col" style="text-align: center; grid-column: span 2;">Sub Code
                                        </div>
                                        <div class="slds-col" style="text-align: center; grid-column: span 2;">Status
                                        </div>
                                        <div class="slds-col col-delete-header"
                                            style="text-align: center; grid-column: span 1;"></div>
                                    </div>

                                    <template for:each={processedDataFraud} for:item="row">
                                        <div key={row.Id} class="slds-border_bottom">
                                            <div class="custom-table-grid fraud-grid">
                                                <div class="slds-col" style="text-align: center; grid-column: span 2;">
                                                    <lightning-button-icon icon-name={row.expandIcon} variant="bare"
                                                        onclick={toggleExpand} data-id={row.Id} size="small">
                                                    </lightning-button-icon>
                                                    <lightning-icon icon-name="utility:record" size="xx-small"
                                                        class={row.dynamicIconClass}></lightning-icon>
                                                    <lightning-icon icon-name="utility:user" size="xx-small"
                                                        class={row.customerIconClass}>
                                                    </lightning-icon>
                                                </div>
                                                <div class="slds-col slds-truncate"
                                                    style="text-align: center; grid-column: span 1;"
                                                    title={row.FEC_Channel_Name_Name}>
                                                    {row.FEC_Channel_Name_Name}
                                                </div>
                                                <div class="slds-col slds-truncate"
                                                    style="text-align: center; grid-column: span 2;">
                                                    {row.Product_Line__c}</div>
                                                <div class="slds-col slds-truncate" style="grid-column: span 4;"
                                                    title={row.Service_Type__c}>{row.Service_Type__c}</div>
                                                <div class="slds-col slds-truncate" style="grid-column: span 2;"
                                                    title={row.Category__c}>{row.Category__c}</div>
                                                <div class="slds-col slds-truncate"
                                                    style="text-align: center; grid-column: span 2;">
                                                    {row.Sub_Category__c}</div>
                                                <div class="slds-col slds-truncate"
                                                    style="text-align: center; grid-column: span 2;">{row.Sub_Code__c}
                                                </div>
                                                <div class="slds-col" style="text-align: center; grid-column: span 2;">
                                                    <template lwc:if={row.FEC_Field_Status__c}>
                                                        <span class="slds-badge slds-theme_success slds-cursor_pointer"
                                                            onclick={handleToggleStatus} data-id={row.Id}
                                                            data-status={row.FEC_Field_Status__c}
                                                            title={labelTooltipDeactivate}>{labelActive}</span>
                                                    </template>
                                                    <template lwc:else>
                                                        <span class="slds-badge slds-theme_error slds-cursor_pointer"
                                                            onclick={handleToggleStatus} data-id={row.Id}
                                                            data-status={row.FEC_Field_Status__c}
                                                            title={labelTooltipActivate}>{labelInactive}</span>
                                                    </template>
                                                </div>
                                                <div class="slds-col col-delete"
                                                    style="text-align: center; grid-column: span 1;">
                                                    <lightning-button-icon icon-name="utility:delete"
                                                        alternative-text="Delete" variant="bare"
                                                        class="slds-text-color_error" onclick={handleDeleteFraud}
                                                        data-id={row.Id} title="Delete this mapping" size="small">
                                                    </lightning-button-icon>
                                                </div>
                                            </div>

                                            <template if:true={row.isExpanded}>
                                                <div
                                                    class="slds-p-around_medium slds-theme_shade slds-m-around_small slds-box">
                                                    <div
                                                        class="slds-grid slds-grid_align-spread slds-align-content-center slds-p-bottom_medium slds-border_bottom">
                                                        <div class="slds-text-heading_small">
                                                            Edit Integration Mapping & Settings
                                                        </div>
                                                        <div class="slds-grid slds-gap_small">
                                                            <lightning-button label="Cancel" onclick={toggleExpand}
                                                                data-id={row.Id}></lightning-button>
                                                            <lightning-button label="Save Mapping" variant="brand"
                                                                onclick={handleSaveIntegration}
                                                                data-id={row.Id}></lightning-button>
                                                        </div>
                                                    </div>

                                                    <div class="slds-p-around_medium">
                                                        <div class="slds-m-bottom_large">
                                                            <h3 class="slds-text-heading_small slds-m-bottom_medium">
                                                                Mapping Settings</h3>

                                                            <div class="slds-m-bottom_medium">
                                                                <label class="slds-form-element__label">
                                                                    <span class="slds-required">*</span> Applicable
                                                                    Roles
                                                                </label>
                                                                <div class="slds-combobox_container" style="position:relative;">
                                                                    <lightning-input type="search"
                                                                        placeholder="Search Roles..."
                                                                        value={roleSearchTerm}
                                                                        onchange={handleRoleSearchInput}
                                                                        onfocus={handleRoleSearchFocus}
                                                                        onblur={handleRoleSearchBlur}
                                                                        variant="label-hidden">
                                                                    </lightning-input>
                                                                    <template if:true={isRoleDropdownOpen}>
                                                                        <div style="position:absolute;top:100%;left:0;z-index:9999;max-height:200px;overflow-y:auto;width:100%;background:#ffffff;border:1px solid #d8dde6;border-radius:0 0 4px 4px;box-shadow:0 2px 3px rgba(0,0,0,0.16);">
                                                                            <template for:each={filteredRoleOptions} for:item="opt">
                                                                                <div key={opt.value}
                                                                                    data-value={opt.value} 
                                                                                    onclick={handleSelectRoleFromList}
                                                                                    class="slds-p-horizontal_small slds-p-vertical_xx-small"
                                                                                    style="cursor:pointer;color:#181818;font-size:13px;border-bottom:1px solid #f3f3f3;"
                                                                                    onmouseenter={handleRoleItemHover}>
                                                                                    {opt.label}
                                                                                </div>
                                                                            </template>
                                                                        </div>
                                                                    </template>
                                                                </div>
                                                                <div class="slds-m-top_small">
                                                                    <template
                                                                        for:each={integrationFormData.selectedRoles}
                                                                        for:item="role">
                                                                        <lightning-pill key={role} label={role}
                                                                            name={role}
                                                                            onremove={handleRemoveRole}></lightning-pill>
                                                                    </template>
                                                                </div>
                                                            </div>

                                                            <div class="slds-m-bottom_medium">
                                                                <label class="slds-form-element__label">Settings</label>
                                                                <div class="slds-grid slds-wrap slds-gutters">
                                                                    <div class="slds-col slds-size_1-of-2 slds-m-bottom_small">
                                                                        <lightning-combobox
                                                                            label="Section"
                                                                            value={integrationFormData.section}
                                                                            options={integrationSectionOptions}
                                                                            onchange={handleInputChange}
                                                                            data-field="section"
                                                                            disabled>
                                                                        </lightning-combobox>
                                                                    </div>
                                                                    <div class="slds-col slds-size_1-of-2 slds-m-bottom_small">
                                                                        <lightning-combobox
                                                                            label="Sub Section"
                                                                            value={integrationFormData.subSection}
                                                                            options={integrationSubSectionOptions}
                                                                            onchange={handleInputChange}
                                                                            data-field="subSection"
                                                                            disabled>
                                                                        </lightning-combobox>
                                                                    </div>
                                                                    <div class="slds-col slds-size_1-of-3">
                                                                        <lightning-input type="checkbox" label="Field Status"
                                                                            checked={integrationFormData.fieldStatus}
                                                                            onchange={handleCheckboxChange}
                                                                            data-field="fieldStatus">
                                                                        </lightning-input>
                                                                    </div>
                                                                </div>
                                                            </div>
                                                        </div>

                                                        <div class="slds-m-bottom_large">
                                                            <h3 class="slds-text-heading_small slds-m-bottom_medium">
                                                                Integration</h3>
                                                            <c-fec-integration-mapping
                                                                data-mapping-mode="edit"
                                                                data-mapping-row={row.Id}
                                                                mapping-id={row.FEC_Data_Integration_Mapping__c}
                                                                onsuccessintegration={handleSuccessIntegration}
                                                                oncancelintegration={toggleExpand} data-id={row.Id}
                                                                user-type-name={userTypeName} channel-filter={defaultChannelCode}>
                                                            </c-fec-integration-mapping>
                                                        </div>
                                                    </div>
                                                </div>
                                            </template>
                                        </div>
                                    </template>
                                </template>

                                <template if:false={hasFraudData}>
                                    <div class="slds-align_absolute-center slds-p-around_large">
                                        <lightning-button label={labelAddIntegration} variant="brand"
                                            icon-name="utility:add" onclick={handleAddIntegration}></lightning-button>
                                    </div>
                                </template>
                            </template>
                        </div>
                        <template if:true={hasFraudData}>
                            <details class="slds-m-top_medium slds-m-horizontal_small slds-box slds-theme_default">
                                <summary class="slds-p-around_small" style="cursor:pointer; font-weight:600">▶ History</summary>
                                <div class="slds-p-horizontal_small slds-p-bottom_small">
                                    <c-fec-setting-history-by-noc data-id="fraudHistory" noc-id={currentNatureOfCaseId} is-integration={isFraudIntegration}></c-fec-setting-history-by-noc>
                                </div>
                            </details>
                        </template>
                    </lightning-tab>

                    <!-- Flow Control Data View tab removed — replaced by Decision Table Stage -->
                    <!-- <lightning-tab label="Flow Control Data View">
                        <c-fec-flow-control-data-view item={item}></c-fec-flow-control-data-view>
                    </lightning-tab> -->

                    <!-- <lightning-tab label="Decision Table Stage">
                        <c-fec-decision-table-stage-view item={item}></c-fec-decision-table-stage-view>
                    </lightning-tab> -->

                    <lightning-tab label="Decision Engine" ondatachanged={handleDecisionEngineChanged}>
                        <c-fec-decision-table-stage item={item}></c-fec-decision-table-stage>
                        <template if:true={currentBusinessProcessId}>
                            <details class="slds-m-top_medium slds-m-horizontal_small slds-box slds-theme_default">
                                <summary class="slds-p-around_small" style="cursor:pointer; font-weight:600">▶ History</summary>
                                <div class="slds-p-horizontal_small slds-p-bottom_small">
                                    <c-fec-decision-engine-history data-id="decisionEngineHistory" business-process-id={currentBusinessProcessId}></c-fec-decision-engine-history>
                                </div>
                            </details>
                        </template>
                    </lightning-tab>

                    <lightning-tab label="Properties Mapping" ondatachanged={handlePropertiesMappingChanged}>
                        <c-fec-map-a-properties-to-master-data-item
                            nature-of-case-code={currentNatureOfCaseCode}>
                        </c-fec-map-a-properties-to-master-data-item>
                        <template if:true={currentNatureOfCaseCode}>
                            <details class="slds-m-top_medium slds-m-horizontal_small slds-box slds-theme_default">
                                <summary class="slds-p-around_small" style="cursor:pointer; font-weight:600">▶ History</summary>
                                <div class="slds-p-horizontal_small slds-p-bottom_small">
                                    <c-fec-properties-mapping-history data-id="propertiesMappingHistory" nature-of-case-code={currentNatureOfCaseCode}></c-fec-properties-mapping-history>
                                </div>
                            </details>
                        </template>
                    </lightning-tab>

                    <lightning-tab label="Hold Case Config">
                        <c-fec-hold-case-config-list noc-id={currentNatureOfCaseId} stage-id={stageId}></c-fec-hold-case-config-list>
                    </lightning-tab>
                </lightning-tabset>

                <template if:true={isModalOpen}>
                    <section role="dialog" tabindex="-1" class="slds-modal slds-fade-in-open slds-modal_medium">
                        <div class="slds-modal__container">
                            <header class="slds-modal__header slds-grid slds-grid_align-spread slds-grid_vertical-align-center">
                                <h2 class="slds-modal__title slds-hyphenate slds-grid slds-grid_vertical-align-center slds-gap_x-small">
                                    <lightning-icon icon-name={modalIconName} size="small"></lightning-icon>
                                    {modalTitle}
                                </h2>
                                <div class="slds-grid slds-grid_align-end slds-gap_x-small">
                                    <lightning-button label={labelActionCancel} onclick={closeModal}></lightning-button>
                                    <lightning-button variant="brand" label={labelActionSave} onclick={handleSaveFromModal}></lightning-button>
                                </div>
                            </header>
                            <div class="slds-modal__content slds-p-around_medium">
                                <c-fec-master-data-setting-form record-id={recordIdForEdit} record-data={selectedRecord}
                                    nature-of-case-id={currentNatureOfCaseId} stage-id={stageId}
                                    noc-user-group={nocUserGroup}
                                    onsuccess={handleSuccess} next-order={nextOrder} oncancel={closeModal}>
                                </c-fec-master-data-setting-form>
                            </div>
                        </div>
                    </section>
                    <div class="slds-backdrop slds-backdrop_open"></div>
                </template>

            </lightning-layout-item>

        </lightning-layout>
    </template>

    <template if:false={item.name}>
        <div class="slds-illustration slds-illustration_small">
            <div class="slds-text-longform">
                <p class="slds-text-color_weak">Please select a node to start configuration.</p>
            </div>
        </div>
    </template>
</template>
