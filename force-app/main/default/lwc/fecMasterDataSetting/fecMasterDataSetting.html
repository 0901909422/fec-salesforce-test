<template>
    <template if:true={item.name}>
        <div class="config-main slds-m-bottom_medium">
            <c-fec-flow-configuration onhandlestageclick={handleStageClick} node-data={item}></c-fec-flow-configuration>
        </div>

        <lightning-tabset variant="scoped">
            <lightning-tab label="Property Configuration">
                <lightning-card title={labelCardTitle} icon-name="standard:settings">
                    <lightning-button label={labelNewSetting} icon-name="utility:add" slot="actions"
                        onclick={openNewSettingModal} variant="brand">
                    </lightning-button>
                </lightning-card>

                <div class="slds-p-around_small">
                    <div
                        class="slds-grid slds-p-around_x-small slds-theme_shade slds-text-title_caps slds-border_bottom">
                        <div class="slds-col slds-size_1-of-12"></div>
                        <div class="slds-col slds-size_1-of-12" onclick={handleSort} data-field="FEC_Channel__c">
                            {labelColChannel}
                            <span class="slds-m-left_xx-small">
                                <lightning-icon if:true={isChannelSorted} icon-name={sortIconName} size="xx-small">
                                </lightning-icon>
                            </span>
                        </div>
                        <div class="slds-col slds-size_1-of-12" onclick={handleSort}
                            data-field="FEC_Applicable_Role__c">
                            {labelColApplicableRole}
                            <span class="slds-m-left_xx-small">
                                <lightning-icon if:true={isRoleSorted} icon-name={sortIconName} size="xx-small">
                                </lightning-icon>
                            </span>
                        </div>
                        <div class="slds-col slds-size_2-of-12" onclick={handleSort}
                            data-field="FEC_Additional_Field_Name">
                            {labelColPropertyName}
                            <span class="slds-m-left_xx-small">
                                <lightning-icon if:true={isPropertySorted} icon-name={sortIconName} size="xx-small">
                                </lightning-icon>
                            </span>
                        </div>
                        <div class="slds-col slds-size_2-of-12" onclick={handleSort} data-field="FEC_Section__c">
                            {labelColSection}
                            <span class="slds-m-left_xx-small">
                                <lightning-icon if:true={isSectionSorted} icon-name={sortIconName} size="xx-small">
                                </lightning-icon>
                            </span>
                        </div>
                        <div class="slds-col slds-size_1-of-12" onclick={handleSort}
                            data-field="FEC_Field_Order_Display__c">
                            {labelColOrder}
                            <span class="slds-m-left_xx-small">
                                <lightning-icon if:true={isOrderSorted} icon-name={sortIconName} size="xx-small">
                                </lightning-icon>
                            </span>
                        </div>
                        <div class="slds-col slds-size_1-of-12" onclick={handleSort}
                            data-field="FEC_Field_Status__c">{labelColStatus}</div>
                        <div class="slds-col slds-size_1-of-12" onclick={handleSort}
                            data-field="FEC_Field_ReadOnly__c">{labelReadOnly}</div>
                        <div class="slds-col slds-size_1-of-12" onclick={handleSort}
                            data-field="FEC_Field_Mandatory__c">{labelMandatory}</div>
                        <div class="slds-col slds-size_1-of-12 slds-text-align_right">{labelAction}</div>
                    </div>

                    <template if:true={processedData}>
                        <template for:each={processedData} for:item="row">
                            <div key={row.Id} class="slds-border_bottom slds-hint-parent">
                                <div class="slds-grid slds-p-around_x-small slds-grid_vertical-align-center">
                                    <div class="slds-col slds-size_1-of-12">
                                        <lightning-icon icon-name="utility:record" size="xx-small"
                                            class={row.dynamicIconClass}>
                                        </lightning-icon>

                                        <lightning-icon icon-name="utility:user" size="xx-small"
                                            class={row.customerIconClass}>
                                        </lightning-icon>
                                    </div>

                                    <div class="slds-col slds-size_1-of-12 slds-truncate">{row.FEC_Channel__c}</div>
                                    <div class="slds-col slds-size_1-of-12 slds-truncate">
                                        {row.FEC_Applicable_Role__c}</div>
                                    <div class="slds-col slds-size_2-of-12 slds-truncate"
                                        title={row.FEC_Additional_Field_Name}>{row.FEC_Additional_Field_Name}</div>
                                    <div class="slds-col slds-size_2-of-12 slds-truncate">{row.FEC_Section__c}</div>
                                    <div class="slds-col slds-size_1-of-12">{row.FEC_Field_Order_Display__c}</div>

                                    <div class="slds-col slds-size_1-of-12">
                                        <lightning-icon if:true={row.FEC_Field_Status__c} icon-name="utility:check"
                                            variant="success" size="xx-small"></lightning-icon>
                                    </div>
                                    <div class="slds-col slds-size_1-of-12">
                                        <lightning-icon if:true={row.FEC_Field_ReadOnly__c}
                                            icon-name="utility:check" size="xx-small"></lightning-icon>
                                    </div>
                                    <div class="slds-col slds-size_1-of-12">
                                        <lightning-icon if:true={row.FEC_Field_Mandatory__c}
                                            icon-name="utility:check" size="xx-small"></lightning-icon>
                                    </div>

                                    <div class="slds-col slds-size_1-of-12 slds-text-align_right">
                                        <lightning-button-menu alternative-text="Show menu" menu-alignment="right"
                                            onselect={handleRowAction} data-id={row.Id}>
                                            <lightning-menu-item value="edit" label={labelActionEdit}
                                                icon-name="utility:edit"></lightning-menu-item>
                                            <lightning-menu-item value="delete" label={labelActionDelete}
                                                icon-name="utility:delete"
                                                class="slds-text-color_error"></lightning-menu-item>
                                        </lightning-button-menu>
                                    </div>
                                </div>
                            </div>
                        </template>
                    </template>
                </div>
            </lightning-tab>

            <lightning-tab label={labelTabFraudIntegration}>
                <div class="slds-is-relative slds-p-around_small">
                    <lightning-spinner if:true={isLoading} variant="brand" size="medium"></lightning-spinner>

                    <template if:true={isIntegrationAdd}>
                        <div class="slds-box slds-theme_default">
                            <div class="slds-m-bottom_small slds-text-align_right">
                                <lightning-button label="Cancel" onclick={handleCancelIntegration}
                                    class="slds-m-right_x-small"></lightning-button>
                                <lightning-button label="Save Mapping" variant="brand"
                                    onclick={handleSaveIntegration}></lightning-button>
                            </div>
                            <!-- <c-fec-integration-mapping onsuccessintegration={handleSuccessIntegration}
                                oncancelintegration={handleCancelIntegration} mapping-id={selectedMappingId}>
                            </c-fec-integration-mapping> -->
                        </div>
                    </template>

                    <template if:false={isIntegrationAdd}>
                        <template if:true={hasFraudData}>
                            <div
                                class="slds-grid slds-p-around_x-small slds-theme_shade slds-text-title_caps slds-border_bottom">
                                <div class="slds-col slds-size_1-of-12"></div>
                                <div class="slds-col slds-size_2-of-12">Channel</div>
                                <div class="slds-col slds-size_2-of-12">Product Line</div>
                                <div class="slds-col slds-size_2-of-12">Service Type</div>
                                <div class="slds-col slds-size_2-of-12">Category</div>
                                <div class="slds-col slds-size_3-of-12">Sub Category</div>
                            </div>

                            <template for:each={processedDataFraud} for:item="row">
                                <div key={row.Id} class="slds-border_bottom">
                                    <div
                                        class="slds-grid slds-p-around_x-small slds-grid_vertical-align-center slds-hint-parent">
                                        <div class="slds-col slds-size_1-of-12">
                                            <lightning-button-icon icon-name={row.expandIcon} variant="bare"
                                                onclick={toggleExpand} data-id={row.Id}>
                                            </lightning-button-icon>
                                            <lightning-icon icon-name="utility:record" size="xx-small"
                                                class={row.dynamicIconClass}></lightning-icon>
                                            <lightning-icon icon-name="utility:user" size="xx-small"
                                                class={row.customerIconClass}>
                                            </lightning-icon>
                                        </div>
                                        <div class="slds-col slds-size_2-of-12">{row.FEC_Channel_Name_Name}</div>
                                        <div class="slds-col slds-size_2-of-12">{row.Product_Line__c}</div>
                                        <div class="slds-col slds-size_2-of-12">{row.Service_Type__c}</div>
                                        <div class="slds-col slds-size_2-of-12">{row.Category__c}</div>
                                        <!-- <div class="slds-col slds-size_3-of-12">{row.Sub_Category__c}</div> -->
                                        <div class="slds-col slds-size_3-of-12 slds-grid slds-grid_align-spread">
                                            <span>{row.Sub_Category__c}</span>
                                            <span class="slds-m-right_small">
                                                <template lwc:if={row.FEC_Field_Status__c}>
                                                    <span class="slds-badge slds-theme_success slds-cursor_pointer"
                                                        onclick={handleToggleStatus} data-id={row.Id}
                                                        data-status={row.FEC_Field_Status__c}
                                                        title={labelTooltipDeactivate}>{labelActive}</span>
                                                </template>
                                                <template lwc:else>
                                                    <span class="slds-badge slds-theme_error slds-cursor_pointer"
                                                        onclick={handleToggleStatus} data-id={row.Id}
                                                        data-status={row.FEC_Field_Status__c}
                                                        title={labelTooltipActivate}>{labelInactive}</span>
                                                </template>
                                            </span>
                                        </div>
                                    </div>

                                    <template if:true={row.isExpanded}>
                                        <div class="slds-p-around_medium slds-theme_shade slds-m-around_small slds-box">
                                            <div class="slds-grid slds-grid_align-spread slds-m-bottom_small">
                                                <div class="slds-text-heading_small slds-p-top_xx-small">Edit
                                                    Integration Detail</div>
                                                <div>
                                                    <lightning-button label="Cancel" onclick={toggleExpand}
                                                        data-id={row.Id} class="slds-m-right_x-small">
                                                    </lightning-button>
                                                    <lightning-button label="Save Mapping" variant="brand"
                                                        onclick={handleSaveIntegration} data-id={row.Id}>
                                                    </lightning-button>
                                                </div>
                                            </div>

                                            <!-- <c-fec-integration-mapping mapping-id={row.FEC_Data_Integration_Mapping__c}
                                                onsuccessintegration={handleSuccessIntegration}
                                                oncancelintegration={toggleExpand} data-id={row.Id}>
                                            </c-fec-integration-mapping> -->
                                        </div>
                                    </template>
                                </div>
                            </template>
                        </template>

                        <template if:false={hasFraudData}>
                            <div class="slds-align_absolute-center slds-p-around_large">
                                <lightning-button label={labelAddIntegration} variant="brand" icon-name="utility:add"
                                    onclick={handleAddIntegration}></lightning-button>
                            </div>
                        </template>
                    </template>
                </div>
            </lightning-tab>
        </lightning-tabset>

        <template if:true={isModalOpen}>
            <section role="dialog" tabindex="-1" class="slds-modal slds-fade-in-open slds-modal_medium">
                <div class="slds-modal__container">
                    <header class="slds-modal__header">
                        <h2 class="slds-modal__title">{modalTitle}</h2>
                    </header>
                    <div class="slds-modal__content slds-p-around_medium">
                        <c-fec-master-data-setting-form record-id={recordIdForEdit}
                            nature-of-case-id={currentNatureOfCaseId} stage-id={stageId} onsuccess={handleSuccess}
                            next-order={nextOrder} oncancel={closeModal}>
                        </c-fec-master-data-setting-form>
                    </div>
                </div>
            </section>
            <div class="slds-backdrop slds-backdrop_open"></div>
        </template>
    </template>

    <template if:false={item.name}>
        <div class="slds-illustration slds-illustration_small">
            <div class="slds-text-longform">
                <p class="slds-text-color_weak">Vui lòng chọn một node để bắt đầu cấu hình.</p>
            </div>
        </div>
    </template>
</template>
