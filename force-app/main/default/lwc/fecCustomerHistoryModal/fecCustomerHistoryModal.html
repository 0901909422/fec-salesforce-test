<template>
    <c-fec-generic-modal title={label.titleChangeHistory} size="large" onclose={handleClose}>
        <div style="height: 400px;">
            <c-fec-custom-datatable
                table-data={historyData}
                columns={columns}
                hide-checkbox-column="true"
                page-size="10">
            </c-fec-custom-datatable>
        </div>

        <div slot="footer">
            <lightning-button label={label.btnClose} variant="neutral" onclick={handleClose}></lightning-button>
        </div>
    </c-fec-generic-modal>
</template>
