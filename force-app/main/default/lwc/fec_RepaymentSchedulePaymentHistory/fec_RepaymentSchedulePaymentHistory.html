<template>
    <template if:true={hasData}>
        <lightning-accordion allow-multiple-sections-open active-section-name={activeSections}>
            <lightning-accordion-section name={repaymentScheduleSectionName} label={customLabel.repaymentSchedule} class="slds-accordion__section">
                <div class="slds-form slds-p-around_small repay-section-content">
                    <template if:true={isLoading}>
                        <div class="fec-section-spinner-wrapper">
                            <lightning-spinner alternative-text={customLabel.loadingAlt} size="medium"></lightning-spinner>
                        </div>
                    </template>
                    <template if:false={isLoading}>
                    <!-- 3 cột tổng: format giống Termination / MainInfo / IPP Detail -->
                    <div class="repay-schedule-summary slds-m-bottom_medium">
                        <div class="repay-schedule-summary-item">
                            <div class="repay-schedule-row-inner">
                                <span class="repay-schedule-label repay-schedule-label-gray slds-text-title_bold">
                                    {customLabel.totalInstallmentAmount}
                                    <span class="repay-helptext-wrap">
                                        <template if:true={helpTextMap.FEC_Total_Installment_Amount__c}>
                                            <lightning-helptext content={helpTextMap.FEC_Total_Installment_Amount__c}></lightning-helptext>
                                        </template>
                                    </span>
                                </span>
                                <div class="repay-schedule-value slds-text-body_regular">{repaymentScheduleTotalInstallment}</div>
                            </div>
                        </div>
                        <div class="repay-schedule-summary-item">
                            <div class="repay-schedule-row-inner">
                                <span class="repay-schedule-label repay-schedule-label-gray slds-text-title_bold">
                                    {customLabel.totalPrincipal}
                                    <span class="repay-helptext-wrap">
                                        <template if:true={helpTextMap.FEC_Total_Principal__c}>
                                            <lightning-helptext content={helpTextMap.FEC_Total_Principal__c}></lightning-helptext>
                                        </template>
                                    </span>
                                </span>
                                <div class="repay-schedule-value slds-text-body_regular">{repaymentScheduleTotalPrincipal}</div>
                            </div>
                        </div>
                        <div class="repay-schedule-summary-item">
                            <div class="repay-schedule-row-inner">
                                <span class="repay-schedule-label repay-schedule-label-gray slds-text-title_bold">
                                    {customLabel.totalInterest}
                                    <span class="repay-helptext-wrap">
                                        <template if:true={helpTextMap.FEC_Total_Interest__c}>
                                            <lightning-helptext content={helpTextMap.FEC_Total_Interest__c}></lightning-helptext>
                                        </template>
                                    </span>
                                </span>
                                <div class="repay-schedule-value slds-text-body_regular">{repaymentScheduleTotalInterest}</div>
                            </div>
                        </div>
                    </div>
                    <template if:true={hasRepaymentScheduleTableData}>
                        <c-fec_-related-list-paging
                            columns={repaymentSchedulePagingColumns}
                            records={repaymentSchedulePagingRecords}
                            default-sorted-by="dueDate"
                            default-sort-direction="asc"
                            page-size={repaymentSchedulePageSize}
                            hide-row-number
                            hide-updated-time>
                        </c-fec_-related-list-paging>
                    </template>
                    <template if:false={hasRepaymentScheduleTableData}>
                        <div class="repay-no-data">{customLabel.noData}</div>
                    </template>
                    </template>
                </div>
            </lightning-accordion-section>
            <lightning-accordion-section name={paymentHistorySectionName} label={customLabel.paymentHistory} class="slds-accordion__section">
                <div class="slds-form slds-p-around_small repay-section-content">
                    <template if:true={isLoading}>
                        <div class="fec-section-spinner-wrapper">
                            <lightning-spinner alternative-text={customLabel.loadingAlt} size="medium"></lightning-spinner>
                        </div>
                    </template>
                    <template if:false={isLoading}>
                    <!-- 1 hàng 3 cột: Total Payment Amount chiếm cột 1 giống Repayment Schedule; đồng bộ font, giữ highlight đỏ label -->
                    <div class="repay-schedule-summary slds-m-bottom_small">
                        <div class="repay-schedule-summary-item">
                            <div class="repay-schedule-row-inner">
                                <span class="repay-schedule-label repay-schedule-label-red slds-text-title_bold">
                                    {customLabel.totalPaymentAmount}
                                    <span class="repay-helptext-wrap">
                                        <template if:true={helpTextMap.FEC_Total_Payment_Amount__c}>
                                            <lightning-helptext content={helpTextMap.FEC_Total_Payment_Amount__c}></lightning-helptext>
                                        </template>
                                    </span>
                                </span>
                                <div class="repay-schedule-value slds-text-body_regular">{paymentHistoryTotalAmount}</div>
                            </div>
                        </div>
                        <div class="repay-schedule-summary-item"></div>
                        <div class="repay-schedule-summary-item"></div>
                    </div>
                    <template if:true={hasPaymentHistoryTableData}>
                        <c-fec_-related-list-paging
                            columns={paymentHistoryPagingColumns}
                            records={paymentHistoryPagingRecords}
                            default-sorted-by="paymentDate"
                            default-sort-direction="desc"
                            page-size={paymentHistoryPageSize}
                            hide-row-number
                            hide-updated-time>
                        </c-fec_-related-list-paging>
                    </template>
                    <template if:false={hasPaymentHistoryTableData}>
                        <div class="repay-no-data">{customLabel.noData}</div>
                    </template>
                    </template>
                </div>
            </lightning-accordion-section>
            <lightning-accordion-section name={realTimePaymentSectionName} label={customLabel.realTimePayment} class="slds-accordion__section">
                <div slot="actions">
                    <lightning-button label={customLabel.refreshButton} variant="brand" onclick={handleRealTimeRefresh} disabled={isRefreshingRealTime}></lightning-button>
                </div>
                <div class="slds-form slds-p-around_small repay-realtime-content repay-section-content">
                    <template if:true={isLoading}>
                        <div class="fec-section-spinner-wrapper">
                            <lightning-spinner alternative-text={customLabel.loadingAlt} size="medium"></lightning-spinner>
                        </div>
                    </template>
                    <template if:false={isLoading}>
                    <template if:true={isRefreshingRealTime}>
                        <div class="fec-section-spinner-wrapper">
                            <lightning-spinner alternative-text={customLabel.loadingAlt} size="medium"></lightning-spinner>
                        </div>
                    </template>
                    <template if:false={isRefreshingRealTime}>
                        <template if:true={hasRealTimePaymentTableData}>
                            <c-fec_-related-list-paging
                                columns={realTimePaymentPagingColumns}
                                records={realTimePaymentPagingRecords}
                                default-sorted-by="paymentDate"
                                default-sort-direction="desc"
                                page-size={realTimePaymentPageSize}
                                hide-row-number
                                hide-updated-time>
                            </c-fec_-related-list-paging>
                        </template>
                        <template if:false={hasRealTimePaymentTableData}>
                            <div class="repay-no-data">{customLabel.noData}</div>
                        </template>
                    </template>
                    </template>
                </div>
            </lightning-accordion-section>
            <lightning-accordion-section name={repaymentSchedulePaymentHistorySectionName} label={customLabel.repaymentSchedulePaymentHistory} class="slds-accordion__section">
                <div class="slds-form slds-p-around_small repay-section-content">
                    <template if:true={isLoading}>
                        <div class="fec-section-spinner-wrapper">
                            <lightning-spinner alternative-text={customLabel.loadingAlt} size="medium"></lightning-spinner>
                        </div>
                    </template>
                    <template if:false={isLoading}>
                    <!-- Section 4: một bảng gộp Repayment Schedule + Payment History -->
                    <div class="repay-section4-block">
                        <template if:true={hasSection4CombinedData}>
                            <c-fec_-related-list-paging
                                columns={section4CombinedColumns}
                                records={section4CombinedRecords}
                                default-sorted-by="sortKey"
                                default-sort-direction="asc"
                                page-size={section4PageSize}
                                hide-row-number
                                hide-updated-time>
                            </c-fec_-related-list-paging>
                        </template>
                        <template if:false={hasSection4CombinedData}>
                            <div class="repay-no-data">{customLabel.noData}</div>
                        </template>
                    </div>
                    </template>
                </div>
            </lightning-accordion-section>
        </lightning-accordion>
    </template>
    <template if:false={hasData}>
        <div class="slds-accordion">
            <section class="slds-accordion__section slds-is-open">
                <div class="slds-accordion__summary">
                    <h3 class="slds-accordion__summary-heading">
                        <span class="slds-accordion__summary-content slds-grid">
                            <lightning-icon icon-name="utility:chevrondown" size="x-small" class="slds-m-right_x-small"></lightning-icon>
                            <span>{customLabel.repaymentSchedule}&nbsp;-&nbsp;<span class="sync-fail-text">{customLabel.msgErrorAPI}</span></span>
                        </span>
                    </h3>
                </div>
                <div class="slds-accordion__content slds-hide"></div>
            </section>
            <section class="slds-accordion__section slds-is-open">
                <div class="slds-accordion__summary">
                    <h3 class="slds-accordion__summary-heading">
                        <span class="slds-accordion__summary-content slds-grid">
                            <lightning-icon icon-name="utility:chevrondown" size="x-small" class="slds-m-right_x-small"></lightning-icon>
                            <span>{customLabel.paymentHistory}&nbsp;-&nbsp;<span class="sync-fail-text">{customLabel.msgErrorAPI}</span></span>
                        </span>
                    </h3>
                </div>
                <div class="slds-accordion__content slds-hide"></div>
            </section>
            <section class="slds-accordion__section slds-is-open">
                <div class="slds-accordion__summary">
                    <h3 class="slds-accordion__summary-heading">
                        <span class="slds-accordion__summary-content slds-grid">
                            <lightning-icon icon-name="utility:chevrondown" size="x-small" class="slds-m-right_x-small"></lightning-icon>
                            <span>{customLabel.realTimePayment}&nbsp;-&nbsp;<span class="sync-fail-text">{customLabel.msgErrorAPI}</span></span>
                        </span>
                    </h3>
                </div>
                <div class="slds-accordion__content slds-hide"></div>
            </section>
            <section class="slds-accordion__section slds-is-open">
                <div class="slds-accordion__summary">
                    <h3 class="slds-accordion__summary-heading">
                        <span class="slds-accordion__summary-content slds-grid">
                            <lightning-icon icon-name="utility:chevrondown" size="x-small" class="slds-m-right_x-small"></lightning-icon>
                            <span>{customLabel.repaymentSchedulePaymentHistory}&nbsp;-&nbsp;<span class="sync-fail-text">{customLabel.msgErrorAPI}</span></span>
                        </span>
                    </h3>
                </div>
                <div class="slds-accordion__content slds-hide"></div>
            </section>
        </div>
    </template>
</template>
