<template>
    <section class="slds-modal slds-fade-in-open">
        <div class="slds-modal__container">

            <!-- HEADER -->
            <header class="slds-modal__header">
                <h2 class="slds-text-heading_medium">New Note</h2>
            </header>

            <!-- BODY -->
            <div class="slds-modal__content slds-p-around_medium">

                <lightning-input label="Title" value={title} onchange={handleTitle}>
                </lightning-input>

                <lightning-input-rich-text label="Compose text" value={content} onchange={handleContent}>
                </lightning-input-rich-text>

            </div>

            <!-- FOOTER -->
            <footer class="slds-modal__footer">
                <lightning-button label="Cancel" onclick={handleClose}>
                </lightning-button>

                <lightning-button variant="brand" label="Save" onclick={handleSave}>
                </lightning-button>
            </footer>

        </div>
    </section>

    <div class="slds-backdrop slds-backdrop_open"></div>
</template>
