<template>
    <section class="slds-modal slds-fade-in-open">
        <div class="slds-modal__container">

            <!-- HEADER -->
            <header class="slds-modal__header">
                <h2 class="slds-text-heading_medium">{modalTitle}</h2>
            </header>

            <!-- BODY -->
            <div class="slds-modal__content slds-p-around_medium">

                <lightning-input label={labels.titleField} value={title} onchange={handleTitle}>
                </lightning-input>

                <lightning-input-rich-text label={labels.composeTextField} value={content} onchange={handleContent}>
                </lightning-input-rich-text>

            </div>

            <!-- FOOTER -->
            <footer class="slds-modal__footer">
                <lightning-button label={labels.cancelBtn} onclick={handleClose}>
                </lightning-button>
                <template if:true={isEdit}>
                    <lightning-button variant="brand" label={labels.saveBtn} onclick={handleSave}>
                    </lightning-button>
                </template>
            </footer>

        </div>
    </section>

    <div class="slds-backdrop slds-backdrop_open"></div>
</template>
