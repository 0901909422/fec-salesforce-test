<template>
  <lightning-card title="Case Assignment Logs" icon-name="standard:assignment">
    <template lwc:if={errorMessage}>
      <div class="slds-p-around_small slds-text-color_error">{errorMessage}</div>
    </template>
    <template lwc:if={hasRows}>
      <lightning-datatable
        key-field="id"
        data={rows}
        columns={columns}
        hide-checkbox-column
        show-row-number-column
      ></lightning-datatable>
    </template>
    <template lwc:else>
      <div class="slds-p-around_small slds-text-color_weak">No assignment logs yet.</div>
    </template>
  </lightning-card>
</template>
