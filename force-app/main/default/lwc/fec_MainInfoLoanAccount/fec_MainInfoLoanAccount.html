<template>
    <template if:true={isLoading}>
        <div class="slds-accordion main-info-loading">
            <section class="slds-accordion__section slds-is-open">
                <div class="slds-accordion__summary">
                    <h3 class="slds-accordion__summary-heading">
                        <span class="slds-accordion__summary-content slds-grid">
                            <lightning-icon icon-name="utility:chevrondown" size="x-small" class="slds-m-right_x-small"></lightning-icon>
                            <span>{customLabel.contractLabel}</span>
                        </span>
                    </h3>
                </div>
                <div class="slds-accordion__content">
                    <div class="fec-section-spinner-wrapper">
                        <lightning-spinner alternative-text={customLabel.loadingAlt} size="medium"></lightning-spinner>
                    </div>
                </div>
            </section>
            <section class="slds-accordion__section slds-is-open">
                <div class="slds-accordion__summary">
                    <h3 class="slds-accordion__summary-heading">
                        <span class="slds-accordion__summary-content slds-grid">
                            <lightning-icon icon-name="utility:chevrondown" size="x-small" class="slds-m-right_x-small"></lightning-icon>
                            <span>{customLabel.loanLabel}</span>
                        </span>
                    </h3>
                </div>
                <div class="slds-accordion__content">
                    <div class="fec-section-spinner-wrapper">
                        <lightning-spinner alternative-text={customLabel.loadingAlt} size="medium"></lightning-spinner>
                    </div>
                </div>
            </section>
            <section class="slds-accordion__section slds-is-open">
                <div class="slds-accordion__summary">
                    <h3 class="slds-accordion__summary-heading">
                        <span class="slds-accordion__summary-content slds-grid">
                            <lightning-icon icon-name="utility:chevrondown" size="x-small" class="slds-m-right_x-small"></lightning-icon>
                            <span>{customLabel.paymentLabel}</span>
                        </span>
                    </h3>
                </div>
                <div class="slds-accordion__content">
                    <div class="fec-section-spinner-wrapper">
                        <lightning-spinner alternative-text={customLabel.loadingAlt} size="medium"></lightning-spinner>
                    </div>
                </div>
            </section>
            <section class="slds-accordion__section slds-is-open">
                <div class="slds-accordion__summary">
                    <h3 class="slds-accordion__summary-heading">
                        <span class="slds-accordion__summary-content slds-grid">
                            <lightning-icon icon-name="utility:chevrondown" size="x-small" class="slds-m-right_x-small"></lightning-icon>
                            <span>{customLabel.debtSaleLabel}</span>
                        </span>
                    </h3>
                </div>
                <div class="slds-accordion__content">
                    <div class="fec-section-spinner-wrapper">
                        <lightning-spinner alternative-text={customLabel.loadingAlt} size="medium"></lightning-spinner>
                    </div>
                </div>
            </section>
        </div>
    </template>
    <template if:false={isLoading}>
    <template if:true={hasData}>
        <lightning-accordion allow-multiple-sections-open active-section-name={activeSections}>
            <c-fec_-common-record-detail-section section-title={customLabel.contractLabel} fields={contractFields}
                columns="3">
            </c-fec_-common-record-detail-section>
            <c-fec_-common-record-detail-section section-title={customLabel.loanLabel} fields={loanFields}
                columns="3">
            </c-fec_-common-record-detail-section>
            <c-fec_-common-record-detail-section section-title={customLabel.paymentLabel} fields={paymentFields}
                columns="3">
            </c-fec_-common-record-detail-section>
            <c-fec_-common-record-detail-section section-title={customLabel.debtSaleLabel} fields={debtSaleFields}
                columns="3">
            </c-fec_-common-record-detail-section>
        </lightning-accordion>
    </template>
    <template if:false={hasData}>

                            </lightning-icon>
                            <span>
                                {customLabel.contractLabel}&nbsp;-&nbsp;
                                <span class="sync-fail-text">
                                    {customLabel.msgErrorAPI}
                                </span>
                            </span>

                        </span>
                    </h3>
                </div>
                <div class="slds-accordion__content slds-hide">
                </div>
            </section>
            <section class="slds-accordion__section slds-is-open">

                    <h3 class="slds-accordion__summary-heading">
                        <span class="slds-accordion__summary-content slds-grid">
                            <lightning-icon icon-name="utility:chevrondown" size="x-small" class="slds-m-right_x-small">
                            </lightning-icon>
                            <span>
                                {customLabel.loanLabel}&nbsp;-&nbsp;
                                <span class="sync-fail-text">
                                   {customLabel.msgErrorAPI}

                            </span>

                        </span>
                    </h3>
                </div>
                <div class="slds-accordion__content slds-hide">

            </section>
            <section class="slds-accordion__section slds-is-open">
                <div class="slds-accordion__summary">
                    <h3 class="slds-accordion__summary-heading">
                        <span class="slds-accordion__summary-content slds-grid">
                            <lightning-icon icon-name="utility:chevrondown" size="x-small" class="slds-m-right_x-small">
                            </lightning-icon>
                            <span>
                               {customLabel.paymentLabel}&nbsp;-&nbsp;
                                <span class="sync-fail-text">
                                    {customLabel.msgErrorAPI}
                                </span>
                            </span>

                        </span>
                    </h3>
                </div>
                <div class="slds-accordion__content slds-hide">

            <section class="slds-accordion__section slds-is-open">

                    <h3 class="slds-accordion__summary-heading">
                        <span class="slds-accordion__summary-content slds-grid">
                            <lightning-icon icon-name="utility:chevrondown" size="x-small" class="slds-m-right_x-small">
                            </lightning-icon>
                            <span>
                                {customLabel.debtSaleLabel}&nbsp;-&nbsp;

                                    {customLabel.msgErrorAPI}
                                </span>
                            </span>

                        </span>
                    </h3>
                </div>
                <div class="slds-accordion__content slds-hide">
                </div>
            </section>
        </div>
    </template>
    </template>
</template>
