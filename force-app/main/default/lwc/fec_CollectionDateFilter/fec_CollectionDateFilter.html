<template>
    <div class="date-filter-container">
        <!-- Hint text -->
        <p class="hint-text">{label.hintText}</p>

        <!-- Date inputs + Apply button -->
        <div class="filter-row">
            <div class="date-field">
                <label class="date-label">{label.fromDate}</label>
                <c-fec_-date-picker
                    label={label.fromDate}
                    value={fromDate}
                    max-date={todayIsoForPicker}
                    onpickeropen={handleFromPickerOpen}
                    ondatechange={handleFromDateChange}
                ></c-fec_-date-picker>
            </div>

            <div class="date-field">
                <label class="date-label">{label.toDate}</label>
                <c-fec_-date-picker
                    label={label.toDate}
                    value={toDate}
                    max-date={todayIsoForPicker}
                    onpickeropen={handleToPickerOpen}
                    ondatechange={handleToDateChange}
                ></c-fec_-date-picker>
            </div>

            <div class="apply-btn">
                <lightning-button
                    variant="brand"
                    label={label.apply}
                    onclick={handleApply}
                ></lightning-button>
            </div>
        </div>

        <!-- Validation error -->
        <template lwc:if={errorMessage}>
            <p class="error-text">{errorMessage}</p>
        </template>
    </div>
</template>
