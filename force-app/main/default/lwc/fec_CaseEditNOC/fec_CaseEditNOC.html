<template>
  <div class="slds-card slds-p-around--small">
    <lightning-accordion
    allow-multiple-sections-open
    active-section-name={activeSection}
    >
      <lightning-accordion-section name="noc" label="Nature of Case">
          <template lwc:if={modeEditCase}>
              <lightning-layout multiple-rows>
                <lightning-layout-item padding="around-small" size="6">
                  <lightning-record-picker
                    label="Product Type"
                    data-name="productType"
                    object-api-name="FEC_Product_Type__c"
                    value={productTypeSelectedId}
                    filter={productTypeFilter}
                    onchange={handleProductTypeSelect}
                    required
                  >
                  </lightning-record-picker>
                </lightning-layout-item>
                <lightning-layout-item padding="around-small" size="6">
                  <lightning-record-picker
                    label="Category"
                    data-name="category"
                    object-api-name="FEC_Category__c"
                    value={categorySelectedId}
                    filter={categoryFilter}
                    onchange={handleCategorySelect}
                    disabled={disableCategory}
                    required
                  >
                  </lightning-record-picker>
                </lightning-layout-item>
                <lightning-layout-item padding="around-small" size="6">
                  <lightning-record-picker
                    label="Sub-Category"
                    data-name="subCategory"
                    object-api-name="FEC_Sub_Category__c"
                    value={subCategorySelectedId}
                    filter={subCategoryFilter}
                    onchange={handleSubCategorySelect}
                    disabled={disableSubCategory}
                    required
                  >
                  </lightning-record-picker>
                </lightning-layout-item>
                <lightning-layout-item padding="around-small" size="6">
                  <lightning-record-picker
                    label="Sub-Code"
                    data-name="subCode"
                    object-api-name="FEC_Sub_Code__c"
                    value={subCodeSelectedId}
                    filter={subCodeFilter}
                    onchange={handleSubCodeSelect}
                    disabled={disableSubCode}
                    required
                  >
                  </lightning-record-picker>
                </lightning-layout-item>
              </lightning-layout>
          </template>
          <template lwc:else>
              <lightning-record-view-form record-id={recordId} object-api-name="Case">
                  <lightning-layout multiple-rows>
                      <lightning-layout-item padding="around-small" size="6">
                          <lightning-output-field field-name="FEC_Product_Type__c" class="slds-form-element_readonly"></lightning-output-field>
                      </lightning-layout-item>
                      <lightning-layout-item padding="around-small" size="6">
                          <lightning-output-field field-name="FEC_Category__c" class="slds-form-element_readonly"></lightning-output-field>
                      </lightning-layout-item>
                      <lightning-layout-item padding="around-small" size="6">
                          <lightning-output-field field-name="FEC_SubCategory__c" class="slds-form-element_readonly"></lightning-output-field>
                      </lightning-layout-item>
                      <lightning-layout-item padding="around-small" size="6">
                          <lightning-output-field field-name="FEC_SubCode__c" class="slds-form-element_readonly"></lightning-output-field>
                      </lightning-layout-item>
                  </lightning-layout>
              </lightning-record-view-form>
          </template>
      </lightning-accordion-section>
    </lightning-accordion>
  </div>
</template>
