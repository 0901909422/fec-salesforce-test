<template>
    <lightning-accordion allow-multiple-sections-open active-section-name={activeSections}
        onsectiontoggle={handleSectionToggle}>
        <c-fec_-common-record-detail-section section-title={customLabel.disbursementLabel}
            section-label={disbursementSectionLabel} fields={disbursementFields} section-loading={isLoadingDisbursement}
            columns="3">
        </c-fec_-common-record-detail-section>
        <c-fec_-common-record-detail-section section-title={customLabel.collectionInfoLabel}
            section-label={collectionsSectionLabel} fields={collectionInfoFields}
            section-loading={isLoadingCollections} columns="3">
        </c-fec_-common-record-detail-section>
        <c-fec_-common-record-detail-section section-title={customLabel.salesInfoLabel}
            section-label={salesSectionLabel} fields={salesInfoFields} section-loading={isLoadingSales} columns="3">
        </c-fec_-common-record-detail-section>
    </lightning-accordion>
</template>
