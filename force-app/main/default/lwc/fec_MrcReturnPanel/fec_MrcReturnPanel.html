<template>
  <div class="mrc-return-panel">
    <!-- RL05.02: Xác nhận của Khách hàng -->
    <template if:true={showCustomerConfirmation}>
      <lightning-record-edit-form object-api-name="Case" record-id={recordId}>
        <div class="slds-form-element slds-m-bottom_small">
          <label class="slds-form-element__label">
            <abbr lwc:if={customerConfirmationRequired} class="slds-required" title="required">*</abbr>
            Xác nhận của Khách hàng
          </label>
          <lightning-combobox
            name="mrcCustomerConfirmation"
            variant="label-hidden"
            placeholder="--None--"
            options={confirmationPicklistOptions}
            value={customerConfirmationValue}
            required={customerConfirmationRequired}
            disabled={isReadOnly}
            onchange={handleCustomerConfirmationChange}>
          </lightning-combobox>
          <lightning-input-field
            class="slds-hide"
            field-name={customerConfirmationField}
            value={customerConfirmationValue}
            onchange={handleCustomerConfirmationChange}>
          </lightning-input-field>
        </div>

        <template if:true={showDupBanner}>
          <c-fec_-mrc-return-dup-banner
            record-id={recordId}
            duplicate-case-id={duplicateCaseId}
            duplicate-case-number={duplicateCaseNumber}
            handling-option-value={handlingOptionValue}
            is-edit={isEdit}
            display-mode="inline"
            onhandlingoptionchange={handleHandlingOptionChange}>
          </c-fec_-mrc-return-dup-banner>
          <lightning-input-field
            class="slds-hide"
            field-name={handlingOptionField}
            variant="label-hidden"
            value={handlingOptionValue}>
          </lightning-input-field>
        </template>

        <template if:true={showHandlingRadioInline}>
          <c-fec_-mrc-return-dup-banner
            record-id={recordId}
            handling-option-value={handlingOptionValue}
            is-edit={isEdit}
            display-mode="inline"
            hide-dup-message
            onhandlingoptionchange={handleHandlingOptionChange}>
          </c-fec_-mrc-return-dup-banner>
          <lightning-input-field
            class="slds-hide"
            field-name={handlingOptionField}
            variant="label-hidden"
            value={handlingOptionValue}>
          </lightning-input-field>
        </template>
      </lightning-record-edit-form>
    </template>

    <template if:true={showStandaloneDupBanner}>
      <lightning-record-edit-form object-api-name="Case" record-id={recordId}>
        <c-fec_-mrc-return-dup-banner
          record-id={recordId}
          duplicate-case-id={duplicateCaseId}
          duplicate-case-number={duplicateCaseNumber}
          handling-option-value={handlingOptionValue}
          is-edit={isEdit}
          display-mode="standalone"
          onhandlingoptionchange={handleHandlingOptionChange}>
        </c-fec_-mrc-return-dup-banner>
        <lightning-input-field
          class="slds-hide"
          field-name={handlingOptionField}
          variant="label-hidden"
          value={handlingOptionValue}>
        </lightning-input-field>
      </lightning-record-edit-form>
    </template>

    <template if:true={showDelivery}>
      <c-fec_-mrc-delivery-form
        record-id={recordId}
        sub-code-code={subCodeCode}
        is-edit={isEdit}>
      </c-fec_-mrc-delivery-form>
    </template>
  </div>
</template>
