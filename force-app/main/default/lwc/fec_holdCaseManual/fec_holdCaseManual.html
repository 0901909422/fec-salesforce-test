<template>
    <div class="hold-case-wrapper">

        <!-- Title -->
        <div class="hold-case-title">
            <h2>Hold Case</h2>
        </div>
        <hr class="hold-case-divider" />

        <!-- Loading spinner -->
        <template if:true={isLoading}>
            <div class="hold-case-body">
                <lightning-spinner size="small" alternative-text="Loading..."></lightning-spinner>
            </div>
        </template>

        <!-- Body -->
        <template if:false={isLoading}>
            <div class="hold-case-body">

                <!-- NFU Reason -->
                <div class="hold-case-row">
                    <label class="hold-case-label">{customLabel.nfuReason}</label>
                    <div class="hold-case-value">
                        <lightning-combobox
                            name="nfuReason"
                            value={selectedReason}
                            placeholder="-- Select NFU Reason --"
                            options={nfuReasonOptions}
                            onchange={handleReasonChange}>
                        </lightning-combobox>
                    </div>
                </div>

                <!-- NFU Code -->
                <div class="hold-case-row">
                    <label class="hold-case-label">{customLabel.nfuCode}</label>
                    <div class="hold-case-value">
                        <span>{nfuCode}</span>
                    </div>
                </div>

                <!-- NFU Hold Day Duration -->
                <div class="hold-case-row">
                    <label class="hold-case-label">{customLabel.nfuHoldDayDuration}</label>
                    <div class="hold-case-value">
                        <span>{nfuHoldDayDuration}</span>
                    </div>
                </div>

                <!-- Response message - success (xanh lá) -->
                <template if:true={isSuccessMessage}>
                    <div class="hold-case-message hold-case-message--success">
                        {responseMessage}
                    </div>
                </template>

                <!-- Response message - error (đỏ) -->
                <template if:true={isErrorMessage}>
                    <div class="hold-case-message hold-case-message--error">
                        {responseMessage}
                    </div>
                </template>

            </div>

            <!-- Footer - ẩn khi đã thành công (TH1/TH2) -->
            <template if:false={isCompleted}>
                <div class="hold-case-footer">
                    <lightning-button label="Cancel" onclick={handleCancel}></lightning-button>
                    <lightning-button
                        variant="brand"
                        label="Hold Case"
                        onclick={handleHoldCase}
                        disabled={isHoldDisabled}>
                    </lightning-button>
                </div>
            </template>
        </template>

    </div>
</template>
