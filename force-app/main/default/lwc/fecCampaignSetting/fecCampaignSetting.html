<template>
    <lightning-card title={label.cardTitle} icon-name="standard:campaign">
        <div slot="actions">
            <lightning-button label={label.newBtn} onclick={handleOpenModal} variant="brand"></lightning-button>
        </div>

        <div class="slds-var-p-around_medium">
            <template if:true={mappingList}>
                <lightning-datatable
                    key-field="Id"
                    data={mappingList}
                    columns={columns}
                    onrowaction={handleRowAction}
                    hide-checkbox-column="true">
                </lightning-datatable>
            </template>
        </div>
    </lightning-card>

    <template if:true={isModalOpen}>
        <section role="dialog" tabindex="-1" class="slds-modal slds-fade-in-open slds-modal_medium">
            <div class="slds-modal__container">
                <header class="slds-modal__header">
                    <button class="slds-button slds-button_icon slds-modal__close slds-button_icon-inverse" title="Close" onclick={handleCloseModal}>
                        <lightning-icon icon-name="utility:close" alternative-text="close" variant="inverse" size="small"></lightning-icon>
                        <span class="slds-assistive-text">Close</span>
                    </button>
                    <h2 class="slds-text-heading_medium slds-hyphenate">{modalTitle}</h2>
                </header>

                <div class="slds-modal__content campaign-modal-content slds-var-p-around_medium">
                    <div if:true={isLoading} class="slds-is-relative">
                        <lightning-spinner alternative-text="Loading" size="small"></lightning-spinner>
                    </div>

                    <div class="slds-grid slds-wrap slds-gutters">
                        <div class="slds-col slds-size_1-of-1 slds-var-m-bottom_small">
                            <lightning-input 
                                label={label.csCampaignName}
                                data-id="Name" 
                                value={currentRecord.Name} 
                                onchange={handleInputChange}
                                required>
                            </lightning-input>
                        </div>

                        <div class="slds-col slds-size_1-of-1 slds-var-m-bottom_small">
                            <lightning-combobox
                                label={label.genesysCampaign}
                                value={currentRecord.FEC_Campaign__c}
                                placeholder={label.genesysCampaign}
                                options={genesysOptions}
                                onchange={handleCampaignChange}
                                required>
                            </lightning-combobox>
                        </div>

                        <div class="slds-col slds-size_1-of-1">
                            <lightning-input 
                                type="checkbox" 
                                label={label.isActive}
                                data-id="FEC_IsActive__c"
                                checked={currentRecord.FEC_IsActive__c} 
                                onchange={handleInputChange}>
                            </lightning-input>
                        </div>
                    </div>
                </div>

                <footer class="slds-modal__footer">
                    <lightning-button label={label.cancel} variant="neutral" onclick={handleCloseModal} class="slds-var-m-right_small"></lightning-button>
                    <lightning-button label={label.save} variant="brand" onclick={handleSave}></lightning-button>
                </footer>
            </div>
        </section>
        <div class="slds-backdrop slds-backdrop_open"></div>
    </template>
</template>
