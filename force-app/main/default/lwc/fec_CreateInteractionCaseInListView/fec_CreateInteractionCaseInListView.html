<template>
    <template if:true={isShowModal}>
        <section role="dialog" tabindex="-1" aria-modal="true" class="slds-modal slds-fade-in-open slds-modal_large">
            <div class="slds-modal__container">

                <!-- CLOSE BUTTON -->
                <button class="slds-button slds-button_icon slds-modal__close slds-button_icon-inverse"
                    onclick={handleClose}>
                    <lightning-icon icon-name="utility:close" size="small"></lightning-icon>
                </button>

                <!-- HEADER -->
                <div class="slds-modal__header">
                    <h2 class="slds-text-heading_medium">Create Interaction</h2>
                </div>

                <!-- CONTENT -->
                <div class="slds-modal__content slds-p-around_medium">

                    <div
                        class="slds-section__title slds-theme_shade slds-p-around_small slds-text-title_bold slds-m-bottom_medium">
                        Interaction Information
                    </div>

                    <div class="slds-m-top_large">

                        <div class="slds-grid slds-gutters">

                            <!-- Interaction Channel -->
                            <div class="slds-col slds-size_1-of-2">
                                <div class="slds-form-element slds-form-element_horizontal">
                                    <label class="slds-form-element__label">
                                        Interaction Channel
                                    </label>

                                    <div class="slds-form-element__control">
                                        <lightning-combobox name="channel" value={selectedChannel}
                                            options={channelOptions} onchange={handleChannelChange} required>
                                        </lightning-combobox>
                                    </div>
                                </div>
                            </div>

                            <!-- Interaction Sub Channel -->
                            <div class="slds-col slds-size_1-of-2">
                                <div class="slds-form-element slds-form-element_horizontal">
                                    <label class="slds-form-element__label">
                                        Interaction Sub Channel
                                    </label>

                                    <div class="slds-form-element__control">
                                        <lightning-combobox name="subChannel" value={selectedSubChannel}
                                            options={subChannelOptions} onchange={handleSubChannelChange} required>
                                        </lightning-combobox>
                                    </div>
                                </div>
                            </div>

                        </div>

                    </div>

                    <!-- Footer buttons -->
                    <div class="slds-m-top_large slds-grid slds-grid_align-center">

                        <lightning-button label="Cancel" onclick={handleClose} class="slds-m-right_small">
                        </lightning-button>

                        <lightning-button variant="brand" onclick={handleNext} label="Next">
                        </lightning-button>

                    </div>
                </div>
            </div>
        </section>
        <!-- BACKDROP -->
        <div class="slds-backdrop slds-backdrop_open"></div>
    </template>
</template>
