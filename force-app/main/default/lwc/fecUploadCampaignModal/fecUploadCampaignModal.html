<template>
    <c-fec-generic-modal 
        title={label.lblUploadCampaignData}
        onclose={handleClose}>

        <div if:true={isLoading} class="slds-is-relative">
            <lightning-spinner alternative-text="Loading" size="medium"></lightning-spinner>
        </div>

        <div>
            <div class="upload-container">
                <p class="instruction-text">{label.lblUploadInstruction}</p>
                
                <div class="file-input-wrapper slds-m-top_small">
                    <label class="custom-file-upload">
                        <input type="file" accept=".xlsx, .xls" onchange={handleFileChange}/>
                        {label.lblChooseFile}
                    </label>
                    <span class="file-name-display">{fileNameDisplay}</span>
                </div>
            </div>

            <div class="template-section">
                <div class="slds-grid slds-grid_vertical-align-center">
                    <div class="slds-col">
                        <p class="template-question">{label.lblNoTemplateQuestion}</p>
                    </div>
                    <div class="slds-col slds-grow-none">
                        <button class="btn-download" onclick={downloadTemplate}>
                            <lightning-icon icon-name="utility:download" size="xx-small" variant="info" class="slds-m-right_xx-small blue-icon"></lightning-icon>
                            {label.btnDownloadTemplate}
                        </button>
                    </div>
                </div>
            </div>
        </div>

        <div slot="footer">
            <button class="slds-button slds-button_neutral btn-round" onclick={handleClose}>{label.btnCancel}</button>
            <button class="slds-button slds-button_brand btn-round btn-brand-blue" onclick={handleConfirm}>{label.btnSave}</button>
        </div>

    </c-fec-generic-modal>
</template>
