<template>
    <template if:true={isLoading}>
        <lightning-spinner alternative-text="Loading"></lightning-spinner>
    </template>

    <template if:true={record}>
        <template if:true={sections}>
            <c-fec_-common-detail-view
                title="User ID"
                sub-title={record.userId}
                icon-name="standard:orders"
                sections={sections}
                ontoggle={handleToggle}
                columns="4">
            </c-fec_-common-detail-view>
        </template>
    </template>
   <template if:false={record}>
        <div class="slds-accordion">

            <!-- SECTION Insurance Tabview-->
            <section class="slds-accordion__section slds-is-open">
                <div class="slds-accordion__summary">
                    <h3 class="slds-accordion__summary-heading">
                        <span class="slds-accordion__summary-content slds-grid">
                            <lightning-icon icon-name="utility:chevrondown" size="x-small" class="slds-m-right_x-small">
                            </lightning-icon>
                            <span>
                                {customLabel.insuranceInfoLabel}&nbsp;-&nbsp;
                                <span class="sync-fail-text">
                                    {customLabel.msgErrorApiLabel}
                                </span>
                            </span>

                        </span>
                    </h3>
                </div>
                <div class="slds-accordion__content slds-hide">
                </div>
            </section>
            </div>
     </template>
</template>
