<template>
  <lightning-layout multiple-rows>
    <lightning-layout-item size="6" padding="around-small">
      <!-- <lightning-input data-id="currentCardStatus" type="text" label={customLabel.currentCardStatus} value={cardBlock.currentCardStatus} disabled={isDisabled}></lightning-input> -->
      <div class="slds-form-element slds-border_bottom">
        <label class="slds-form-element__label" for="newBlockCode">{customLabel.currentCardStatus}</label>
        <div class="slds-form-element__control">
          <input id="currentCardStatus" readonly type="text" class="slds-input" value={cardBlock.currentCardStatus} />
        </div>
      </div>
    </lightning-layout-item>
    <lightning-layout-item size="6" padding="around-small">
      <lightning-combobox
        data-id="cardBlockReason"
        label={customLabel.cardBlockReason}
        value={cardBlock.cardBlockReason}
        options={optionReasons}
        onchange={handleCardBlockReasonChange}
        disabled={isDisabled}>
      </lightning-combobox>
    </lightning-layout-item>
    <lightning-layout-item size="6" padding="around-small">
      <!-- <lightning-input data-id="newBlockCode" type="text" label={customLabel.newBlockCode} value={cardBlock.newBlockCode} disabled={isDisabled}></lightning-input> -->
      <div class="slds-form-element slds-border_bottom">
        <label class="slds-form-element__label" for="newBlockCode">{customLabel.newBlockCode}</label>
        <div class="slds-form-element__control">
          <input data-id="newBlockCode" id="newBlockCode" readonly type="text" class="slds-input" value={cardBlock.newBlockCode} />
        </div>
      </div>
    </lightning-layout-item>
    <lightning-layout-item size="6" padding="around-small"></lightning-layout-item>
    <lightning-layout-item size="6" padding="around-small">
      <lightning-combobox
        data-id="verifyInformation"
        label={customLabel.verifyInformation}
        value={cardBlock.verifyInformation}
        options={verifyInformationOptions}
        onchange={handleVerifyInformationChange}
        disabled={isDisabled}>
      </lightning-combobox>
    </lightning-layout-item>
    <lightning-layout-item size="6" padding="around-small">
      <lightning-combobox
        data-id="callback"
        label={customLabel.callback}
        value={cardBlock.callback}
        options={callbackOptions}
        onchange={handleCallbackChange}
        disabled={isDisabled}>
      </lightning-combobox>
    </lightning-layout-item>
    <lightning-layout-item size="12" padding="around-small">
      <template lwc:if={isShowBtn}>
        <lightning-button variant="brand" label={customLabel.blockCardBtn} onclick={handleBlockCardClick}></lightning-button>
      </template>
    </lightning-layout-item>
    <lightning-layout-item size="12" padding="around-small">
      <template lwc:if={isSuccess}>
        <p class="msg-success">{customLabel.blockCardSuccess}</p>
      </template>
      <template lwc:if={isError}>
        <template lwc:if={isShowMsgRetry}>
          <p class="msg-error">{customLabel.blockCardFailed}</p>
        </template>
        <template lwc:else>
          <p class="msg-error">{customLabel.blockCardFailedMax}</p>
        </template>
      </template>
    </lightning-layout-item>
  </lightning-layout>

  <template lwc:if={isShowModal}>
    <section
      role="dialog"
      tabindex="-1"
      aria-modal="true"
      aria-labelledby="modal-heading-01"
      class="slds-modal slds-fade-in-open"
    >
      <lightning-spinner lwc:if={isShowSpinner} size="medium" variant="brand"></lightning-spinner>
      <div class="slds-modal__container">
        <div class="slds-modal__header">
          <h1
            id="modal-heading-01"
            class="slds-modal__title slds-hyphenate"
            tabindex="-1"
          >
            {customLabel.blockCardHeader}
          </h1>
        </div>
        <div
          class="slds-modal__content slds-p-around_medium"
          id="modal-content-id-1"
        >
          <p class="slds-text-align_center">
            {customLabel.blockCardConfirmationMsg}
          </p>
        </div>
        <div class="slds-modal__footer">
          <lightning-button label={customLabel.noBtn} onclick={handleCancelClick}></lightning-button>
          <lightning-button class="slds-m-left_x-small" variant="brand" label={customLabel.yesBtn} onclick={handleConfirmClick}></lightning-button>
        </div>
      </div>
    </section>
    <div class="slds-backdrop slds-backdrop_open" role="presentation"></div>
  </template>
</template>
