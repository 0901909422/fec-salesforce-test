<template>
  <lightning-layout multiple-rows>
    <lightning-layout-item size="6" padding="around-small">
      <lightning-input name="currentCardStatus" type="text" label={customLabel.currentCardStatus}></lightning-input>
    </lightning-layout-item>
    <lightning-layout-item size="6" padding="around-small">
      <lightning-combobox
        name="cardBlockReason"
        label={customLabel.cardBlockReason}
        value={cardBlockReasonValue}
        options={optionReasons}
        onchange={handleChange}>
      </lightning-combobox>
    </lightning-layout-item>
    <lightning-layout-item size="6" padding="around-small">
      <lightning-input name="newBlockCode" type="text" label={customLabel.newBlockCode}></lightning-input>
    </lightning-layout-item>
    <lightning-layout-item size="6" padding="around-small"></lightning-layout-item>
    <lightning-layout-item size="6" padding="around-small">
      <lightning-combobox
        name="verifyInformation"
        label={customLabel.verifyInformation}
        value={verifyInformationValue}
        options={verifyInformationOptions}
        onchange={handleVerifyInformationChange}>
      </lightning-combobox>
    </lightning-layout-item>
    <lightning-layout-item size="6" padding="around-small">
      <lightning-combobox
        name="callback"
        label={customLabel.callback}
        value={callbackValue}
        options={callbackOptions}
        onchange={handleCallbackChange}>
      </lightning-combobox>
    </lightning-layout-item>
    <lightning-layout-item size="12" padding="around-small">
      <template lwc:if={isShowBtn}>
        <lightning-button variant="brand" label={customLabel.blockCardBtn} onclick={handleBlockCardClick}></lightning-button>
      </template>
    </lightning-layout-item>
    <lightning-layout-item size="12" padding="around-small">
      <template lwc:if={isSuccess}>
        <p class="msg-success">{customLabel.blockCardSuccess}</p>
      </template>
      <template lwc:if={isError}>
        <template lwc:if={isShowBtn}>
          <p class="msg-error">{customLabel.blockCardFailed}</p>
        </template>
        <template lwc:else>
          <p class="msg-error">{customLabel.blockCardFailedMax}</p>
        </template>
      </template>
    </lightning-layout-item>
  </lightning-layout>

  <template lwc:if={isShowModal}>
    <section
      role="dialog"
      tabindex="-1"
      aria-modal="true"
      aria-labelledby="modal-heading-01"
      class="slds-modal slds-fade-in-open"
    >
      <lightning-spinner lwc:if={isShowSpinner} size="medium" variant="brand"></lightning-spinner>
      <div class="slds-modal__container">
        <div class="slds-modal__header">
          <h1
            id="modal-heading-01"
            class="slds-modal__title slds-hyphenate"
            tabindex="-1"
          >
            {customLabel.blockCardHeader}
          </h1>
        </div>
        <div
          class="slds-modal__content slds-p-around_medium"
          id="modal-content-id-1"
        >
          <p class="slds-text-align_center">
            {customLabel.blockCardConfirmationMsg}
          </p>
        </div>
        <div class="slds-modal__footer">
          <lightning-button label={customLabel.noBtn} onclick={handleCancelClick}></lightning-button>
          <lightning-button class="slds-m-left_x-small" variant="brand" label={customLabel.yesBtn} onclick={handleConfirmClick}></lightning-button>
        </div>
      </div>
    </section>
    <div class="slds-backdrop slds-backdrop_open" role="presentation"></div>
  </template>
</template>
