<template>

    <div class="slds-accordion">

        <section class="slds-accordion__section {sectionClass}">

            <div class="slds-accordion__summary">

                <button class="slds-button slds-button_reset slds-accordion__summary-action" onclick={toggleSection}
                    disabled={isDisabled}>

                    <!-- ICON (giống hệt standard) -->
                    <lightning-icon icon-name="utility:chevrondown" size="x-small" class={iconClass}>
                    </lightning-icon>
                    <!-- TEXT -->
                    <span class="slds-accordion__summary-content custom-header">
                        Do Not Bother

                        <template if:true={errorMessage}>
                            <span class="error-text">
                                - {errorMessage}
                            </span>
                        </template>
                    </span>

                </button>

            </div>

            <template if:true={isOpen}>
                <div class="accordion-body">

                    <!-- NO DATA -->
                    <template if:true={noData}>
                        <div class="slds-text-color_error slds-p-around_small">
                            Không tìm thấy kết quả
                        </div>
                    </template>

                    <!-- TABLE -->
                    <template if:true={showTable}>
                        <!-- <lightning-datatable key-field="id" data={pagedData} columns={columns} hide-checkbox-column
                            show-row-number-column sorted-by={sortedBy} sorted-direction={sortDirection}
                            onsort={handleSort}>
                        </lightning-datatable> -->

                        <c-fec_-custom-do-not-bother-view-datatable key-field="id" data={pagedData} columns={columns}
                            ontogglemask={handleToggleMask} hide-checkbox-column show-row-number-column
                            sorted-by={sortedBy} sorted-direction={sortDirection} onsort={handleSort}>
                        </c-fec_-custom-do-not-bother-view-datatable>


                        <!-- PAGINATION -->
                        <!-- <template if:true={showPagination}> -->
                        <!-- PAGINATION -->
                        <div class="table-pagination
                        slds-m-top_small
                        slds-grid
                        slds-grid_align-spread
                        slds-grid_vertical-align-center">

                            <!-- PAGE SIZE -->
                            <div class="page-size
                            slds-grid
                            slds-grid_vertical-align-center">

                                <span class="slds-m-right_x-small">
                                    {labels.pageSizeLabel}
                                </span>

                                <lightning-combobox value={pageSizeStr} options={pageSizeOptions}
                                    onchange={handlePageSizeChange} variant="label-hidden">
                                </lightning-combobox>

                            </div>

                            <!-- PAGINATION -->
                            <div class="pagination-controls
                            slds-grid
                            slds-grid_vertical-align-center">

                                <lightning-button-icon class="square-icon" icon-name="utility:chevronleft"
                                    alternative-text="Previous" onclick={handlePrevPage} disabled={isFirstPage}>
                                </lightning-button-icon>

                                <span class="page-number">
                                    {currentPage}
                                </span>

                                <lightning-button-icon class="square-icon" icon-name="utility:chevronright"
                                    alternative-text="Next" onclick={handleNextPage} disabled={isLastPage}>
                                </lightning-button-icon>

                            </div>

                            <!-- GO TO PAGE -->
                            <div class="go-to-page
                            slds-grid
                            slds-grid_vertical-align-center">

                                <span class="slds-m-right_x-small">
                                    {labels.goToPageLabel}
                                </span>

                                <lightning-input type="number" value={currentPage} min="1" max={totalPages}
                                    variant="label-hidden" class="page-input" onchange={handleGoToPageInput}>
                                </lightning-input>

                                <span class="slds-m-horizontal_x-small">

                                    of {totalPages}

                                </span>

                                <lightning-button class="square-go-btn" label={labels.goBtnLabel}
                                    onclick={handleGoToPage} variant="brand">
                                </lightning-button>

                            </div>

                        </div>
                    </template>
                    <!-- </template> -->

                </div>
            </template>

        </section>

    </div>

</template>
