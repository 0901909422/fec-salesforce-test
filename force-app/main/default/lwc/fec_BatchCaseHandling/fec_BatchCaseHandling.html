<template>
  <div class="fec-root">
    <template if:true={isLoading}>
      <lightning-spinner alternative-text={batchUi.loading} size="small"></lightning-spinner>
    </template>

    <div class="fec-wrapper">
      <div class="fec-session-shell">
        <lightning-accordion
          allow-multiple-sections-open
          active-section-name={activeFilterSections}
          onsectiontoggle={handleFilterSectionToggle}
          class="fec-session-accordion"
        >
        <lightning-accordion-section
          name="filters"
          label={batchUi.sectionFilterProperties}
          class="slds-accordion__section"
        >
          <div class="fec-session-body fec-session-body--filters">
            <p class="fec-filter-help">{batchUi.filterHelpAnd}</p>
            <template if:true={filterResetHint}>
              <p class="fec-filter-help fec-filter-help--hint">{batchUi.filterResetHint}</p>
            </template>
            <div class="fec-filter-toolbar">
              <lightning-button
                label={batchUi.addFilterRow}
                onclick={handleAddFilterLine}
              ></lightning-button>
              <lightning-button
                label={batchUi.filterData}
                variant="brand"
                onclick={handleFilterData}
                disabled={filterDataDisabled}
              ></lightning-button>
              <lightning-button
                label={batchUi.reset}
                onclick={handleResetFilters}
                disabled={caseSearchLoading}
              ></lightning-button>
            </div>
            <template for:each={filterLinesView} for:item="fline">
              <div key={fline.rowId} class="fec-filter-row">
                <lightning-combobox
                  data-rowid={fline.rowId}
                  label={batchUi.filterPropertyField}
                  variant="label-hidden"
                  value={fline.propertyKey}
                  options={propertyOptionsForFilter}
                  placeholder={batchUi.propertyPlaceholder}
                  onchange={handleFilterPropertyChange}
                ></lightning-combobox>
                <lightning-combobox
                  data-rowid={fline.rowId}
                  label={batchUi.operatorField}
                  variant="label-hidden"
                  value={fline.operatorKey}
                  options={fline.operatorOptions}
                  placeholder={batchUi.operatorPlaceholder}
                  onchange={handleFilterOperatorChange}
                ></lightning-combobox>
                <template if:true={fline.showAttachCombo}>
                  <lightning-combobox
                    data-rowid={fline.rowId}
                    label={batchUi.valueField}
                    variant="label-hidden"
                    value={fline.valueText}
                    options={attachmentPicklistOptions}
                    placeholder={batchUi.valuePlaceholder}
                    onchange={handleFilterValueChange}
                  ></lightning-combobox>
                </template>
                <template if:true={fline.showValueBox}>
                  <lightning-input
                    data-rowid={fline.rowId}
                    label={batchUi.valueField}
                    variant="label-hidden"
                    type={fline.valueTypeAttr}
                    value={fline.valueText}
                    placeholder={batchUi.valuePlaceholder}
                    onchange={handleFilterValueChange}
                  ></lightning-input>
                </template>
                <lightning-button-icon
                  icon-name="utility:delete"
                  alternative-text={batchUi.removeRow}
                  title={batchUi.removeRow}
                  data-rowid={fline.rowId}
                  onclick={handleRemoveFilterLine}
                ></lightning-button-icon>
              </div>
            </template>
          </div>
        </lightning-accordion-section>
        </lightning-accordion>
      </div>

      <div class="fec-session-shell">
        <lightning-accordion
          allow-multiple-sections-open
          active-section-name={activeCaseTableSections}
          onsectiontoggle={handleCaseTableSectionToggle}
          class="fec-session-accordion"
        >
        <lightning-accordion-section
          name="cases"
          label={batchUi.sectionFilteredCases}
          class="slds-accordion__section"
        >
          <div class="fec-session-body fec-session-body--cases">
            <div class="fec-table-wrap fec-case-table-wrap">
              <table class="fec-table fec-case-table">
                <thead>
                  <tr>
                    <th class="fec-th-check">
                      <lightning-input
                        type="checkbox"
                        variant="label-hidden"
                        label={batchUi.selectAll}
                        checked={allCaseRowsSelected}
                        onchange={handleCaseSelectAll}
                      ></lightning-input>
                    </th>
                    <th>
                      <a href="javascript:void(0);" class="fec-case-sort-link" data-key="customerType" onclick={handleCaseSort}>
                        {batchUi.colCustomerType}
                        <lightning-icon icon-name={caseSortIconCustomerType} size="xx-small" class="fec-sort-icon" alternative-text={batchUi.sort}></lightning-icon>
                      </a>
                    </th>
                    <th>
                      <a href="javascript:void(0);" class="fec-case-sort-link" data-key="caseIdSearch" onclick={handleCaseSort}>
                        {batchUi.colCaseId}
                        <lightning-icon icon-name={caseSortIconCaseId} size="xx-small" class="fec-sort-icon" alternative-text={batchUi.sort}></lightning-icon>
                      </a>
                    </th>
                    <th>
                      <a href="javascript:void(0);" class="fec-case-sort-link" data-key="categoryCode" onclick={handleCaseSort}>
                        {batchUi.colCategory}
                        <lightning-icon icon-name={caseSortIconCategory} size="xx-small" class="fec-sort-icon" alternative-text={batchUi.sort}></lightning-icon>
                      </a>
                    </th>
                    <th>
                      <a href="javascript:void(0);" class="fec-case-sort-link" data-key="subCategoryCode" onclick={handleCaseSort}>
                        {batchUi.colSubCategory}
                        <lightning-icon icon-name={caseSortIconSubCategory} size="xx-small" class="fec-sort-icon" alternative-text={batchUi.sort}></lightning-icon>
                      </a>
                    </th>
                    <th>
                      <a href="javascript:void(0);" class="fec-case-sort-link" data-key="subCodeCode" onclick={handleCaseSort}>
                        {batchUi.colSubCode}
                        <lightning-icon icon-name={caseSortIconSubCode} size="xx-small" class="fec-sort-icon" alternative-text={batchUi.sort}></lightning-icon>
                      </a>
                    </th>
                    <th>
                      <a href="javascript:void(0);" class="fec-case-sort-link" data-key="caseStatus" onclick={handleCaseSort}>
                        {batchUi.colCaseStatus}
                        <lightning-icon icon-name={caseSortIconCaseStatus} size="xx-small" class="fec-sort-icon" alternative-text={batchUi.sort}></lightning-icon>
                      </a>
                    </th>
                    <th>
                      <a href="javascript:void(0);" class="fec-case-sort-link" data-key="caseCreatedOn" onclick={handleCaseSort}>
                        {batchUi.colCaseCreatedOn}
                        <lightning-icon icon-name={caseSortIconCaseCreatedOn} size="xx-small" class="fec-sort-icon" alternative-text={batchUi.sort}></lightning-icon>
                      </a>
                    </th>
                    <th>
                      <a href="javascript:void(0);" class="fec-case-sort-link" data-key="lastUpdatedOn" onclick={handleCaseSort}>
                        {batchUi.colLastUpdatedOn}
                        <lightning-icon icon-name={caseSortIconLastUpdatedOn} size="xx-small" class="fec-sort-icon" alternative-text={batchUi.sort}></lightning-icon>
                      </a>
                    </th>
                    <th>
                      <a href="javascript:void(0);" class="fec-case-sort-link" data-key="hasAttachment" onclick={handleCaseSort}>
                        {batchUi.colAttachments}
                        <lightning-icon icon-name={caseSortIconAttachments} size="xx-small" class="fec-sort-icon" alternative-text={batchUi.sort}></lightning-icon>
                      </a>
                    </th>
                    <th>
                      <span class="fec-th-inner">
                        {batchUi.colAttachmentDownloaded}
                        <lightning-icon icon-name={caseSortIconAttachmentDownloaded} size="xx-small" class="fec-sort-icon" alternative-text={batchUi.sort}></lightning-icon>
                      </span>
                    </th>
                  </tr>
                </thead>
                <tbody>
                  <template if:true={hasCaseRows}>
                    <template for:each={caseRows} for:item="crow">
                      <tr key={crow.rowKey}>
                        <td>
                          <lightning-input
                            type="checkbox"
                            variant="label-hidden"
                            data-caseid={crow.caseId}
                            checked={crow.selected}
                            onchange={handleCaseRowSelect}
                          ></lightning-input>
                        </td>
                        <td>{crow.customerType}</td>
                        <td>
                          <template if:true={crow.caseReviewUrl}>
                            <a
                              href="javascript:void(0);"
                              data-url={crow.caseReviewUrl}
                              onclick={handleCaseReviewClick}
                            >{crow.caseIdSearch}</a>
                          </template>
                          <template if:false={crow.caseReviewUrl}>
                            {crow.caseIdSearch}
                          </template>
                        </td>
                        <td>{crow.categoryCode}</td>
                        <td>{crow.subCategoryCode}</td>
                        <td>{crow.subCodeCode}</td>
                        <td>{crow.caseStatus}</td>
                        <td>{crow.caseCreatedOnLabel}</td>
                        <td>{crow.lastUpdatedOnLabel}</td>
                        <td>
                          <template if:true={crow.hasAttachment}>
                            <a
                              href="javascript:void(0);"
                              data-caseid={crow.caseId}
                              onclick={handleCaseAttachmentClick}
                            >{crow.hasAttachmentLabel}</a>
                          </template>
                        </td>
                        <td>
                          <lightning-input
                            type="checkbox"
                            variant="label-hidden"
                            checked={crow.attachmentDownloaded}
                            disabled
                          ></lightning-input>
                        </td>
                      </tr>
                    </template>
                  </template>
                  <template if:false={hasCaseRows}>
                    <tr>
                      <td colspan="11" class="fec-empty">{emptyCasesMessage}</td>
                    </tr>
                  </template>
                </tbody>
              </table>
            </div>
            <div class="fec-footer fec-case-footer">
              <div class="fec-footer__left">
                <span class="fec-footer__label">{batchUi.pageSize}</span>
                <lightning-combobox
                  variant="label-hidden"
                  value={casePageSize}
                  options={pageSizeOptions}
                  onchange={handleCasePageSizeChange}
                ></lightning-combobox>
              </div>
              <div class="fec-footer__center">
                <lightning-button-icon
                  class="fec-footer__nav-btn"
                  icon-name="utility:chevronleft"
                  alternative-text={batchUi.previous}
                  onclick={handleCasePreviousPage}
                  disabled={casePreviousDisabled}
                ></lightning-button-icon>
                <span class="fec-footer__page-btn">{caseSearchPage}</span>
                <lightning-button-icon
                  class="fec-footer__nav-btn"
                  icon-name="utility:chevronright"
                  alternative-text={batchUi.next}
                  onclick={handleCaseNextPage}
                  disabled={caseNextDisabled}
                ></lightning-button-icon>
              </div>
              <div class="fec-footer__goto">
                <span class="fec-footer__label">{batchUi.goToPage}</span>
                <lightning-input
                  variant="label-hidden"
                  value={caseGoToPageInput}
                  type="number"
                  min="1"
                  class="fec-footer__goto-input"
                  onchange={handleCaseGoToPageInput}
                ></lightning-input>
                <span class="fec-footer__of">{batchUi.footerOf} {caseTotalPages}</span>
                <lightning-button
                  class="fec-footer__go-btn"
                  variant="brand"
                  label={batchUi.go}
                  onclick={handleCaseGoToPage}
                ></lightning-button>
              </div>
            </div>
          </div>
        </lightning-accordion-section>
        </lightning-accordion>
      </div>

      <div class="fec-session-shell">
        <lightning-accordion
          allow-multiple-sections-open
          active-section-name={activeActionSections}
          onsectiontoggle={handleActionSectionToggle}
          class="fec-session-accordion"
        >
        <lightning-accordion-section
          name="action"
          label={batchUi.sectionAction}
          class="slds-accordion__section"
        >
          <div class="fec-session-body fec-session-body--action">
            <div class="fec-case-actions fec-case-actions--stacked">
              <lightning-combobox
                label={batchUi.selectActions}
                value={selectedAction}
                options={actionOptions}
                onchange={handleActionChange}
              ></lightning-combobox>
              <template if:true={isDownloadAction}>
                <lightning-combobox
                  label={batchUi.caseSet}
                  value={selectedCaseSet}
                  options={caseSetOptions}
                  onchange={handleCaseSetChange}
                ></lightning-combobox>
              </template>
              <template if:true={isImportAction}>
                <div class="fec-import-upload">
                  <lightning-button
                    label={batchUi.uploadFiles}
                    icon-name="utility:upload"
                    variant="neutral"
                    onclick={triggerImportFilePicker}
                    disabled={isImportSubmitting}
                  ></lightning-button>
                  <input
                    type="file"
                    accept=".xlsx"
                    class="fec-import-file-input slds-hide"
                    onchange={handleImportFileChange}
                  />
                  <template if:true={hasSelectedImportFile}>
                    <span class="fec-import-chip">
                      <span class="fec-import-chip__name" title={selectedImportFileName}>{selectedImportFileName}</span>
                      <lightning-button-icon
                        icon-name="utility:close"
                        size="small"
                        alternative-text={batchUi.removeFile}
                        onclick={handleClearImportFile}
                        class="fec-import-chip__remove"
                      ></lightning-button-icon>
                    </span>
                  </template>
                </div>
              </template>
              <lightning-button
                class="fec-case-actions__submit"
                label={batchUi.submit}
                variant="brand"
                onclick={handleActionSubmit}
                disabled={isImportSubmitting}
              ></lightning-button>
              <span class="fec-selected-count">{batchUi.selectedCountPrefix} {selectedCaseCount}</span>
            </div>
            <template if:true={actionRequiredError}>
              <p class="fec-template-error" role="alert">{batchUi.errSelectAction}</p>
            </template>
            <template if:true={caseSetRequiredError}>
              <p class="fec-template-error" role="alert">{batchUi.errSelectCaseSet}</p>
            </template>
            <template if:true={attachDataRequiredError}>
              <p class="fec-template-error" role="alert">{batchUi.errAttachFile}</p>
            </template>
            <template if:true={exportSuccessMessage}>
              <p class="fec-export-success" role="status">{exportSuccessMessage}</p>
            </template>
            <template if:true={exportErrorMessage}>
              <p class="fec-export-error" role="alert">{exportErrorMessage}</p>
            </template>
            <template if:true={importSuccessMessage}>
              <p class="fec-export-success" role="status">{importSuccessMessage}</p>
            </template>
            <template if:true={importErrorMessage}>
              <p class="fec-export-error" role="alert">{importErrorMessage}</p>
            </template>
          </div>
        </lightning-accordion-section>
        </lightning-accordion>
      </div>

      <div class="fec-session-shell">
        <lightning-accordion
          allow-multiple-sections-open
          active-section-name={activeProcessedSections}
          onsectiontoggle={handleProcessedSectionToggle}
          class="fec-session-accordion"
        >
        <lightning-accordion-section
          name="processed"
          label={batchUi.sectionMyBulkActions}
          class="slds-accordion__section"
        >
          <div class="fec-session-body">
            <div class="fec-table-wrap">
              <table class="fec-table">
                <thead>
                  <tr>
                    <th>
                      <a href="javascript:void(0);" class="fec-case-sort-link" data-key="fileName" onclick={handleBulkSort}>
                        <span class="fec-th-inner">
                          {batchUi.colFileName}
                          <lightning-icon icon-name={bulkSortIconFileName} size="xx-small" class="fec-sort-icon" alternative-text={batchUi.sort}></lightning-icon>
                        </span>
                      </a>
                    </th>
                    <th>
                      <a href="javascript:void(0);" class="fec-case-sort-link" data-key="uploadedOn" onclick={handleBulkSort}>
                        <span class="fec-th-inner">
                          {batchUi.colUploadedOn}
                          <lightning-icon icon-name={bulkSortIconUploadedOn} size="xx-small" class="fec-sort-icon" alternative-text={batchUi.sort}></lightning-icon>
                        </span>
                      </a>
                    </th>
                    <th>
                      <a href="javascript:void(0);" class="fec-case-sort-link" data-key="uploadedBy" onclick={handleBulkSort}>
                        <span class="fec-th-inner">
                          {batchUi.colUploadedBy}
                          <lightning-icon icon-name={bulkSortIconUploadedBy} size="xx-small" class="fec-sort-icon" alternative-text={batchUi.sort}></lightning-icon>
                        </span>
                      </a>
                    </th>
                    <th>
                      <a href="javascript:void(0);" class="fec-case-sort-link" data-key="totalRecordsCount" onclick={handleBulkSort}>
                        <span class="fec-th-inner">
                          {batchUi.colTotalRecords}
                          <lightning-icon icon-name={bulkSortIconTotalRecords} size="xx-small" class="fec-sort-icon" alternative-text={batchUi.sort}></lightning-icon>
                        </span>
                      </a>
                    </th>
                    <th>
                      <a href="javascript:void(0);" class="fec-case-sort-link" data-key="totalSuccessRecords" onclick={handleBulkSort}>
                        <span class="fec-th-inner">
                          {batchUi.colTotalSuccess}
                          <lightning-icon icon-name={bulkSortIconTotalSuccess} size="xx-small" class="fec-sort-icon" alternative-text={batchUi.sort}></lightning-icon>
                        </span>
                      </a>
                    </th>
                    <th>
                      <a href="javascript:void(0);" class="fec-case-sort-link" data-key="totalFailedRecords" onclick={handleBulkSort}>
                        <span class="fec-th-inner">
                          {batchUi.colTotalFailed}
                          <lightning-icon icon-name={bulkSortIconTotalFailed} size="xx-small" class="fec-sort-icon" alternative-text={batchUi.sort}></lightning-icon>
                        </span>
                      </a>
                    </th>
                    <th>
                      <a href="javascript:void(0);" class="fec-case-sort-link" data-key="status" onclick={handleBulkSort}>
                        <span class="fec-th-inner">
                          {batchUi.colStatus}
                          <lightning-icon icon-name={bulkSortIconStatus} size="xx-small" class="fec-sort-icon" alternative-text={batchUi.sort}></lightning-icon>
                        </span>
                      </a>
                    </th>
                    <th>
                      <a href="javascript:void(0);" class="fec-case-sort-link" data-key="failureReason" onclick={handleBulkSort}>
                        <span class="fec-th-inner">
                          {batchUi.colFailureReason}
                          <lightning-icon icon-name={bulkSortIconFailureReason} size="xx-small" class="fec-sort-icon" alternative-text={batchUi.sort}></lightning-icon>
                        </span>
                      </a>
                    </th>
                    <th>
                      <a href="javascript:void(0);" class="fec-case-sort-link" data-key="result" onclick={handleBulkSort}>
                        <span class="fec-th-inner">
                          {batchUi.colResult}
                          <lightning-icon icon-name={bulkSortIconResult} size="xx-small" class="fec-sort-icon" alternative-text={batchUi.sort}></lightning-icon>
                        </span>
                      </a>
                    </th>
                  </tr>
                </thead>
                <tbody>
                  <template if:true={hasRows}>
                    <template for:each={pagedRows} for:item="row">
                      <tr key={row.id}>
                        <td>
                          <template if:true={row.fileDownloadUrl}>
                            <a
                              href="javascript:void(0);"
                              data-url={row.fileDownloadUrl}
                              onclick={handleFileNameClick}
                            >
                              {row.fileName}
                            </a>
                          </template>
                          <template if:false={row.fileDownloadUrl}>
                            {row.fileName}
                          </template>
                        </td>
                        <td>{row.uploadedOnLabel}</td>
                        <td>{row.uploadedBy}</td>
                        <td>{row.totalRecordsCount}</td>
                        <td>{row.totalSuccessRecords}</td>
                        <td>{row.totalFailedRecords}</td>
                        <td>{row.status}</td>
                        <td>{row.failureReason}</td>
                        <td>
                          <template if:true={row.resultDownloadUrl}>
                            <a
                              href="javascript:void(0);"
                              data-url={row.resultDownloadUrl}
                              onclick={handleResultClick}
                            >
                              {row.result}
                            </a>
                          </template>
                          <template if:false={row.resultDownloadUrl}>
                            {row.result}
                          </template>
                        </td>
                      </tr>
                    </template>
                  </template>
                  <template if:false={hasRows}>
                    <tr>
                      <td colspan="9" class="fec-empty">{batchUi.noRecordsFound}</td>
                    </tr>
                  </template>
                </tbody>
              </table>
            </div>
            <div class="fec-footer">
              <div class="fec-footer__left">
                <span class="fec-footer__label">{batchUi.pageSize}</span>
                <lightning-combobox
                  variant="label-hidden"
                  value={pageSize}
                  placeholder="10"
                  options={pageSizeOptions}
                  onchange={handlePageSizeChange}
                ></lightning-combobox>
              </div>
              <div class="fec-footer__center">
                <lightning-button-icon
                  class="fec-footer__nav-btn"
                  icon-name="utility:chevronleft"
                  alternative-text={batchUi.previous}
                  onclick={handlePreviousPage}
                  disabled={previousDisabled}
                ></lightning-button-icon>
                <span class="fec-footer__page-btn">{currentPage}</span>
                <lightning-button-icon
                  class="fec-footer__nav-btn"
                  icon-name="utility:chevronright"
                  alternative-text={batchUi.next}
                  onclick={handleNextPage}
                  disabled={nextDisabled}
                ></lightning-button-icon>
              </div>
              <div class="fec-footer__goto">
                <span class="fec-footer__label">{batchUi.goToPage}</span>
                <lightning-input
                  variant="label-hidden"
                  value={goToPageInput}
                  type="number"
                  min="1"
                  class="fec-footer__goto-input"
                  onchange={handleGoToPageInput}
                ></lightning-input>
                <span class="fec-footer__of">{batchUi.footerOf} {totalPages}</span>
                <lightning-button
                  class="fec-footer__go-btn"
                  variant="brand"
                  label={batchUi.go}
                  onclick={handleGoToPage}
                ></lightning-button>
              </div>
            </div>
          </div>
        </lightning-accordion-section>
        </lightning-accordion>
      </div>
    </div>
  </div>
  <template if:true={showBpModal}>
    <section
      role="dialog"
      tabindex="-1"
      aria-modal="true"
      aria-labelledby="fec-bp-modal-title"
      class="slds-modal slds-fade-in-open fec-bp-modal"
    >
      <div class="slds-modal__container fec-bp-modal__container">
        <header class="slds-modal__header fec-bp-modal__header">
          <h2 id="fec-bp-modal-title" class="slds-text-heading_medium fec-bp-modal__title">
            {batchUi.modalBpTitle}
          </h2>
        </header>
        <div class="slds-modal__content slds-p-around_medium fec-bp-modal__content">
          <p class="fec-bp-modal__items-label">{bpItemsLabel}</p>
          <div class="fec-table-wrap">
            <table class="fec-table fec-bp-table">
              <thead>
                <tr>
                  <th class="fec-th-num"></th>
                  <th class="fec-th-check">
                    <lightning-input
                      type="checkbox"
                      variant="label-hidden"
                      label={batchUi.selectAll}
                      checked={allBpRowsSelected}
                      onchange={handleBpSelectAll}
                    ></lightning-input>
                  </th>
                  <th class="fec-th-bp">
                    <a
                      href="javascript:void(0);"
                      class="fec-bp-sort-link"
                      onclick={handleBpSort}
                    >
                      {batchUi.modalBpColName}
                      <lightning-icon
                        icon-name={bpSortIcon}
                        size="xx-small"
                        alternative-text={batchUi.sort}
                        class="fec-sort-icon"
                      ></lightning-icon>
                    </a>
                  </th>
                </tr>
              </thead>
              <tbody>
                <template if:true={hasBpRows}>
                  <template for:each={bpPagedRows} for:item="bp">
                    <tr key={bp.rowKey}>
                      <td class="fec-td-num">{bp.rowIndex}</td>
                      <td>
                        <lightning-input
                          type="checkbox"
                          variant="label-hidden"
                          label={batchUi.selectRow}
                          data-code={bp.businessProcessCode}
                          checked={bp.selected}
                          onchange={handleBpRowSelect}
                        ></lightning-input>
                      </td>
                      <td>{bp.businessProcessCode}</td>
                    </tr>
                  </template>
                </template>
                <template if:false={hasBpRows}>
                  <tr>
                    <td colspan="3" class="fec-empty">{batchUi.noBpFound}</td>
                  </tr>
                </template>
              </tbody>
            </table>
          </div>
          <div class="fec-footer fec-bp-modal__footer-row">
            <div class="fec-footer__left">
              <span class="fec-footer__label">{batchUi.pageSize}</span>
              <lightning-combobox
                variant="label-hidden"
                value={bpPageSize}
                options={pageSizeOptions}
                onchange={handleBpPageSizeChange}
              ></lightning-combobox>
            </div>
            <div class="fec-footer__center">
              <lightning-button-icon
                class="fec-footer__nav-btn"
                icon-name="utility:chevronleft"
                alternative-text={batchUi.previous}
                onclick={handleBpPreviousPage}
                disabled={bpPreviousDisabled}
              ></lightning-button-icon>
              <span class="fec-footer__page-btn">{bpCurrentPage}</span>
              <lightning-button-icon
                class="fec-footer__nav-btn"
                icon-name="utility:chevronright"
                alternative-text={batchUi.next}
                onclick={handleBpNextPage}
                disabled={bpNextDisabled}
              ></lightning-button-icon>
            </div>
            <div class="fec-footer__goto">
              <span class="fec-footer__label">{batchUi.goToPage}</span>
              <lightning-input
                variant="label-hidden"
                value={bpGoToPageInput}
                type="number"
                min="1"
                class="fec-footer__goto-input"
                onchange={handleBpGoToPageInput}
              ></lightning-input>
              <span class="fec-footer__of">{batchUi.footerOf} {bpTotalPages}</span>
              <lightning-button
                class="fec-footer__go-btn"
                variant="brand"
                label={batchUi.go}
                onclick={handleBpGoToPage}
              ></lightning-button>
            </div>
          </div>
          <div class="fec-bp-modal__props">
            <lightning-radio-group
              name="exportProperties"
              label={batchUi.exportWithAllProperties}
              options={exportPropertyOptions}
              value={includeAllProperties}
              onchange={handleExportPropertiesChange}
              type="radio"
              required
            ></lightning-radio-group>
          </div>
        </div>
        <footer class="slds-modal__footer fec-bp-modal__footer">
          <lightning-button label={batchUi.cancel} onclick={closeBpModal}></lightning-button>
          <lightning-button
            class="slds-m-left_x-small"
            variant="brand"
            label={batchUi.submit}
            onclick={handleBpSubmit}
            disabled={bpSubmitLoading}
          ></lightning-button>
        </footer>
      </div>
    </section>
    <div class="slds-backdrop slds-backdrop_open"></div>
  </template>
</template>
