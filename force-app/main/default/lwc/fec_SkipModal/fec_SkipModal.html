            {content}
        </div>
    </lightning-modal-body>

    <lightning-modal-footer>

            <lightning-button label="Xác nhận" variant="brand" onclick={handleConfirm}

            </lightning-button>

        </div>
    </lightning-modal-footer>
</template>
