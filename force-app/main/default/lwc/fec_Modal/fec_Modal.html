<template>
  <section class="slds-modal slds-fade-in-open slds-modal_medium">
    <lightning-spinner lwc:if={isLoading} size="medium" variant="brand"></lightning-spinner>
    <div class="slds-modal__container">
      <button
        class="slds-button slds-button_icon slds-modal__close"
        onclick={handleClose}
      >
        <lightning-icon
          icon-name="utility:close"
          class="slds-button__icon slds-button__icon_large"
          size="small"
        >
        </lightning-icon>

      </button>
      <div class="slds-modal__header">
        <h1 class="slds-modal__title slds-hyphenate">{header}</h1>
      </div>
      <div class="slds-modal__content slds-p-around_medium">
        <slot name="content"></slot>
      </div>
      <div class="slds-modal__footer">
        <slot name="footer"></slot>
      </div>
    </div>
  </section>
  <div class="slds-backdrop slds-backdrop_open"></div>
</template>
