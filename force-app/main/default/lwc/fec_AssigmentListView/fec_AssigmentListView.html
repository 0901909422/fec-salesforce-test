<template>
    <lightning-card class="assignment-card">

        <!-- HEADER -->
        <div slot="title" class="slds-media slds-media_center">

            <div class="slds-media__figure">
                <lightning-icon icon-name="standard:work_order" size="small" class="header-icon">
                </lightning-icon>
            </div>

            <div class="slds-media__body">
                <h2 class="slds-card__header-title">
                    <span class="title">
                        {labels.LABEL_ASSIGNMENT_LIST} ({assignmentCount})
                    </span>
                </h2>
            </div>

        </div>

        <template if:true={showTable}>
            <div class="table-wrapper">

                <!-- <lightning-datatable key-field="id" data={assignments} columns={columns} hide-checkbox-column
                    show-row-number-column is-loading={isLoading}>
                </lightning-datatable> -->


                <lightning-datatable key-field="id" data={assignments} columns={columns} hide-checkbox-column
                    show-row-number-column is-loading={isLoading} class="custom-datatable">
                </lightning-datatable>

            </div>

            <!-- FOOTER -->
            <!-- <template if:true={showViewAll}>
                <div class="assignment-footer" style="text-align: center;">
                    <a href="javascript:void(0)" onclick={handleViewAll}>
                        {labels.LABEL_VIEW_ALL}
                    </a>
                </div>
            </template> -->
            <!-- PAGINATION -->
            <div class="table-pagination
                        slds-m-top_small
                        slds-grid
                        slds-grid_align-spread
                        slds-grid_vertical-align-center">

                <!-- PAGE SIZE -->
                <div class="page-size
                            slds-grid
                            slds-grid_vertical-align-center">

                    <span class="slds-m-right_x-small">
                        {labels.pageSizeLabel}
                    </span>

                    <lightning-combobox value={pageSize} options={pageSizeOptions} onchange={handlePageSizeChange}
                        variant="label-hidden">
                    </lightning-combobox>

                </div>

                <!-- PAGINATION -->
                <div class="pagination-controls
                            slds-grid
                            slds-grid_vertical-align-center">

                    <lightning-button-icon icon-name="utility:chevronleft" alternative-text="Previous"
                        onclick={handlePrevPage} disabled={isFirstPage}>
                    </lightning-button-icon>

                    <span class="slds-m-horizontal_small
                                 slds-text-title_bold">

                        {currentPage}

                    </span>

                    <lightning-button-icon icon-name="utility:chevronright" alternative-text="Next"
                        onclick={handleNextPage} disabled={isLastPage}>
                    </lightning-button-icon>

                </div>

                <!-- GO TO PAGE -->
                <div class="go-to-page
                            slds-grid
                            slds-grid_vertical-align-center">

                    <span class="slds-m-right_x-small">
                        {labels.goToPageLabel}
                    </span>

                    <lightning-input type="number" value={currentPage} min="1" max={totalPages} variant="label-hidden"
                        class="page-input" onchange={handleGoToPageInput}>
                    </lightning-input>

                    <span class="slds-m-horizontal_x-small">

                        of {totalPages}

                    </span>

                    <lightning-button label={labels.goBtnLabel} onclick={handleGoToPage} variant="brand">
                    </lightning-button>

                </div>

            </div>
        </template>
    </lightning-card>
</template>
