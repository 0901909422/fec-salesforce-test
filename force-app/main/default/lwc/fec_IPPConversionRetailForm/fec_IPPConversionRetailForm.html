<template>
  <div class="slds-box slds-theme_shade">
    <template if:true={isLoading}>
      <lightning-spinner
        alternative-text={lblSpinnerLoading}
        size="medium"
      ></lightning-spinner>
    </template>
    <template if:false={isLoading}>
      <template if:true={hasNoEligibleTransactions}>
        <p class="slds-m-bottom_medium validation-msg validation-msg-red">{noEligibleMessage}</p>
      </template>
      <template if:true={hasEligibleTransactions}>
        <h3 class="slds-text-heading_small slds-m-bottom_small">
          {ippRetailUi.unbilledHeading}
        </h3>
        <lightning-datatable
          key-field="transactionId"
          data={transactions}
          columns={transactionColumns}
          max-row-selection="1"
          onrowselection={handleRowSelection}
        >
        </lightning-datatable>
        <template if:true={showCheckDetailsButton}>
          <div class="slds-m-top_medium">
            <lightning-button
              label={ippRetailUi.btnCheckDetails}
              onclick={handleCheckIPPDetails}
              variant="brand"
            ></lightning-button>
          </div>
        </template>
        <template if:true={detailsLoading}>
          <lightning-spinner
            alternative-text={lblSpinnerDetails}
            size="small"
            class="slds-m-top_small"
          ></lightning-spinner>
        </template>
        <template if:true={showDetailsSection}>
          <div class="slds-m-top_medium slds-box slds-box_x-small">
            <div class="slds-grid slds-gutters slds-wrap details-row">
              <div
                class="slds-col slds-size_1-of-1 slds-medium-size_1-of-4 slds-p-horizontal_x-small"
              >
                <div class="slds-form-element">
                  <lightning-combobox
                    label={lblTenor}
                    name="tenor"
                    value={selectedTenor}
                    options={tenorOptions}
                    onchange={handleTenorChange}
                    required
                  ></lightning-combobox>
                </div>
              </div>
              <div
                class="slds-col slds-size_1-of-1 slds-medium-size_1-of-4 slds-p-horizontal_x-small"
              >
                <div class="slds-form-element">
                  <lightning-input
                    type="text"
                    label={lblInterest}
                    value={detailsInterestDisplay}
                    disabled
                  ></lightning-input>
                </div>
              </div>
              <div
                class="slds-col slds-size_1-of-1 slds-medium-size_1-of-4 slds-p-horizontal_x-small"
              >
                <div class="slds-form-element">
                  <lightning-input
                    type="text"
                    label={lblConversionFee}
                    value={detailsFeeDisplay}
                    disabled
                  ></lightning-input>
                </div>
              </div>
              <div
                class="slds-col slds-size_1-of-1 slds-medium-size_1-of-4 slds-p-horizontal_x-small"
              >
                <div class="slds-form-element">
                  <lightning-input
                    type="text"
                    label={lblEmi}
                    value={detailsEmiDisplay}
                    disabled
                  ></lightning-input>
                </div>
              </div>
            </div>
          </div>
          <div class="slds-m-top_small">
            <lightning-button
              label={ippRetailUi.btnConvert}
              onclick={handleConvertIPP}
              variant="brand"
            ></lightning-button>
          </div>
        </template>
      </template>
    </template>
  </div>
  <template if:true={showConfirmModal}>
    <section role="dialog" tabindex="-1" class="slds-modal slds-fade-in-open">
      <div class="slds-modal__container">
        <header class="slds-modal__header">
          <h2 class="slds-modal__title">{ippRetailUi.modalTitle}</h2>
          <button
            class="slds-button slds-modal__close slds-button_icon-inverse"
            title={lblClose}
            onclick={handleConfirmNo}
          ></button>
        </header>
        <div class="slds-modal__content slds-p-around_medium">
          <p>
            {ippRetailUi.modalBody}
          </p>
        </div>
        <footer class="slds-modal__footer">
          <lightning-button
            label={ippRetailUi.plNo}
            onclick={handleConfirmNo}
            class="slds-m-right_x-small"
            variant="neutral"
          ></lightning-button>
          <lightning-button
            label={ippRetailUi.plYes}
            onclick={handleConfirmYes}
            variant="brand"
          ></lightning-button>
        </footer>
      </div>
    </section>
    <div class="slds-backdrop slds-backdrop_open"></div>
  </template>
  <template if:true={convertLoading}>
    <lightning-spinner
      alternative-text={lblSpinnerConverting}
      size="medium"
    ></lightning-spinner>
  </template>
</template>
