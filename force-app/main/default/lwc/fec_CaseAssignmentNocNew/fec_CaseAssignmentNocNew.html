<template>
  <div class="page-wrap slds-p-around_medium">
    <div class="slds-m-bottom_medium">
      <h1 class="page-heading">{pageTitle}</h1>
    </div>

    <template if:true={hasPageErrors}>
      <div class="slds-notify slds-notify_alert slds-alert_error slds-m-bottom_medium" role="alert">
        <h2 class="slds-text-heading_small">Review the errors on this page.</h2>
        <ul class="slds-list_dotted slds-m-top_x-small">
          <template for:each={pageErrors} for:item="msg">
            <li key={msg}>{msg}</li>
          </template>
        </ul>
      </div>
    </template>

    <div class="slds-card slds-card_boundary">
      <div class="slds-card__header slds-theme_shade slds-border_bottom">
        <h2 class="slds-card__header-title">{sectionTitle}</h2>
      </div>
      <div class="slds-card__body slds-card__body_inner slds-p-around_medium">
        <lightning-layout multiple-rows pull-to-boundary="small">
          <lightning-layout-item flexibility="auto" padding="horizontal-small" size="12" large-device-size="6">
            <lightning-record-picker
              key={assignmentPickerKey}
              label="Case Assignment Name"
              object-api-name="FEC_Case_Assignment__c"
              value={assignmentRecordId}
              disabled={assignmentPickerLocked}
              onchange={handleAssignmentChange}
              required
              placeholder="Search Case Assignments..."
              data-id="picker-assignment"
            ></lightning-record-picker>

            <div class="slds-m-top_small">
              <lightning-input label="Owner" value={ownerDisplayName} disabled></lightning-input>
            </div>

            <div class="slds-m-top_small">
              <c-fec_-combo-box
                data-id="noc-new-prod-type"
                label="Product Type"
                placeholder="Select Product Type"
                required
                value={selectedProductTypeId}
                option={formattedProductTypeOption}
                disabled={comboProdTypeLocked}
                onremove={handleRemoveProductType}
                onchange={handleChangeProductType}
              ></c-fec_-combo-box>
            </div>

            <div class="slds-m-top_small">
              <div class="slds-form-element slds-form-element_readonly">
                <span class="slds-form-element__label">Created By</span>
                <div class="slds-form-element__control">
                  <div class="slds-form-element__static">
                    <template if:true={hasOwnerDisplayName}>
                      <a href="#" class="entity-link" onclick={handleUserNav}>{ownerDisplayName}</a>, {auditStamp}
                    </template>
                    <template if:false={hasOwnerDisplayName}>
                      {auditStamp}
                    </template>
                  </div>
                </div>
              </div>
            </div>
          </lightning-layout-item>

          <lightning-layout-item flexibility="auto" padding="horizontal-small" size="12" large-device-size="6">
            <c-fec_-combo-box
              data-id="noc-new-category"
              label="Category"
              placeholder="Select Category"
              required
              value={selectedCategoryKey}
              option={formattedCategoryOption}
              disabled={comboCategoryLocked}
              onremove={handleRemoveCategory}
              onchange={handleChangeCategory}
            ></c-fec_-combo-box>

            <div class="slds-m-top_small">
              <c-fec_-combo-box
                data-id="noc-new-sub-category"
                label="Sub-Category"
                placeholder="Select Sub-Category"
                required
                value={selectedSubCategoryId}
                option={formattedSubCategoryOption}
                disabled={comboSubCategoryLocked}
                onremove={handleRemoveSubCategory}
                onchange={handleChangeSubCategory}
              ></c-fec_-combo-box>
            </div>

            <div class="slds-m-top_small">
              <c-fec_-combo-box
                data-id="noc-new-sub-code"
                label="Sub-Code"
                placeholder="Select Sub-Code"
                value={selectedSubCodeId}
                option={formattedSubCodeOption}
                disabled={comboSubCodeLocked}
                onremove={handleRemoveSubCode}
                onchange={handleChangeSubCode}
              ></c-fec_-combo-box>
            </div>

            <div class="slds-m-top_small">
              <div class="slds-form-element slds-form-element_readonly">
                <span class="slds-form-element__label">Last Modified By</span>
                <div class="slds-form-element__control">
                  <div class="slds-form-element__static">
                    <template if:true={hasOwnerDisplayName}>
                      <a href="#" class="entity-link" onclick={handleUserNav}>{ownerDisplayName}</a>, {auditStamp}
                    </template>
                    <template if:false={hasOwnerDisplayName}>
                      {auditStamp}
                    </template>
                  </div>
                </div>
              </div>
            </div>
          </lightning-layout-item>
        </lightning-layout>
      </div>
    </div>

    <div class="footer-actions slds-text-align_center">
      <lightning-button label="Cancel" onclick={handleCancel}></lightning-button>
      <lightning-button
        class="slds-m-left_small"
        variant="brand"
        label="Save"
        disabled={isSaveDisabled}
        onclick={handleSave}
      ></lightning-button>
    </div>
  </div>
</template>
