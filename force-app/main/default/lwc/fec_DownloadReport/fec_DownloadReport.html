<!-- FEC_DownloadReportModal.html -->
<template>

    <section
        role="dialog"
        tabindex="-1"
        aria-modal="true"
        class="slds-modal slds-fade-in-open">
        <div class="slds-modal__container">

            <!-- HEADER -->
            <header class="slds-modal__header">
                 <button
                    data-id="header-close"
                    class="slds-button slds-button_icon slds-modal__close"
                    title="Close"
                    onclick={handleCancel}>
                    <lightning-icon icon-name="utility:close" size="small"></lightning-icon>
                </button>
                <h2 class="slds-text-heading_medium">{customLabel.downloadReport}</h2>
            </header>

            <!-- BODY -->
            <div class="slds-modal__content slds-p-around_large" style="max-height:70vh; overflow-y:auto;">

                <div class="slds-text-heading_small slds-m-bottom_medium">{customLabel.exportView}</div>

                <div class="slds-grid slds-gutters slds-m-bottom_large">

                    <!-- FORMATTED CARD -->
                    <div class="slds-col">
                        <div class={formattedClass} onclick={handleFormatted}>
                            <template if:true={isFormattedSelected}>
                                <div class="selected-icon">&#10003;</div>
                            </template>
                            <div class="slds-text-heading_small slds-m-bottom_small">{customLabel.formattedReport}</div>
                            <div class="slds-text-body_small slds-text-color_weak">
                               {customLabel.titleContextReport}
                            </div>
                        </div>
                    </div>

                    <!-- DETAILS CARD -->
                    <div class="slds-col">
                        <div class={detailsClass} onclick={handleDetails}>
                            <template if:true={isDetailsSelected}>
                                <div class="selected-icon">&#10003;</div>
                            </template>
                            <div class="slds-text-heading_small slds-m-bottom_small">{customLabel.detailsOnly}</div>
                            <div class="slds-text-body_small slds-text-color_weak">
                               {customLabel.exportDetail}
                            </div>
                        </div>
                    </div>

                </div>

                <!-- FORMAT (static / read-only) -->
                <div class="slds-form-element slds-form-element_stacked">
                    <label class="slds-form-element__label">{customLabel.format}</label>
                    <div class="slds-form-element__control">
                        <div class="format-static-field">{customLabel.formatExcel}</div>
                    </div>
                </div>

            </div>

            <!-- FOOTER -->
            <footer class="slds-modal__footer">
                <lightning-button
                    variant="neutral"
                    label="Cancel"
                    disabled={isLoading}
                    onclick={handleCancel}>
                </lightning-button>
                <lightning-button
                    class="slds-m-left_small"
                    variant="brand"
                    label="Download"
                    disabled={isLoading}
                    onclick={handleDownload}>
                </lightning-button>
            </footer>
        </div>
    </section>
</template>
