<template>
  <lightning-accordion class="interaction-infor" allow-multiple-sections-open active-section-name={activeSections}>
    <lightning-accordion-section name="interactionInfo" label="Interaction Information">

      <!-- SLDS spacing instead of custom card -->
      <div class="slds-p-horizontal_medium slds-p-vertical_small">

        <div class="interaction-grid">
          <!-- LEFT -->
          <div class="col">
            <div class="row">
              <span class="label">Interaction Phone</span>
              <span class="value">
                <!-- Có phone -->
                <template if:true={hasPhone}>
                  {displayPhone}
                </template>

                <!-- Không có phone -->
                <template if:false={hasPhone}>
                  <template if:true={isEditingPhone}>
                    <lightning-input type="tel" value={phoneDraft} onchange={handlePhoneChange} variant="label-hidden">
                    </lightning-input>
                  </template>

                  <template if:false={isEditingPhone}>
                    <span class="empty">--</span>
                  </template>
                </template>
              </span>
              <!-- ICON -->
              <template if:true={hasPhone}>
                <lightning-icon icon-name={eyeIcon} size="x-small" class="eye-icon" onclick={handleToggleMask}>
                </lightning-icon>
              </template>

              <!-- ICON EDIT: chỉ hiện khi CHƯA edit -->
              <template if:false={hasPhone}>
                <template if:false={isEditingPhone}>
                  <lightning-icon icon-name="utility:edit" size="x-small" class="eye-icon" onclick={handleEditPhone}>
                  </lightning-icon>
                </template>
              </template>

              <!-- SAVE ICON -->
              <template if:true={isEditingPhone}>
                <lightning-icon icon-name="utility:check" size="x-small" class="eye-icon save-icon"
                  onclick={handleSavePhone}>
                </lightning-icon>
              </template>
            </div>

            <div class="row">
              <span class="label">Interaction Created On</span>
              <span class="value">{createdOn}</span>
              <span></span>
            </div>


          </div>

          <!-- RIGHT -->
          <div class="col">
            <!-- <div class="row"> -->
            <!-- <span class="label">Interaction Channel</span>
            <span class="value">{channel}</span>
            <span></span>
          </div>

          <div class="row">
            <span class="label">Interaction Sub Channel</span>
            <span class="value">{subChannel}</span>
            <span></span>
          </div> -->

            <div class="row">
              <span class="label">External Interaction ID</span>
              <span class="value">{externalId}</span>
              <span></span>
            </div>

            <div class="row">
              <span class="label">Interaction Created By</span>
              <span class="value">{createdBy}</span>
              <span></span>
            </div>
          </div>
        </div>
      </div>
    </lightning-accordion-section>
  </lightning-accordion>
</template>
