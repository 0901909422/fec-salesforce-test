<template>
    <!-- Modal backdrop -->
    <section role="dialog" tabindex="-1" class="slds-modal slds-fade-in-open" aria-modal="true">
        <div class="slds-modal__container">

            <!-- Modal header -->
       
             <header class="slds-modal__header">
                <button class="slds-button slds-button_icon slds-modal__close" title="Close" onclick={handleCancel}>
                   <lightning-icon icon-name="utility:close"  size="small"></lightning-icon>
                </button>
                <h2 class="slds-text-heading_medium slds-hyphenate">{modalTitle}</h2>
            </header>

            <!-- Modal body -->
            <div class="slds-modal__content slds-p-around_medium">

                <!-- Folder Label (required) -->
                <lightning-input
                    class="folder-name-input slds-m-bottom_small"
                    label={label.folderLabel}
                    value={folderName}
                    required
                    max-length="255"
                    onchange={handleNameChange}
                ></lightning-input>

                <!-- Folder Unique Name (auto-generated) -->
                <lightning-input
                    class="slds-m-bottom_small folder-unique-name-input"
                    label="Folder Unique Name"
                    value={uniqueName}
                    required
                    max-length="255"
                    onchange={handleUniqueNameChange}
                    onclick={handleUniqueNameClick}
                ></lightning-input>
                <div lwc:if={isDuplicated}>
                    <p class="slds-text-color_error">{errorDuplicate}</p>
                </div>
            </div>

            <!-- Modal footer -->
            <div class="slds-modal__footer">
                <lightning-button
                    label="Cancel"
                    onclick={handleCancel}
                    class="slds-m-right_x-small"
                ></lightning-button>
                <lightning-button
                    label="Save"
                    variant="brand"
                    onclick={handleSave}
                ></lightning-button>
            </div>
        </div>
    </section>
    <div class="slds-backdrop slds-backdrop_open"></div>
</template>
