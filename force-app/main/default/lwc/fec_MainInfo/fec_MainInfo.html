<template>
    <template if:true={hasData}>
        <div class="customer-info-container slds-card slds-p-around_small">

            <lightning-accordion active-section-name={activeSections} allow-multiple-sections-open>

                <!-- ================= Demographic ================= -->
                <lightning-accordion-section name="demographic" label={customLabel.demographicLabel}>

                    <div class="slds-grid slds-wrap slds-gutters_small">

                        <!-- LEFT COLUMN -->
                        <div class="slds-col slds-size_1-of-2">
                            <div class="detail-row">
                                <span class="detail-label">
                                    {customLabel.customerNameLabel}
                                    <template if:true={helpTextMap.fec_customer_name__c}>
                                        <lightning-helptext content={helpTextMap.fec_customer_name__c}>
                                        </lightning-helptext>
                                    </template>
                                </span>
                                <span class="detail-value">{fullName}</span>
                            </div>

                            <div class="detail-row">
                                <span class="detail-label">
                                   {customLabel.lastNameLabel}
                                    <template if:true={helpTextMap.fec_last_name__c}>
                                        <lightning-helptext content={helpTextMap.fec_last_name__c}>
                                        </lightning-helptext>
                                    </template>
                                </span>
                                <span class="detail-value">{lastName}</span>
                            </div>

                            <div class="detail-row">
                                <span class="detail-label">
                                    {customLabel.middleNameLabel}
                                    <template if:true={helpTextMap.fec_middle_name__c}>
                                        <lightning-helptext content={helpTextMap.fec_middle_name__c}>
                                        </lightning-helptext>
                                    </template>
                                </span>
                                <span class="detail-value">{middleName}</span>
                            </div>

                            <div class="detail-row">
                                <span class="detail-label">
                                    {customLabel.firstNameLabel}
                                    <template if:true={helpTextMap.fec_first_name__c}>
                                        <lightning-helptext content={helpTextMap.fec_first_name__c}>
                                        </lightning-helptext>
                                    </template>
                                </span>
                                <span class="detail-value">{firstName}</span>
                            </div>

                            <div class="detail-row">
                                <span class="detail-label">
                                    {customLabel.dateOfBirthLabel}
                                    <template if:true={helpTextMap.fec_date_of_birth__c}>
                                        <lightning-helptext content={helpTextMap.fec_date_of_birth__c}>
                                        </lightning-helptext>
                                    </template>
                                </span>
                                <span class="detail-value">{dateOfBirth}</span>
                            </div>

                            <div class="detail-row">
                                <span class="detail-label">
                                    {customLabel.genderLabel}
                                    <template if:true={helpTextMap.fec_gender__c}>
                                        <lightning-helptext content={helpTextMap.fec_gender__c}>
                                        </lightning-helptext>
                                    </template>
                                </span>
                                <span class="detail-value">{gender}</span>
                            </div>

                        </div>

                        <!-- RIGHT COLUMN -->
                        <div class="slds-col slds-size_1-of-2">

                            <div class="detail-row">
                                <span class="detail-label">
                                    {customLabel.nationalIDPassportIDLabel}
                                    <template if:true={helpTextMap.fec_national_id__passport_id__c}>
                                        <lightning-helptext content={helpTextMap.fec_national_id__passport_id__c}>
                                        </lightning-helptext>
                                    </template>
                                </span>
                                <span class="detail-value with-icon">
                                    {maskedNationalIDPassportID}
                                    <lightning-button-icon icon-name={nationalIDEyeIcon} variant="bare"
                                        alternative-text="Toggle NationalIDPassportID"
                                        title="Toggle NationalIDPassportID" onclick={handleToggleNationalIDPassportID}
                                        class="eye-icon">
                                    </lightning-button-icon>
                                </span>
                            </div>
                            <div class="detail-row">
                                <span class="detail-label">
                                    {customLabel.dateOfIssueLabel}
                                    <template if:true={helpTextMap.fec_date_of_issue__c}>
                                        <lightning-helptext content={helpTextMap.fec_date_of_issue__c}>
                                        </lightning-helptext>
                                    </template>
                                </span>
                                <span class="detail-value">{dateOfIssue}</span>
                            </div>
                            <div class="detail-row">
                                <span class="detail-label">
                                    {customLabel.placeOfIssueLabel}
                                    <template if:true={helpTextMap.fec_place_of_issue__c}>
                                        <lightning-helptext content={helpTextMap.fec_place_of_issue__c}>
                                        </lightning-helptext>
                                    </template>
                                </span>
                                <span class="detail-value">{placeOfIssue}</span>
                            </div>
                            <div class="detail-row">
                                <span class="detail-label">
                                    {customLabel.maritalStatusLabel}
                                    <template if:true={helpTextMap.fec_marital_status__c}>
                                        <lightning-helptext content={helpTextMap.fec_marital_status__c}>
                                        </lightning-helptext>
                                    </template>
                                </span>
                                <span class="detail-value">{maritalStatus}</span>
                            </div>
                            <div class="detail-row">
                                <span class="detail-label">
                                    {customLabel.primaryPhoneLabel}
                                    <template if:true={helpTextMap.fec_primary_phone__c}>
                                        <lightning-helptext content={helpTextMap.fec_primary_phone__c}>
                                        </lightning-helptext>
                                    </template>
                                </span>
                                <span class="detail-value with-icon">
                                    {maskedPhone}
                                    <lightning-button-icon icon-name={phoneEyeIcon} variant="bare"
                                        alternative-text="Toggle phone" title="Toggle phone" onclick={handleTogglePhone}
                                        class="eye-icon">
                                    </lightning-button-icon>
                                </span>
                            </div>
                        </div>
                    </div>
                </lightning-accordion-section>

                <!-- ================= Customer Number ================= -->
                <lightning-accordion-section name="customerNumber" label={customLabel.customerNumberLabel}>

                    <div class="slds-grid slds-wrap slds-gutters_small">

                        <div class="slds-col slds-size_1-of-2">
                            <div class="detail-row">
                                <span class="detail-label">
                                    {customLabel.cifNumberLabel}
                                    <template if:true={helpTextMap.fec_cif_number__c}>
                                        <lightning-helptext content={helpTextMap.fec_cif_number__c}>
                                        </lightning-helptext>
                                    </template>
                                </span>
                                <span class="detail-value">{cifNumber}</span>
                            </div>
                        </div>

                        <div class="slds-col slds-size_1-of-2">
                            <div class="detail-row">
                                <span class="detail-label">{customLabel.pidNumberLabel}</span>
                                <span class="detail-value">{pidNumber}</span>
                            </div>
                        </div>

                    </div>
                </lightning-accordion-section>

                <!-- ================= Addresses ================= -->
                <lightning-accordion-section name="addresses" label={customLabel.addressesListLabel}>

                    <c-fec_-related-list-paging records={addresses} columns={addressColumns}
                        sorted-by="Address">
                    </c-fec_-related-list-paging>

                </lightning-accordion-section>

            </lightning-accordion>
        </div>
    </template>

    <template if:false={hasData}>
        <div class="slds-accordion">

            <!-- SECTION Demographic-->
            <section class="slds-accordion__section slds-is-open">
                <div class="slds-accordion__summary">
                    <h3 class="slds-accordion__summary-heading">
                        <span class="slds-accordion__summary-content slds-grid">
                            <lightning-icon icon-name="utility:chevrondown" size="x-small" class="slds-m-right_x-small">
                            </lightning-icon>
                            <span>
                                {customLabel.demographicLabel}&nbsp;-&nbsp;
                                <span class="sync-fail-text">
                                    {customLabel.msgErrorApiLabel}
                                </span>
                            </span>

                        </span>
                    </h3>
                </div>
                <div class="slds-accordion__content slds-hide">
                </div>
            </section>

            <!-- SECTION  Customer Number -->
            <section class="slds-accordion__section slds-is-open">
                <div class="slds-accordion__summary">
                    <h3 class="slds-accordion__summary-heading">
                        <span class="slds-accordion__summary-content slds-grid">
                            <lightning-icon icon-name="utility:chevrondown" size="x-small" class="slds-m-right_x-small">
                            </lightning-icon>
                            <span>
                                {customLabel.customerNumberLabel}&nbsp;-&nbsp;
                                <span class="sync-fail-text">
                                    {customLabel.msgErrorApiLabel}
                                </span>
                            </span>
                        </span>
                    </h3>
                </div>
                <div class="slds-accordion__content slds-hide">
                </div>
            </section>

            <!-- SECTION Addresses List -->
            <section class="slds-accordion__section slds-is-open">
                <div class="slds-accordion__summary">
                    <h3 class="slds-accordion__summary-heading">
                        <span class="slds-accordion__summary-content slds-grid">
                            <lightning-icon icon-name="utility:chevrondown" size="x-small" class="slds-m-right_x-small">
                            </lightning-icon>
                            <span>
                                {customLabel.addressesListLabel}&nbsp;-&nbsp;
                                <span class="sync-fail-text">
                                    {customLabel.msgErrorApiLabel}
                                </span>
                            </span>
                        </span>
                    </h3>
                </div>
                <div class="slds-accordion__content slds-hide">
                </div>
            </section>

        </div>
    </template>
</template>
