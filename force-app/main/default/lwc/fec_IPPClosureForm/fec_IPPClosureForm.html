<template>
  <div class="slds-box slds-theme_shade">
    <template if:true={isLoading}>
      <lightning-spinner
        alternative-text={labelLoading}
        size="medium"
      ></lightning-spinner>
    </template>
    <template if:false={isLoading}>
      <template if:true={hasNoEligibleIPPs}>
        <p class="slds-m-bottom_medium validation-msg validation-msg-red">{noti12Message}</p>
        <lightning-button
          label={labelBackToCase}
          onclick={handleBackToCase}
          variant="neutral"
        ></lightning-button>
      </template>
      <template if:true={hasEligibleIPPs}>
        <h3 class="slds-text-heading_small slds-m-bottom_small">
          {headingText}
        </h3>
        <lightning-datatable
          key-field="Id"
          data={ippList}
          columns={ippColumns}
          max-row-selection="1"
          hide-checkbox-column={formLocked}
          onrowselection={handleRowSelection}
        >
        </lightning-datatable>
        <template if:true={showNoti11}>
          <p class="slds-m-top_small validation-msg validation-msg-red">{noti11Message}</p>
        </template>
        <div class="slds-m-top_medium">
          <lightning-button
            label={labelBackToCase}
            onclick={handleBackToCase}
            variant="neutral"
            class="slds-m-right_x-small"
          ></lightning-button>
          <lightning-button
            label={labelComplete}
            onclick={handleCompleteCase}
            variant="brand"
            disabled={formLocked}
          ></lightning-button>
        </div>
      </template>
    </template>
  </div>
  <template if:true={completeLoading}>
    <lightning-spinner
      alternative-text={labelSaving}
      size="medium"
    ></lightning-spinner>
  </template>
</template>
